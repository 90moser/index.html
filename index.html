<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Revenda O Boticário</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .boticario-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .alert-red { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .alert-yellow { background-color: #fef3c7; border-left: 4px solid #f59e0b; }
        .alert-green { background-color: #d1fae5; border-left: 4px solid #10b981; }
        .alert-blue { background-color: #dbeafe; border-left: 4px solid #3b82f6; }
        .modal-overlay { background-color: rgba(0,0,0,0.5); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-edit { background-color: #3b82f6; }
        .btn-edit:hover { background-color: #2563eb; }
        .btn-delete { background-color: #ef4444; }
        .btn-delete:hover { background-color: #dc2626; }
        .btn-transfer { background-color: #8b5cf6; }
        .btn-transfer:hover { background-color: #7c3aed; }
        
        /* Dropdown Pesquisável */
        .searchable-dropdown { position: relative; }
        .dropdown-options { 
            max-height: 200px; 
            overflow-y: auto; 
            position: absolute;
            z-index: 50;
            width: 100%;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .dropdown-option { padding: 0.5rem 1rem; cursor: pointer; transition: background-color 0.2s; }
        .dropdown-option:hover { background-color: #f3f4f6; }
        .dropdown-option.selected { background-color: #667eea; color: white; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==================== UTILITÁRIOS ====================
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        const formatCurrency = (value) => new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(value);
        const formatDate = (date) => new Date(date).toLocaleDateString('pt-PT');
        const calculateDaysUntilExpiry = (expiryDate) => {
            const today = new Date();
            const expiry = new Date(expiryDate);
            const diffTime = expiry - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };
        const getMonthRange = () => {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), 1);
            const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            return { start, end };
        };
        const calculateDaysSince = (date) => {
            const today = new Date();
            const target = new Date(date);
            const diffTime = today - target;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        // ==================== COMPONENTE: DROPDOWN PESQUISÁVEL ====================
        const SearchableDropdown = ({ options, value, onChange, placeholder, label, renderOption, emptyMessage = "Nenhum item encontrado" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const dropdownRef = useRef(null);
            const selectedOption = options.find(o => o.value === value);

            const sortedOptions = useMemo(() => [...options].sort((a, b) => a.label.localeCompare(b.label)), [options]);
            const filteredOptions = useMemo(() => {
                if (!searchTerm) return sortedOptions;
                return sortedOptions.filter(o => o.label.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [sortedOptions, searchTerm]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const handleSelect = (optionValue) => { onChange(optionValue); setIsOpen(false); setSearchTerm(''); };

            return (
                <div className="searchable-dropdown" ref={dropdownRef}>
                    {label && <label className="block text-gray-700 font-medium mb-2">{label}</label>}
                    <div className="border rounded-lg p-3 bg-white cursor-pointer flex justify-between items-center" onClick={() => setIsOpen(!isOpen)}>
                        <span className={selectedOption ? 'text-gray-800' : 'text-gray-400'}>{selectedOption ? selectedOption.label : placeholder}</span>
                        <i className={`fas fa-chevron-down text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}`}></i>
                    </div>
                    {isOpen && (
                        <div className="dropdown-options mt-1">
                            <div className="p-2 border-b sticky top-0 bg-white">
                                <div className="relative">
                                    <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" className="w-full pl-10 pr-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
                                        placeholder="🔍 Buscar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} onClick={(e) => e.stopPropagation()} />
                                </div>
                            </div>
                            <div className="overflow-y-auto">
                                {filteredOptions.length > 0 ? filteredOptions.map(option => (
                                    <div key={option.value} className={`dropdown-option ${option.value === value ? 'selected' : ''}`} onClick={() => handleSelect(option.value)}>
                                        {renderOption ? renderOption(option) : option.label}
                                    </div>
                                )) : <div className="p-4 text-center text-gray-500 text-sm"><i className="fas fa-inbox text-2xl mb-2"></i><p>{emptyMessage}</p></div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== COMPONENTES ====================
        const StatCard = ({ title, value, icon, color, subtitle, smallText }) => (
            <div className={`bg-white rounded-lg p-4 md:p-6 card-hover shadow-md border-l-4 ${color}`}>
                <div className="flex items-center justify-between">
                    <div>
                        <p className="text-gray-500 text-sm">{title}</p>
                        <p className="text-xl md:text-2xl font-bold text-gray-800">{value}</p>
                        {subtitle && <p className="text-xs text-gray-400 mt-1">{subtitle}</p>}
                        {smallText && <p className="text-xs text-gray-500 mt-1">{smallText}</p>}
                    </div>
                    <div className={`p-3 rounded-full ${color.replace('border-', 'bg-').replace('-400', '-100')}`}>
                        <i className={`fas ${icon} text-xl`}></i>
                    </div>
                </div>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
                        <div className="p-6 border-b flex justify-between items-center">
                            <h3 className="text-xl font-bold text-gray-800">{title}</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        // ==================== APLICAÇÃO PRINCIPAL ====================
        function App() {
            // Estados Principais
            const [activeTab, setActiveTab] = useState('dashboard');
            const [products, setProducts] = useState([]);
            const [purchases, setPurchases] = useState([]);
            const [sales, setSales] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [creditSales, setCreditSales] = useState([]);
            const [resellers, setResellers] = useState([]);
            const [resellerStock, setResellerStock] = useState([]);
            const [resellerSales, setResellerSales] = useState([]);
            const [resellerReturns, setResellerReturns] = useState([]);
            
            // Estados de Modal
            const [showProductModal, setShowProductModal] = useState(false);
            const [showEditProductModal, setShowEditProductModal] = useState(false);
            const [showSaleModal, setShowSaleModal] = useState(false);
            const [showEditSaleModal, setShowEditSaleModal] = useState(false);
            const [showCustomerModal, setShowCustomerModal] = useState(false);
            const [showEditCustomerModal, setShowEditCustomerModal] = useState(false);
            const [showCreditModal, setShowCreditModal] = useState(false);
            const [showDeleteModal, setShowDeleteModal] = useState(false);
            const [showResellerModal, setShowResellerModal] = useState(false);
            const [showEditResellerModal, setShowEditResellerModal] = useState(false);
            const [showTransferModal, setShowTransferModal] = useState(false);
            const [showResellerSaleModal, setShowResellerSaleModal] = useState(false);
            const [showReturnModal, setShowReturnModal] = useState(false);
            
            // Estados para Edição/Exclusão
            const [editingProduct, setEditingProduct] = useState(null);
            const [editingSale, setEditingSale] = useState(null);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [editingReseller, setEditingReseller] = useState(null);
            const [deleteItem, setDeleteItem] = useState(null);
            const [selectedReseller, setSelectedReseller] = useState(null);
            
            // Filtros
            const [customerSort, setCustomerSort] = useState('default');
            const [resellerFilter, setResellerFilter] = useState('all');
            
            // Formulários
            const [productForm, setProductForm] = useState({ name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: '', catalogPrice: '' });
            const [purchaseForm, setPurchaseForm] = useState({ productId: '', quantity: 1, price: 0, date: new Date().toISOString().split('T')[0] });
            const [saleForm, setSaleForm] = useState({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0] });
            const [customerForm, setCustomerForm] = useState({ name: '', phone: '', email: '' });
            const [creditForm, setCreditForm] = useState({ saleId: '', amount: 0, dueDate: '', status: 'pendente' });
            const [resellerForm, setResellerForm] = useState({ name: '', salonName: '', address: '', phone: '', email: '', commissionRate: 25 });
            const [transferForm, setTransferForm] = useState({ resellerId: '', productId: '', quantity: 1, date: new Date().toISOString().split('T')[0] });
            const [resellerSaleForm, setResellerSaleForm] = useState({ resellerId: '', productId: '', quantity: 1, salePrice: 0, date: new Date().toISOString().split('T')[0] });
            const [returnForm, setReturnForm] = useState({ resellerId: '', productId: '', quantity: 1, date: new Date().toISOString().split('T')[0] });

            // Configurações
            const [lowStockThreshold, setLowStockThreshold] = useState(3);
            const [expiryAlertDays, setExpiryAlertDays] = useState(30);
            const [staleProductDays, setStaleProductDays] = useState(30);
            
            const fileInputRef = useRef(null);

            // ==================== PERSISTÊNCIA ====================
            useEffect(() => {
                const loadData = (key) => {
                    const data = localStorage.getItem(`boticario_${key}`);
                    return data ? JSON.parse(data) : [];
                };
                setProducts(loadData('products'));
                setPurchases(loadData('purchases'));
                setSales(loadData('sales'));
                setCustomers(loadData('customers'));
                setCreditSales(loadData('creditSales'));
                setResellers(loadData('resellers'));
                setResellerStock(loadData('resellerStock'));
                setResellerSales(loadData('resellerSales'));
                setResellerReturns(loadData('resellerReturns'));
                
                const config = localStorage.getItem('boticario_config');
                if (config) {
                    const cfg = JSON.parse(config);
                    setLowStockThreshold(cfg.lowStockThreshold || 3);
                    setExpiryAlertDays(cfg.expiryAlertDays || 30);
                    setStaleProductDays(cfg.staleProductDays || 30);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('boticario_products', JSON.stringify(products));
                localStorage.setItem('boticario_purchases', JSON.stringify(purchases));
                localStorage.setItem('boticario_sales', JSON.stringify(sales));
                localStorage.setItem('boticario_customers', JSON.stringify(customers));
                localStorage.setItem('boticario_creditSales', JSON.stringify(creditSales));
                localStorage.setItem('boticario_resellers', JSON.stringify(resellers));
                localStorage.setItem('boticario_resellerStock', JSON.stringify(resellerStock));
                localStorage.setItem('boticario_resellerSales', JSON.stringify(resellerSales));
                localStorage.setItem('boticario_resellerReturns', JSON.stringify(resellerReturns));
                localStorage.setItem('boticario_config', JSON.stringify({ lowStockThreshold, expiryAlertDays, staleProductDays }));
            }, [products, purchases, sales, customers, creditSales, resellers, resellerStock, resellerSales, resellerReturns, lowStockThreshold, expiryAlertDays, staleProductDays]);

            // ==================== CÁLCULOS ====================
            const calculateAveragePrice = (productId) => {
                const productPurchases = purchases.filter(p => p.productId === productId);
                if (productPurchases.length === 0) return 0;
                const totalValue = productPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                const totalQuantity = productPurchases.reduce((sum, p) => sum + parseInt(p.quantity), 0);
                return totalQuantity > 0 ? totalValue / totalQuantity : 0;
            };

            const calculateStock = (productId) => {
                const totalIn = purchases.filter(p => p.productId === productId).reduce((sum, p) => sum + parseInt(p.quantity), 0);
                const totalOut = sales.filter(s => s.productId === productId).reduce((sum, s) => sum + parseInt(s.quantity), 0);
                const totalToResellers = resellerStock.filter(t => t.productId === productId).reduce((sum, t) => sum + parseInt(t.quantity), 0);
                const totalReturned = resellerReturns.filter(r => r.productId === productId).reduce((sum, r) => sum + parseInt(r.quantity), 0);
                const totalResellerSales = resellerSales.filter(s => s.productId === productId).reduce((sum, s) => sum + parseInt(s.quantity), 0);
                return totalIn - totalOut - totalToResellers + totalReturned + totalResellerSales;
            };

            const calculateResellerStock = (resellerId, productId) => {
                const totalIn = resellerStock.filter(t => t.resellerId === resellerId && t.productId === productId).reduce((sum, t) => sum + parseInt(t.quantity), 0);
                const totalSold = resellerSales.filter(s => s.resellerId === resellerId && s.productId === productId).reduce((sum, s) => sum + parseInt(s.quantity), 0);
                const totalReturned = resellerReturns.filter(r => r.resellerId === resellerId && r.productId === productId).reduce((sum, r) => sum + parseInt(r.quantity), 0);
                return totalIn - totalSold - totalReturned;
            };

            // ==================== ALERTAS ====================
            const lowStockProducts = useMemo(() => products.filter(p => calculateStock(p.id) < lowStockThreshold), [products, purchases, sales, resellerStock, resellerSales, resellerReturns, lowStockThreshold]);
            const expiryAlertProducts = useMemo(() => products.filter(p => p.expiryDate && calculateDaysUntilExpiry(p.expiryDate) <= expiryAlertDays), [products, expiryAlertDays]);
            const pendingCreditSales = useMemo(() => creditSales.filter(c => c.status === 'pendente'), [creditSales]);
            
            const staleResellerProducts = useMemo(() => {
                return resellerStock.filter(t => calculateDaysSince(t.date) >= staleProductDays).map(t => {
                    const reseller = resellers.find(r => r.id === t.resellerId);
                    const product = products.find(p => p.id === t.productId);
                    return { ...t, resellerName: reseller?.name, productName: product?.name, days: calculateDaysSince(t.date) };
                });
            }, [resellerStock, resellers, products, staleProductDays]);

            // ==================== RELATÓRIOS ====================
            const financialReport = useMemo(() => {
                const { start, end } = getMonthRange();
                const monthlySales = sales.filter(s => new Date(s.date) >= start && new Date(s.date) <= end);
                const monthlyPurchases = purchases.filter(p => new Date(p.date) >= start && new Date(p.date) <= end);
                const totalSold = monthlySales.reduce((sum, s) => sum + (s.price * s.quantity), 0);
                const totalInvested = monthlyPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                const totalProfit = monthlySales.reduce((sum, s) => sum + ((s.price - calculateAveragePrice(s.productId)) * s.quantity), 0);
                const topProducts = products.map(p => ({ ...p, sold: sales.filter(s => s.productId === p.id).reduce((sum, s) => sum + parseInt(s.quantity), 0) })).sort((a, b) => b.sold - a.sold).slice(0, 5);
                return { totalSold, totalInvested, totalProfit, topProducts, monthlySales, monthlyPurchases };
            }, [sales, purchases, products]);

            // Relatório de Revendedores
            const resellerReport = useMemo(() => {
                return resellers.map(r => {
                    const sales = resellerSales.filter(s => s.resellerId === r.id);
                    const totalSales = sales.reduce((sum, s) => sum + (s.salePrice * s.quantity), 0);
                    const commission = totalSales * (r.commissionRate / 100);
                    const yourEarnings = totalSales - commission;
                    const products = resellerStock.filter(t => t.resellerId === r.id && calculateResellerStock(r.id, t.productId) > 0);
                    return {
                        ...r,
                        totalSales,
                        commission,
                        yourEarnings,
                        productsCount: products.length,
                        salesCount: sales.length
                    };
                });
            }, [resellers, resellerSales, resellerStock]);

            // Valor do Estoque
            const stockValueReport = useMemo(() => {
                let totalPaidValue = 0;
                let totalSaleValue = 0;
                products.forEach(p => {
                    const stock = calculateStock(p.id);
                    if (stock > 0) {
                        const avgPrice = calculateAveragePrice(p.id);
                        totalPaidValue += stock * avgPrice;
                        totalSaleValue += stock * (parseFloat(p.catalogPrice) || 0);
                    }
                });
                return { totalPaidValue, totalSaleValue, potentialProfit: totalSaleValue - totalPaidValue, profitMargin: totalPaidValue > 0 ? ((totalSaleValue - totalPaidValue) / totalPaidValue) * 100 : 0 };
            }, [products, purchases, sales, resellerStock, resellerSales, resellerReturns]);

            // Clientes com Stats
            const customersWithStats = useMemo(() => {
                return customers.map(c => {
                    const customerSales = sales.filter(s => s.customerId === c.id);
                    const totalSpent = customerSales.reduce((sum, s) => sum + (s.price * s.quantity), 0);
                    return { ...c, totalSpent, totalPurchases: customerSales.length };
                });
            }, [customers, sales]);

            // ==================== PRODUTOS ====================
            const handleAddProduct = () => {
                if (!productForm.name) { alert('Nome do produto é obrigatório!'); return; }
                const newProduct = { id: generateId(), ...productForm, catalogPrice: parseFloat(productForm.catalogPrice) || 0, createdAt: new Date().toISOString() };
                setProducts([...products, newProduct]);
                setProductForm({ name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: '', catalogPrice: '' });
                setShowProductModal(false);
            };

            const handleEditProduct = () => {
                if (!editingProduct || !productForm.name) { alert('Nome do produto é obrigatório!'); return; }
                const updatedProducts = products.map(p => p.id === editingProduct.id ? { ...p, ...productForm, catalogPrice: parseFloat(productForm.catalogPrice) || 0 } : p);
                setProducts(updatedProducts);
                setEditingProduct(null);
                setProductForm({ name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: '', catalogPrice: '' });
                setShowEditProductModal(false);
            };

            const openEditProduct = (product) => {
                setEditingProduct(product);
                setProductForm({ name: product.name, category: product.category, fragrance: product.fragrance || '', expiryDate: product.expiryDate || '', cycle: product.cycle || '', catalogPrice: product.catalogPrice || '' });
                setShowEditProductModal(true);
            };

            const handleDeleteProduct = () => { if (!deleteItem) return; setProducts(products.filter(p => p.id !== deleteItem.id)); setDeleteItem(null); setShowDeleteModal(false); };
            const confirmDeleteProduct = (product) => {
                const salesCount = sales.filter(s => s.productId === product.id).length;
                if (salesCount > 0 && !confirm(`Este produto tem ${salesCount} venda(s) registrada(s). Excluir pode afetar os relatórios. Deseja continuar?`)) return;
                setDeleteItem({ type: 'product', ...product });
                setShowDeleteModal(true);
            };

            // ==================== CLIENTES ====================
            const handleAddCustomer = () => {
                if (!customerForm.name) { alert('Nome do cliente é obrigatório!'); return; }
                const newCustomer = { id: generateId(), ...customerForm, createdAt: new Date().toISOString() };
                setCustomers([...customers, newCustomer]);
                setCustomerForm({ name: '', phone: '', email: '' });
                setShowCustomerModal(false);
            };

            const handleEditCustomer = () => {
                if (!editingCustomer || !customerForm.name) { alert('Nome do cliente é obrigatório!'); return; }
                const updatedCustomers = customers.map(c => c.id === editingCustomer.id ? { ...c, ...customerForm } : c);
                setCustomers(updatedCustomers);
                setEditingCustomer(null);
                setCustomerForm({ name: '', phone: '', email: '' });
                setShowEditCustomerModal(false);
            };

            const openEditCustomer = (customer) => {
                setEditingCustomer(customer);
                setCustomerForm({ name: customer.name, phone: customer.phone || '', email: customer.email || '' });
                setShowEditCustomerModal(true);
            };

            const handleDeleteCustomer = () => { if (!deleteItem) return; setCustomers(customers.filter(c => c.id !== deleteItem.id)); setDeleteItem(null); setShowDeleteModal(false); };
            const confirmDeleteCustomer = (customer) => {
                const salesCount = sales.filter(s => s.customerId === customer.id).length;
                if (salesCount > 0 && !confirm(`Este cliente tem ${salesCount} compra(s) registrada(s). Deseja continuar?`)) return;
                setDeleteItem({ type: 'customer', ...customer });
                setShowDeleteModal(true);
            };

            // ==================== REVENDEDORES ====================
            const handleAddReseller = () => {
                if (!resellerForm.name || !resellerForm.salonName) { alert('Nome e Salão são obrigatórios!'); return; }
                const newReseller = { id: generateId(), ...resellerForm, commissionRate: parseFloat(resellerForm.commissionRate) || 25, createdAt: new Date().toISOString(), status: 'ativo' };
                setResellers([...resellers, newReseller]);
                setResellerForm({ name: '', salonName: '', address: '', phone: '', email: '', commissionRate: 25 });
                setShowResellerModal(false);
            };

            const handleEditReseller = () => {
                if (!editingReseller || !resellerForm.name) { alert('Nome é obrigatório!'); return; }
                const updatedResellers = resellers.map(r => r.id === editingReseller.id ? { ...r, ...resellerForm, commissionRate: parseFloat(resellerForm.commissionRate) || 25 } : r);
                setResellers(updatedResellers);
                setEditingReseller(null);
                setResellerForm({ name: '', salonName: '', address: '', phone: '', email: '', commissionRate: 25 });
                setShowEditResellerModal(false);
            };

            const openEditReseller = (reseller) => {
                setEditingReseller(reseller);
                setResellerForm({ name: reseller.name, salonName: reseller.salonName, address: reseller.address || '', phone: reseller.phone || '', email: reseller.email || '', commissionRate: reseller.commissionRate || 25 });
                setShowEditResellerModal(true);
            };

            const handleDeleteReseller = () => {
                if (!deleteItem) return;
                setResellers(resellers.filter(r => r.id !== deleteItem.id));
                setDeleteItem(null);
                setShowDeleteModal(false);
            };

            const confirmDeleteReseller = (reseller) => {
                const stockCount = resellerStock.filter(t => t.resellerId === reseller.id && calculateResellerStock(reseller.id, t.productId) > 0).length;
                if (stockCount > 0) {
                    alert(`Este revendedor tem ${stockCount} produto(s) em stock. Devolva os produtos antes de excluir!`);
                    return;
                }
                setDeleteItem({ type: 'reseller', ...reseller });
                setShowDeleteModal(true);
            };

            // ==================== TRANSFERÊNCIA PARA REVENDEDOR ====================
            const handleTransfer = () => {
                if (!transferForm.resellerId || !transferForm.productId || transferForm.quantity <= 0) { alert('Dados inválidos!'); return; }
                const stock = calculateStock(transferForm.productId);
                if (stock < transferForm.quantity) { alert(`Estoque insuficiente! Disponível: ${stock}`); return; }
                const newTransfer = { id: generateId(), ...transferForm, quantity: parseInt(transferForm.quantity), date: transferForm.date || new Date().toISOString().split('T')[0] };
                setResellerStock([...resellerStock, newTransfer]);
                setTransferForm({ resellerId: '', productId: '', quantity: 1, date: new Date().toISOString().split('T')[0] });
                setShowTransferModal(false);
            };

            // ==================== VENDA DO REVENDEDOR ====================
            const handleResellerSale = () => {
                if (!resellerSaleForm.resellerId || !resellerSaleForm.productId || resellerSaleForm.quantity <= 0) { alert('Dados inválidos!'); return; }
                const resellerStockQty = calculateResellerStock(resellerSaleForm.resellerId, resellerSaleForm.productId);
                if (resellerStockQty < resellerSaleForm.quantity) { alert(`Estoque insuficiente neste revendedor! Disponível: ${resellerStockQty}`); return; }
                
                const reseller = resellers.find(r => r.id === resellerSaleForm.resellerId);
                const product = products.find(p => p.id === resellerSaleForm.productId);
                const salePrice = parseFloat(resellerSaleForm.salePrice);
                const totalSale = salePrice * parseInt(resellerSaleForm.quantity);
                const commission = totalSale * (reseller.commissionRate / 100);
                const yourEarnings = totalSale - commission;
                
                const newSale = {
                    id: generateId(),
                    ...resellerSaleForm,
                    quantity: parseInt(resellerSaleForm.quantity),
                    salePrice,
                    totalSale,
                    commission,
                    yourEarnings,
                    date: resellerSaleForm.date || new Date().toISOString().split('T')[0]
                };
                setResellerSales([...resellerSales, newSale]);
                setResellerSaleForm({ resellerId: '', productId: '', quantity: 1, salePrice: 0, date: new Date().toISOString().split('T')[0] });
                setShowResellerSaleModal(false);
            };

            // ==================== DEVOLUÇÃO DE PRODUTOS ====================
            const handleReturn = () => {
                if (!returnForm.resellerId || !returnForm.productId || returnForm.quantity <= 0) { alert('Dados inválidos!'); return; }
                const resellerStockQty = calculateResellerStock(returnForm.resellerId, returnForm.productId);
                if (resellerStockQty < returnForm.quantity) { alert(`Estoque insuficiente! Disponível: ${resellerStockQty}`); return; }
                const newReturn = { id: generateId(), ...returnForm, quantity: parseInt(returnForm.quantity), date: returnForm.date || new Date().toISOString().split('T')[0] };
                setResellerReturns([...resellerReturns, newReturn]);
                setReturnForm({ resellerId: '', productId: '', quantity: 1, date: new Date().toISOString().split('T')[0] });
                setShowReturnModal(false);
            };

            // ==================== VENDAS ====================
            const handleAddSale = () => {
                if (!saleForm.productId || saleForm.quantity <= 0) { alert('Produto e quantidade válidos são obrigatórios!'); return; }
                const stock = calculateStock(saleForm.productId);
                if (stock < saleForm.quantity) { alert(`Estoque insuficiente! Disponível: ${stock}`); return; }
                const newSale = { id: generateId(), ...saleForm, quantity: parseInt(saleForm.quantity), price: parseFloat(saleForm.price), profit: (parseFloat(saleForm.price) - calculateAveragePrice(saleForm.productId)) * parseInt(saleForm.quantity) };
                setSales([...sales, newSale]);
                if (saleForm.paymentMethod === 'credito') {
                    setCreditForm({ saleId: newSale.id, amount: newSale.price * newSale.quantity, dueDate: new Date(new Date().setDate(new Date().getDate() + 30)).toISOString().split('T')[0], status: 'pendente' });
                    setShowCreditModal(true);
                }
                setSaleForm({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0] });
                setShowSaleModal(false);
            };

            const handleEditSale = () => {
                if (!editingSale || !saleForm.productId || saleForm.quantity <= 0) { alert('Dados inválidos!'); return; }
                const updatedSales = sales.map(s => {
                    if (s.id === editingSale.id) {
                        const newQuantity = parseInt(saleForm.quantity);
                        const newPrice = parseFloat(saleForm.price);
                        return { ...s, ...saleForm, quantity: newQuantity, price: newPrice, profit: (newPrice - calculateAveragePrice(saleForm.productId)) * newQuantity };
                    }
                    return s;
                });
                setSales(updatedSales);
                setEditingSale(null);
                setSaleForm({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0] });
                setShowEditSaleModal(false);
            };

            const openEditSale = (sale) => {
                setEditingSale(sale);
                setSaleForm({ productId: sale.productId, customerId: sale.customerId || '', quantity: sale.quantity, price: sale.price, paymentMethod: sale.paymentMethod, date: sale.date });
                setShowEditSaleModal(true);
            };

            const handleDeleteSale = () => { if (!deleteItem) return; setSales(sales.filter(s => s.id !== deleteItem.id)); setDeleteItem(null); setShowDeleteModal(false); };
            const confirmDeleteSale = (sale) => { setDeleteItem({ type: 'sale', ...sale }); setShowDeleteModal(true); };

            // ==================== OUTROS HANDLERS ====================
            const handleAddPurchase = () => {
                if (!purchaseForm.productId || purchaseForm.quantity <= 0) { alert('Produto e quantidade válidos são obrigatórios!'); return; }
                const newPurchase = { id: generateId(), ...purchaseForm, quantity: parseInt(purchaseForm.quantity), price: parseFloat(purchaseForm.price) };
                setPurchases([...purchases, newPurchase]);
                setPurchaseForm({ productId: '', quantity: 1, price: 0, date: new Date().toISOString().split('T')[0] });
            };

            const handleAddCredit = () => {
                if (!creditForm.saleId || creditForm.amount <= 0) { alert('Dados inválidos!'); return; }
                const newCredit = { id: generateId(), ...creditForm, amount: parseFloat(creditForm.amount), createdAt: new Date().toISOString() };
                setCreditSales([...creditSales, newCredit]);
                setCreditForm({ saleId: '', amount: 0, dueDate: '', status: 'pendente' });
                setShowCreditModal(false);
            };

            const markCreditAsPaid = (creditId) => { setCreditSales(creditSales.map(c => c.id === creditId ? { ...c, status: 'pago' } : c)); };

            // ==================== EXPORTAR/IMPORTAR ====================
            const exportData = () => {
                const data = {
                    exportDate: new Date().toISOString(),
                    version: '2.0',
                    products, purchases, sales, customers, creditSales,
                    resellers, resellerStock, resellerSales, resellerReturns,
                    config: { lowStockThreshold, expiryAlertDays, staleProductDays }
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_boticario_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleImportFile = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.products) { alert('Arquivo inválido!'); return; }
                        if (confirm(`Importar dados?\n• Produtos: ${data.products?.length || 0}\n• Revendedores: ${data.resellers?.length || 0}\n\n⚠️ Isso vai SUBSTITUIR todos os dados atuais!`)) {
                            if (data.products) setProducts(data.products);
                            if (data.purchases) setPurchases(data.purchases);
                            if (data.sales) setSales(data.sales);
                            if (data.customers) setCustomers(data.customers);
                            if (data.creditSales) setCreditSales(data.creditSales);
                            if (data.resellers) setResellers(data.resellers);
                            if (data.resellerStock) setResellerStock(data.resellerStock);
                            if (data.resellerSales) setResellerSales(data.resellerSales);
                            if (data.resellerReturns) setResellerReturns(data.resellerReturns);
                            if (data.config) { setLowStockThreshold(data.config.lowStockThreshold || 3); setExpiryAlertDays(data.config.expiryAlertDays || 30); setStaleProductDays(data.config.staleProductDays || 30); }
                            alert('✅ Dados importados com sucesso!');
                            setActiveTab('dashboard');
                        }
                    } catch (error) { alert('Erro ao ler arquivo!'); }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const triggerImport = () => { fileInputRef.current.click(); };

            // ==================== STOCK DATA ====================
            const stockData = useMemo(() => products.map(p => ({ ...p, stock: calculateStock(p.id), avgPrice: calculateAveragePrice(p.id), daysToExpiry: p.expiryDate ? calculateDaysUntilExpiry(p.expiryDate) : null })), [products, purchases, sales, resellerStock, resellerSales, resellerReturns]);

            // ==================== OPÇÕES PARA DROPDOWNS ====================
            const productOptions = useMemo(() => products.map(p => ({ value: p.id, label: p.name, stock: calculateStock(p.id), avgPrice: calculateAveragePrice(p.id) })), [products, purchases, sales, resellerStock, resellerSales, resellerReturns]);
            const customerOptions = useMemo(() => customers.map(c => ({ value: c.id, label: c.name, phone: c.phone || '' })), [customers]);
            const resellerOptions = useMemo(() => resellers.map(r => ({ value: r.id, label: r.name, salon: r.salonName })), [resellers]);

            // ==================== RENDER ====================
            return (
                <div className="min-h-screen">
                    <input type="file" ref={fileInputRef} onChange={handleImportFile} accept=".json" style={{ display: 'none' }} />

                    {/* Header */}
                    <header className="boticario-gradient text-white p-4 md:p-6 shadow-lg">
                        <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 className="text-xl md:text-3xl font-bold"><i className="fas fa-store mr-3"></i>Gestão O Boticário</h1>
                                <p className="text-white/80 mt-1 text-xs md:text-sm">Controle de vendas, estoque e revendedores</p>
                            </div>
                            <div className="flex gap-2 flex-wrap">
                                <button onClick={triggerImport} className="bg-green-600 hover:bg-green-700 px-3 py-2 rounded-lg transition text-sm">
                                    <i className="fas fa-upload mr-2"></i><span className="hidden sm:inline">Importar</span>
                                </button>
                                <button onClick={exportData} className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition text-sm">
                                    <i className="fas fa-download mr-2"></i><span className="hidden sm:inline">Exportar</span>
                                </button>
                                <button onClick={() => setActiveTab('config')} className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition">
                                    <i className="fas fa-cog"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex overflow-x-auto">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-line' },
                                    { id: 'stock', label: 'Stock', icon: 'fa-warehouse' },
                                    { id: 'resellers', label: 'Revendedores', icon: 'fa-handshake' },
                                    { id: 'products', label: 'Produtos', icon: 'fa-box' },
                                    { id: 'sales', label: 'Vendas', icon: 'fa-shopping-cart' },
                                    { id: 'purchases', label: 'Compras', icon: 'fa-truck' },
                                    { id: 'customers', label: 'Clientes', icon: 'fa-users' },
                                    { id: 'reports', label: 'Relatórios', icon: 'fa-file-invoice-dollar' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-3 md:px-6 py-4 flex items-center gap-2 border-b-2 transition whitespace-nowrap ${activeTab === tab.id ? 'border-purple-600 text-purple-600' : 'border-transparent text-gray-600 hover:text-purple-600'}`}>
                                        <i className={`fas ${tab.icon}`}></i>
                                        <span className="hidden md:inline">{tab.label}</span>
                                        {tab.id === 'resellers' && resellers.length > 0 && <span className="bg-purple-600 text-white text-xs px-2 py-0.5 rounded-full">{resellers.length}</span>}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto p-4 md:p-6">
                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <StatCard title="Vendas do Mês" value={formatCurrency(financialReport.totalSold)} icon="fa-shopping-cart" color="border-green-400" />
                                    <StatCard title="Investido no Mês" value={formatCurrency(financialReport.totalInvested)} icon="fa-wallet" color="border-red-400" />
                                    <StatCard title="Lucro Líquido" value={formatCurrency(financialReport.totalProfit)} icon="fa-coins" color="border-blue-400" />
                                    <StatCard title="Revendedores Ativos" value={resellers.filter(r => r.status === 'ativo').length} icon="fa-handshake" color="border-purple-400" />
                                </div>

                                {/* Cards de Revendedores */}
                                {resellers.length > 0 && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <StatCard title="💰 Vendas Revendedores (Mês)" value={formatCurrency(resellerSales.filter(s => new Date(s.date) >= getMonthRange().start).reduce((sum, s) => sum + s.totalSale, 0))} icon="fa-store" color="border-green-400" />
                                        <StatCard title="📦 Produtos em Comodato" value={resellerStock.filter(t => calculateResellerStock(t.resellerId, t.productId) > 0).length} icon="fa-boxes" color="border-purple-400" />
                                        <StatCard title="💵 A Receber de Revendedores" value={formatCurrency(resellerSales.reduce((sum, s) => sum + s.yourEarnings, 0) - resellerSales.filter(s => s.paid).reduce((sum, s) => sum + s.yourEarnings, 0))} icon="fa-euro-sign" color="border-yellow-400" />
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <StatCard title="📦 Estoque (Preço Pago)" value={formatCurrency(stockValueReport.totalPaidValue)} icon="fa-boxes" color="border-purple-400" smallText="Quanto você investiu" />
                                    <StatCard title="💰 Estoque (Preço Venda)" value={formatCurrency(stockValueReport.totalSaleValue)} icon="fa-tag" color="border-green-400" smallText="Preço catálogo" />
                                    <StatCard title="🎯 Lucro Potencial" value={formatCurrency(stockValueReport.potentialProfit)} icon="fa-chart-line" color={stockValueReport.potentialProfit >= 0 ? "border-green-400" : "border-red-400"} smallText={`Margem: ${stockValueReport.profitMargin.toFixed(1)}%`} />
                                </div>

                                {/* Alertas */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                    {lowStockProducts.length > 0 && (
                                        <div className="alert-red rounded-lg p-4">
                                            <h3 className="font-bold text-red-800 mb-2"><i className="fas fa-exclamation-triangle mr-2"></i>Estoque Baixo ({lowStockProducts.length})</h3>
                                            <ul className="space-y-1">{lowStockProducts.slice(0, 5).map(p => <li key={p.id} className="text-red-700 text-sm">• {p.name} - {calculateStock(p.id)} un.</li>)}</ul>
                                        </div>
                                    )}
                                    {expiryAlertProducts.length > 0 && (
                                        <div className="alert-yellow rounded-lg p-4">
                                            <h3 className="font-bold text-yellow-800 mb-2"><i className="fas fa-clock mr-2"></i>Validade Próxima ({expiryAlertProducts.length})</h3>
                                            <ul className="space-y-1">{expiryAlertProducts.slice(0, 5).map(p => <li key={p.id} className="text-yellow-700 text-sm">• {p.name} - {calculateDaysUntilExpiry(p.expiryDate)} dias</li>)}</ul>
                                        </div>
                                    )}
                                    {staleResellerProducts.length > 0 && (
                                        <div className="alert-blue rounded-lg p-4">
                                            <h3 className="font-bold text-blue-800 mb-2"><i className="fas fa-exclamation-circle mr-2"></i>Produtos Parados ({staleResellerProducts.length})</h3>
                                            <ul className="space-y-1">{staleResellerProducts.slice(0, 5).map(p => <li key={p.id} className="text-blue-700 text-sm">• {p.productName} em {p.resellerName} - {p.days} dias</li>)}</ul>
                                        </div>
                                    )}
                                </div>

                                {/* Top Revendedores */}
                                {resellers.length > 0 && (
                                    <div className="bg-white rounded-lg shadow-md p-6">
                                        <h3 className="text-xl font-bold text-gray-800 mb-4"><i className="fas fa-trophy text-yellow-500 mr-2"></i>Top Revendedores</h3>
                                        <div className="space-y-3">
                                            {resellerReport.sort((a, b) => b.totalSales - a.totalSales).slice(0, 5).map((r, idx) => (
                                                <div key={r.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                                    <div className="flex items-center gap-3">
                                                        <span className={`w-8 h-8 rounded-full flex items-center justify-center text-white font-bold ${idx === 0 ? 'bg-yellow-500' : idx === 1 ? 'bg-gray-400' : idx === 2 ? 'bg-orange-500' : 'bg-gray-300'}`}>{idx + 1}</span>
                                                        <div>
                                                            <p className="font-medium">{r.salonName}</p>
                                                            <p className="text-xs text-gray-500">{r.name}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-bold text-purple-600">{formatCurrency(r.totalSales)}</p>
                                                        <p className="text-xs text-gray-500">{r.salesCount} vendas</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* REVENDEDORES - NOVA ABA */}
                        {activeTab === 'resellers' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800"><i className="fas fa-handshake mr-2"></i>Gestão de Revendedores</h2>
                                    <button onClick={() => setShowResellerModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-plus mr-2"></i>Novo Revendedor
                                    </button>
                                </div>

                                {/* Resumo */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg p-4">
                                        <p className="text-purple-100 text-sm">Total Revendedores</p>
                                        <p className="text-2xl font-bold">{resellers.length}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4">
                                        <p className="text-green-100 text-sm">Vendas Totais</p>
                                        <p className="text-2xl font-bold">{formatCurrency(resellerSales.reduce((sum, s) => sum + s.totalSale, 0))}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg p-4">
                                        <p className="text-blue-100 text-sm">Seu Ganho (75%)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(resellerSales.reduce((sum, s) => sum + s.yourEarnings, 0))}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-orange-500 to-orange-600 text-white rounded-lg p-4">
                                        <p className="text-orange-100 text-sm">Comissões (25%)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(resellerSales.reduce((sum, s) => sum + s.commission, 0))}</p>
                                    </div>
                                </div>

                                {/* Lista de Revendedores */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {resellerReport.map(r => (
                                        <div key={r.id} className="bg-white rounded-lg shadow-md p-4 card-hover">
                                            <div className="flex items-start justify-between mb-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                                        <i className="fas fa-store text-purple-600 text-xl"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold">{r.salonName}</h3>
                                                        <p className="text-gray-500 text-sm">{r.name}</p>
                                                        <span className={`text-xs px-2 py-0.5 rounded ${r.status === 'ativo' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}`}>{r.status}</span>
                                                    </div>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => { setSelectedReseller(r); setShowTransferModal(true); }} className="btn-transfer text-white px-2 py-1 rounded text-xs" title="Transferir Stock">
                                                        <i className="fas fa-exchange-alt"></i>
                                                    </button>
                                                    <button onClick={() => { setSelectedReseller(r); setShowResellerSaleModal(true); }} className="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-xs" title="Registrar Venda">
                                                        <i className="fas fa-shopping-cart"></i>
                                                    </button>
                                                    <button onClick={() => { setSelectedReseller(r); setShowReturnModal(true); }} className="bg-orange-600 hover:bg-orange-700 text-white px-2 py-1 rounded text-xs" title="Devolver Produtos">
                                                        <i className="fas fa-undo"></i>
                                                    </button>
                                                    <button onClick={() => openEditReseller(r)} className="btn-edit text-white px-2 py-1 rounded text-xs" title="Editar">
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                    <button onClick={() => confirmDeleteReseller(r)} className="btn-delete text-white px-2 py-1 rounded text-xs" title="Excluir">
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="space-y-2 text-sm">
                                                <p><i className="fas fa-phone mr-2 text-gray-400"></i>{r.phone || 'Sem telefone'}</p>
                                                <p><i className="fas fa-envelope mr-2 text-gray-400"></i>{r.email || 'Sem email'}</p>
                                                <p><i className="fas fa-percentage mr-2 text-gray-400"></i>Comissão: {r.commissionRate}%</p>
                                                <div className="pt-2 border-t">
                                                    <div className="flex justify-between">
                                                        <span className="text-gray-500">Vendas:</span>
                                                        <span className="font-bold">{formatCurrency(r.totalSales)}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-gray-500">Seu ganho (75%):</span>
                                                        <span className="font-bold text-green-600">{formatCurrency(r.yourEarnings)}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-gray-500">Comissão (25%):</span>
                                                        <span className="font-bold text-orange-600">{formatCurrency(r.commission)}</span>
                                                    </div>
                                                    <div className="flex justify-between mt-2 pt-2 border-t">
                                                        <span className="text-gray-500">Produtos em stock:</span>
                                                        <span className="font-bold">{r.productsCount}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {resellers.length === 0 && (
                                    <div className="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">
                                        <i className="fas fa-handshake text-4xl mb-3"></i>
                                        <p>Nenhum revendedor cadastrado</p>
                                        <p className="text-sm mt-2">Cadastre salões de beleza para gerenciar produtos em comodato</p>
                                    </div>
                                )}

                                {/* Stock por Revendedor */}
                                {resellers.length > 0 && (
                                    <div className="bg-white rounded-lg shadow-md p-6">
                                        <h3 className="text-xl font-bold text-gray-800 mb-4"><i className="fas fa-boxes mr-2"></i>Stock em Revendedores</h3>
                                        <div className="overflow-x-auto">
                                            <table className="w-full">
                                                <thead className="bg-gray-50">
                                                    <tr>
                                                        <th className="p-3 text-left">Revendedor</th>
                                                        <th className="p-3 text-left">Produto</th>
                                                        <th className="p-3 text-center">Quantidade</th>
                                                        <th className="p-3 text-left">Data Transferência</th>
                                                        <th className="p-3 text-center">Dias</th>
                                                        <th className="p-3 text-center">Status</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {resellerStock.filter(t => calculateResellerStock(t.resellerId, t.productId) > 0).map(t => {
                                                        const reseller = resellers.find(r => r.id === t.resellerId);
                                                        const product = products.find(p => p.id === t.productId);
                                                        const qty = calculateResellerStock(t.resellerId, t.productId);
                                                        const days = calculateDaysSince(t.date);
                                                        return (
                                                            <tr key={t.id} className="border-t">
                                                                <td className="p-3">
                                                                    <p className="font-medium">{reseller?.salonName}</p>
                                                                    <p className="text-xs text-gray-500">{reseller?.name}</p>
                                                                </td>
                                                                <td className="p-3">{product?.name || 'Produto removido'}</td>
                                                                <td className="p-3 text-center font-bold">{qty} un.</td>
                                                                <td className="p-3">{formatDate(t.date)}</td>
                                                                <td className="p-3 text-center">
                                                                    <span className={days >= staleProductDays ? 'text-orange-600 font-bold' : 'text-gray-600'}>{days} dias</span>
                                                                </td>
                                                                <td className="p-3 text-center">
                                                                    {days >= staleProductDays ? (
                                                                        <span className="px-2 py-1 bg-orange-100 text-orange-800 rounded text-xs">Parado</span>
                                                                    ) : (
                                                                        <span className="px-2 py-1 bg-green-100 text-green-800 rounded text-xs">Ativo</span>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                            {resellerStock.filter(t => calculateResellerStock(t.resellerId, t.productId) > 0).length === 0 && (
                                                <p className="text-gray-500 text-center py-4">Nenhum produto em revendedores</p>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* STOCK */}
                        {activeTab === 'stock' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800"><i className="fas fa-warehouse mr-2"></i>Controle de Stock</h2>
                                    <div className="flex gap-2">
                                        <span className="text-sm text-gray-600 bg-white px-3 py-2 rounded-lg shadow"><i className="fas fa-box mr-2"></i>{products.length} produtos</span>
                                        <span className="text-sm text-gray-600 bg-white px-3 py-2 rounded-lg shadow"><i className="fas fa-exclamation-triangle mr-2 text-red-500"></i>{lowStockProducts.length} críticos</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg p-4">
                                        <p className="text-purple-100 text-sm">Valor Pago em Stock</p>
                                        <p className="text-2xl font-bold">{formatCurrency(stockValueReport.totalPaidValue)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4">
                                        <p className="text-green-100 text-sm">Valor Venda em Stock</p>
                                        <p className="text-2xl font-bold">{formatCurrency(stockValueReport.totalSaleValue)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg p-4">
                                        <p className="text-blue-100 text-sm">Lucro Potencial</p>
                                        <p className="text-2xl font-bold">{formatCurrency(stockValueReport.potentialProfit)}</p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[800px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Categoria</th>
                                                <th className="p-4 text-center">Stock</th>
                                                <th className="p-4 text-center">Status</th>
                                                <th className="p-4 text-left">Preço Catálogo</th>
                                                <th className="p-4 text-left">Validade</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {stockData.map(p => (
                                                <tr key={p.id} className={`border-t ${p.stock < lowStockThreshold ? 'bg-red-50' : ''}`}>
                                                    <td className="p-4 font-medium">{p.name}</td>
                                                    <td className="p-4"><span className="px-2 py-1 bg-purple-100 text-purple-800 rounded text-sm">{p.category}</span></td>
                                                    <td className="p-4 text-center"><span className={`font-bold text-lg ${p.stock === 0 ? 'text-red-600' : p.stock < lowStockThreshold ? 'text-orange-600' : 'text-green-600'}`}>{p.stock}</span></td>
                                                    <td className="p-4 text-center">
                                                        {p.stock === 0 ? <span className="px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-bold">SEM STOCK</span> : p.stock < lowStockThreshold ? <span className="px-2 py-1 bg-orange-100 text-orange-800 rounded text-xs font-bold">BAIXO</span> : <span className="px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-bold">OK</span>}
                                                    </td>
                                                    <td className="p-4">{formatCurrency(parseFloat(p.catalogPrice) || 0)}</td>
                                                    <td className="p-4">{p.expiryDate ? <span className={p.daysToExpiry <= expiryAlertDays ? 'text-red-600 font-bold' : ''}>{formatDate(p.expiryDate)}{p.daysToExpiry && p.daysToExpiry <= expiryAlertDays && ` (${p.daysToExpiry}d)`}</span> : '-'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* PRODUTOS */}
                        {activeTab === 'products' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Cadastro de Produtos</h2>
                                    <button onClick={() => setShowProductModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-plus mr-2"></i>Novo Produto
                                    </button>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[900px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Categoria</th>
                                                <th className="p-4 text-left">Preço Catálogo</th>
                                                <th className="p-4 text-center">Stock</th>
                                                <th className="p-4 text-left">Validade</th>
                                                <th className="p-4 text-center">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {products.map(p => {
                                                const stock = calculateStock(p.id);
                                                return (
                                                    <tr key={p.id} className="border-t">
                                                        <td className="p-4 font-medium">{p.name}</td>
                                                        <td className="p-4"><span className="px-2 py-1 bg-purple-100 text-purple-800 rounded text-sm">{p.category}</span></td>
                                                        <td className="p-4">{formatCurrency(parseFloat(p.catalogPrice) || 0)}</td>
                                                        <td className="p-4 text-center"><span className={`font-bold ${stock < lowStockThreshold ? 'text-red-600' : 'text-green-600'}`}>{stock} un.</span></td>
                                                        <td className="p-4">{p.expiryDate ? formatDate(p.expiryDate) : '-'}</td>
                                                        <td className="p-4 text-center">
                                                            <div className="flex justify-center gap-2">
                                                                <button onClick={() => openEditProduct(p)} className="btn-edit text-white px-3 py-1 rounded text-sm"><i className="fas fa-edit"></i></button>
                                                                <button onClick={() => confirmDeleteProduct(p)} className="btn-delete text-white px-3 py-1 rounded text-sm"><i className="fas fa-trash"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* VENDAS */}
                        {activeTab === 'sales' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Registro de Vendas</h2>
                                    <button onClick={() => setShowSaleModal(true)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-plus mr-2"></i>Nova Venda
                                    </button>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[900px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Data</th>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Cliente</th>
                                                <th className="p-4 text-center">Qtd</th>
                                                <th className="p-4 text-left">Total</th>
                                                <th className="p-4 text-left">Lucro</th>
                                                <th className="p-4 text-center">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sales.slice().reverse().map(s => {
                                                const product = products.find(p => p.id === s.productId);
                                                const customer = customers.find(c => c.id === s.customerId);
                                                return (
                                                    <tr key={s.id} className="border-t">
                                                        <td className="p-4">{formatDate(s.date)}</td>
                                                        <td className="p-4 font-medium">{product?.name || 'Produto removido'}</td>
                                                        <td className="p-4">{customer?.name || 'Não informado'}</td>
                                                        <td className="p-4 text-center">{s.quantity}</td>
                                                        <td className="p-4 font-bold">{formatCurrency(s.price * s.quantity)}</td>
                                                        <td className="p-4"><span className={s.profit >= 0 ? 'text-green-600' : 'text-red-600'}>{formatCurrency(s.profit)}</span></td>
                                                        <td className="p-4 text-center">
                                                            <div className="flex justify-center gap-2">
                                                                <button onClick={() => openEditSale(s)} className="btn-edit text-white px-3 py-1 rounded text-sm"><i className="fas fa-edit"></i></button>
                                                                <button onClick={() => confirmDeleteSale(s)} className="btn-delete text-white px-3 py-1 rounded text-sm"><i className="fas fa-trash"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* COMPRAS */}
                        {activeTab === 'purchases' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Gestão de Compras</h2>
                                </div>
