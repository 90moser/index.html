<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Revenda O Boticário</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .boticario-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .alert-red { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .alert-yellow { background-color: #fef3c7; border-left: 4px solid #f59e0b; }
        .alert-green { background-color: #d1fae5; border-left: 4px solid #10b981; }
        .modal-overlay { background-color: rgba(0,0,0,0.5); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==================== UTILITÁRIOS ====================
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        
        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { 
            style: 'currency', currency: 'BRL' 
        }).format(value);

        const formatDate = (date) => new Date(date).toLocaleDateString('pt-BR');

        const calculateDaysUntilExpiry = (expiryDate) => {
            const today = new Date();
            const expiry = new Date(expiryDate);
            const diffTime = expiry - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const getMonthRange = () => {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), 1);
            const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            return { start, end };
        };

        // ==================== COMPONENTES ====================

        // Card de Estatísticas
        const StatCard = ({ title, value, icon, color, subtitle }) => (
            <div className={`bg-white rounded-lg p-6 card-hover shadow-md border-l-4 ${color}`}>
                <div className="flex items-center justify-between">
                    <div>
                        <p className="text-gray-500 text-sm">{title}</p>
                        <p className="text-2xl font-bold text-gray-800">{value}</p>
                        {subtitle && <p className="text-xs text-gray-400 mt-1">{subtitle}</p>}
                    </div>
                    <div className={`p-3 rounded-full ${color.replace('border-', 'bg-').replace('-400', '-100')}`}>
                        <i className={`fas ${icon} text-xl`}></i>
                    </div>
                </div>
            </div>
        );

        // Modal Genérico
        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
                        <div className="p-6 border-b flex justify-between items-center">
                            <h3 className="text-xl font-bold text-gray-800">{title}</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        // ==================== APLICAÇÃO PRINCIPAL ====================
        function App() {
            // Estados Principais
            const [activeTab, setActiveTab] = useState('dashboard');
            const [products, setProducts] = useState([]);
            const [purchases, setPurchases] = useState([]);
            const [sales, setSales] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [creditSales, setCreditSales] = useState([]);
            
            // Estados de Modal
            const [showProductModal, setShowProductModal] = useState(false);
            const [showSaleModal, setShowSaleModal] = useState(false);
            const [showCustomerModal, setShowCustomerModal] = useState(false);
            const [showCreditModal, setShowCreditModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            
            // Formulários
            const [productForm, setProductForm] = useState({
                name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: ''
            });
            const [purchaseForm, setPurchaseForm] = useState({
                productId: '', quantity: 1, price: 0, date: new Date().toISOString().split('T')[0]
            });
            const [saleForm, setSaleForm] = useState({
                productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'pix', date: new Date().toISOString().split('T')[0]
            });
            const [customerForm, setCustomerForm] = useState({ name: '', phone: '', email: '' });
            const [creditForm, setCreditForm] = useState({
                saleId: '', amount: 0, dueDate: '', status: 'pendente'
            });

            // Configurações
            const [lowStockThreshold, setLowStockThreshold] = useState(3);
            const [expiryAlertDays, setExpiryAlertDays] = useState(30);
            
            // Ref para input de arquivo
            const fileInputRef = useRef(null);

            // ==================== PERSISTÊNCIA ====================
            useEffect(() => {
                const loadData = (key) => {
                    const data = localStorage.getItem(`boticario_${key}`);
                    return data ? JSON.parse(data) : [];
                };
                setProducts(loadData('products'));
                setPurchases(loadData('purchases'));
                setSales(loadData('sales'));
                setCustomers(loadData('customers'));
                setCreditSales(loadData('creditSales'));
                
                const config = localStorage.getItem('boticario_config');
                if (config) {
                    const cfg = JSON.parse(config);
                    setLowStockThreshold(cfg.lowStockThreshold || 3);
                    setExpiryAlertDays(cfg.expiryAlertDays || 30);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('boticario_products', JSON.stringify(products));
                localStorage.setItem('boticario_purchases', JSON.stringify(purchases));
                localStorage.setItem('boticario_sales', JSON.stringify(sales));
                localStorage.setItem('boticario_customers', JSON.stringify(customers));
                localStorage.setItem('boticario_creditSales', JSON.stringify(creditSales));
                localStorage.setItem('boticario_config', JSON.stringify({ lowStockThreshold, expiryAlertDays }));
            }, [products, purchases, sales, customers, creditSales, lowStockThreshold, expiryAlertDays]);

            // ==================== CÁLCULOS DE PREÇO MÉDIO ====================
            const calculateAveragePrice = (productId) => {
                const productPurchases = purchases.filter(p => p.productId === productId);
                if (productPurchases.length === 0) return 0;
                
                const totalValue = productPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                const totalQuantity = productPurchases.reduce((sum, p) => sum + parseInt(p.quantity), 0);
                
                return totalQuantity > 0 ? totalValue / totalQuantity : 0;
            };

            const calculateStock = (productId) => {
                const totalIn = purchases
                    .filter(p => p.productId === productId)
                    .reduce((sum, p) => sum + parseInt(p.quantity), 0);
                
                const totalOut = sales
                    .filter(s => s.productId === productId)
                    .reduce((sum, s) => sum + parseInt(s.quantity), 0);
                
                return totalIn - totalOut;
            };

            // ==================== ALERTAS ====================
            const lowStockProducts = useMemo(() => {
                return products.filter(p => calculateStock(p.id) < lowStockThreshold);
            }, [products, purchases, sales, lowStockThreshold]);

            const expiryAlertProducts = useMemo(() => {
                return products.filter(p => {
                    if (!p.expiryDate) return false;
                    return calculateDaysUntilExpiry(p.expiryDate) <= expiryAlertDays;
                });
            }, [products, expiryAlertDays]);

            const pendingCreditSales = useMemo(() => {
                return creditSales.filter(c => c.status === 'pendente');
            }, [creditSales]);

            // ==================== RELATÓRIOS FINANCEIROS ====================
            const financialReport = useMemo(() => {
                const { start, end } = getMonthRange();
                
                const monthlySales = sales.filter(s => {
                    const saleDate = new Date(s.date);
                    return saleDate >= start && saleDate <= end;
                });

                const monthlyPurchases = purchases.filter(p => {
                    const purchaseDate = new Date(p.date);
                    return purchaseDate >= start && purchaseDate <= end;
                });

                const totalSold = monthlySales.reduce((sum, s) => sum + (s.price * s.quantity), 0);
                const totalInvested = monthlyPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                
                const totalProfit = monthlySales.reduce((sum, s) => {
                    const avgPrice = calculateAveragePrice(s.productId);
                    return sum + ((s.price - avgPrice) * s.quantity);
                }, 0);

                const topProducts = products.map(p => ({
                    ...p,
                    sold: sales.filter(s => s.productId === p.id).reduce((sum, s) => sum + parseInt(s.quantity), 0)
                })).sort((a, b) => b.sold - a.sold).slice(0, 5);

                return { totalSold, totalInvested, totalProfit, topProducts, monthlySales, monthlyPurchases };
            }, [sales, purchases, products]);

            // ==================== HANDLERS ====================
            const handleAddProduct = () => {
                if (!productForm.name) {
                    alert('Nome do produto é obrigatório!');
                    return;
                }
                const newProduct = {
                    id: generateId(),
                    ...productForm,
                    createdAt: new Date().toISOString()
                };
                setProducts([...products, newProduct]);
                setProductForm({ name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: '' });
                setShowProductModal(false);
            };

            const handleAddPurchase = () => {
                if (!purchaseForm.productId || purchaseForm.quantity <= 0) {
                    alert('Produto e quantidade válidos são obrigatórios!');
                    return;
                }
                const newPurchase = {
                    id: generateId(),
                    ...purchaseForm,
                    quantity: parseInt(purchaseForm.quantity),
                    price: parseFloat(purchaseForm.price)
                };
                setPurchases([...purchases, newPurchase]);
                setPurchaseForm({ productId: '', quantity: 1, price: 0, date: new Date().toISOString().split('T')[0] });
            };

            const handleAddSale = () => {
                if (!saleForm.productId || saleForm.quantity <= 0) {
                    alert('Produto e quantidade válidos são obrigatórios!');
                    return;
                }
                
                const stock = calculateStock(saleForm.productId);
                if (stock < saleForm.quantity) {
                    alert(`Estoque insuficiente! Disponível: ${stock}`);
                    return;
                }

                const newSale = {
                    id: generateId(),
                    ...saleForm,
                    quantity: parseInt(saleForm.quantity),
                    price: parseFloat(saleForm.price),
                    profit: (parseFloat(saleForm.price) - calculateAveragePrice(saleForm.productId)) * parseInt(saleForm.quantity)
                };
                setSales([...sales, newSale]);
                
                if (saleForm.paymentMethod === 'credito') {
                    setCreditForm({
                        saleId: newSale.id,
                        amount: newSale.price * newSale.quantity,
                        dueDate: new Date(new Date().setDate(new Date().getDate() + 30)).toISOString().split('T')[0],
                        status: 'pendente'
                    });
                    setShowCreditModal(true);
                }
                
                setSaleForm({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'pix', date: new Date().toISOString().split('T')[0] });
                setShowSaleModal(false);
            };

            const handleAddCustomer = () => {
                if (!customerForm.name) {
                    alert('Nome do cliente é obrigatório!');
                    return;
                }
                const newCustomer = {
                    id: generateId(),
                    ...customerForm,
                    createdAt: new Date().toISOString()
                };
                setCustomers([...customers, newCustomer]);
                setCustomerForm({ name: '', phone: '', email: '' });
                setShowCustomerModal(false);
            };

            const handleAddCredit = () => {
                if (!creditForm.saleId || creditForm.amount <= 0) {
                    alert('Dados inválidos!');
                    return;
                }
                const newCredit = {
                    id: generateId(),
                    ...creditForm,
                    amount: parseFloat(creditForm.amount),
                    createdAt: new Date().toISOString()
                };
                setCreditSales([...creditSales, newCredit]);
                setCreditForm({ saleId: '', amount: 0, dueDate: '', status: 'pendente' });
                setShowCreditModal(false);
            };

            const markCreditAsPaid = (creditId) => {
                setCreditSales(creditSales.map(c => 
                    c.id === creditId ? { ...c, status: 'pago' } : c
                ));
            };

            // ==================== EXPORTAR ====================
            const exportData = () => {
                const data = {
                    exportDate: new Date().toISOString(),
                    version: '1.1',
                    products,
                    purchases,
                    sales,
                    customers,
                    creditSales,
                    config: { lowStockThreshold, expiryAlertDays }
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_boticario_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // ==================== IMPORTAR (NOVO!) ====================
            const handleImportFile = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        // Validar estrutura
                        if (!data.products || !data.sales) {
                            alert('Arquivo inválido! Não é um backup do Boticário.');
                            return;
                        }
                        
                        // Confirmar importação
                        const confirmMsg = `
                            DADOS ENCONTRADOS:
                            • Produtos: ${data.products.length}
                            • Vendas: ${data.sales?.length || 0}
                            • Compras: ${data.purchases?.length || 0}
                            • Clientes: ${data.customers?.length || 0}
                            
                            ⚠️ Isso vai SUBSTITUIR todos os dados atuais!
                            Deseja continuar?
                        `;
                        
                        if (confirm(confirmMsg)) {
                            // Importar dados
                            if (data.products) setProducts(data.products);
                            if (data.purchases) setPurchases(data.purchases);
                            if (data.sales) setSales(data.sales);
                            if (data.customers) setCustomers(data.customers);
                            if (data.creditSales) setCreditSales(data.creditSales);
                            if (data.config) {
                                setLowStockThreshold(data.config.lowStockThreshold || 3);
                                setExpiryAlertDays(data.config.expiryAlertDays || 30);
                            }
                            
                            alert('✅ Dados importados com sucesso!');
                            setShowImportModal(false);
                            setActiveTab('dashboard');
                        }
                        
                    } catch (error) {
                        alert('Erro ao ler arquivo! Verifique se é um JSON válido.');
                        console.error(error);
                    }
                };
                reader.readAsText(file);
                
                // Limpar input
                event.target.value = '';
            };

            const triggerImport = () => {
                fileInputRef.current.click();
            };

            // ==================== RENDER ====================
            return (
                <div className="min-h-screen">
                    {/* Input de arquivo invisível */}
                    <input
                        type="file"
                        ref={fileInputRef}
                        onChange={handleImportFile}
                        accept=".json"
                        style={{ display: 'none' }}
                    />

                    {/* Header */}
                    <header className="boticario-gradient text-white p-6 shadow-lg">
                        <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold"><i className="fas fa-store mr-3"></i>Gestão Revenda O Boticário</h1>
                                <p className="text-white/80 mt-1 text-sm">Sistema completo de controle de vendas e estoque</p>
                            </div>
                            <div className="flex gap-2 flex-wrap">
                                <button 
                                    onClick={triggerImport} 
                                    className="bg-green-600 hover:bg-green-700 px-3 py-2 rounded-lg transition text-sm"
                                >
                                    <i className="fas fa-upload mr-2"></i>Importar
                                </button>
                                <button 
                                    onClick={exportData} 
                                    className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition text-sm"
                                >
                                    <i className="fas fa-download mr-2"></i>Exportar
                                </button>
                                <button 
                                    onClick={() => setActiveTab('config')} 
                                    className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition"
                                >
                                    <i className="fas fa-cog"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex overflow-x-auto">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-line' },
                                    { id: 'products', label: 'Produtos', icon: 'fa-box' },
                                    { id: 'sales', label: 'Vendas', icon: 'fa-shopping-cart' },
                                    { id: 'purchases', label: 'Compras', icon: 'fa-truck' },
                                    { id: 'customers', label: 'Clientes', icon: 'fa-users' },
                                    { id: 'credits', label: 'Fiado', icon: 'fa-hand-holding-usd' },
                                    { id: 'reports', label: 'Relatórios', icon: 'fa-file-invoice-dollar' }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-4 md:px-6 py-4 flex items-center gap-2 border-b-2 transition whitespace-nowrap ${
                                            activeTab === tab.id 
                                                ? 'border-purple-600 text-purple-600' 
                                                : 'border-transparent text-gray-600 hover:text-purple-600'
                                        }`}
                                    >
                                        <i className={`fas ${tab.icon}`}></i>
                                        <span className="hidden md:inline">{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto p-4 md:p-6">
                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <StatCard 
                                        title="Vendas do Mês" 
                                        value={formatCurrency(financialReport.totalSold)} 
                                        icon="fa-shopping-cart" 
                                        color="border-green-400"
                                    />
                                    <StatCard 
                                        title="Investido no Mês" 
                                        value={formatCurrency(financialReport.totalInvested)} 
                                        icon="fa-wallet" 
                                        color="border-red-400"
                                    />
                                    <StatCard 
                                        title="Lucro Líquido" 
                                        value={formatCurrency(financialReport.totalProfit)} 
                                        icon="fa-coins" 
                                        color="border-blue-400"
                                    />
                                    <StatCard 
                                        title="Fiado Pendente" 
                                        value={formatCurrency(pendingCreditSales.reduce((sum, c) => sum + c.amount, 0))} 
                                        icon="fa-hand-holding-usd" 
                                        color="border-yellow-400"
                                    />
                                </div>

                                {/* Alertas */}
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                    {lowStockProducts.length > 0 && (
                                        <div className="alert-red rounded-lg p-4">
                                            <h3 className="font-bold text-red-800 mb-2">
                                                <i className="fas fa-exclamation-triangle mr-2"></i>
                                                Estoque Baixo ({lowStockProducts.length} produtos)
                                            </h3>
                                            <ul className="space-y-1">
                                                {lowStockProducts.slice(0, 5).map(p => (
                                                    <li key={p.id} className="text-red-700">
                                                        • {p.name} - {calculateStock(p.id)} un.
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                    
                                    {expiryAlertProducts.length > 0 && (
                                        <div className="alert-yellow rounded-lg p-4">
                                            <h3 className="font-bold text-yellow-800 mb-2">
                                                <i className="fas fa-clock mr-2"></i>
                                                Validade Próxima ({expiryAlertProducts.length} produtos)
                                            </h3>
                                            <ul className="space-y-1">
                                                {expiryAlertProducts.slice(0, 5).map(p => (
                                                    <li key={p.id} className="text-yellow-700">
                                                        • {p.name} - vence em {calculateDaysUntilExpiry(p.expiryDate)} dias
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>

                                {/* Top Produtos */}
                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">
                                        <i className="fas fa-trophy text-yellow-500 mr-2"></i>
                                        Top 5 Produtos Mais Vendidos
                                    </h3>
                                    <div className="space-y-3">
                                        {financialReport.topProducts.map((p, idx) => (
                                            <div key={p.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                                <div className="flex items-center gap-3">
                                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-white font-bold ${
                                                        idx === 0 ? 'bg-yellow-500' : idx === 1 ? 'bg-gray-400' : idx === 2 ? 'bg-orange-500' : 'bg-gray-300'
                                                    }`}>
                                                        {idx + 1}
                                                    </span>
                                                    <span className="font-medium">{p.name}</span>
                                                </div>
                                                <span className="text-purple-600 font-bold">{p.sold} un.</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PRODUTOS */}
                        {activeTab === 'products' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Cadastro de Produtos</h2>
                                    <button 
                                        onClick={() => setShowProductModal(true)}
                                        className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm"
                                    >
                                        <i className="fas fa-plus mr-2"></i>Novo Produto
                                    </button>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[800px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Categoria</th>
                                                <th className="p-4 text-left">Fragrância</th>
                                                <th className="p-4 text-left">Ciclo</th>
                                                <th className="p-4 text-left">Validade</th>
                                                <th className="p-4 text-left">Estoque</th>
                                                <th className="p-4 text-left">Preço Médio</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {products.map(p => {
                                                const stock = calculateStock(p.id);
                                                const avgPrice = calculateAveragePrice(p.id);
                                                const daysToExpiry = p.expiryDate ? calculateDaysUntilExpiry(p.expiryDate) : null;
                                                
                                                return (
                                                    <tr key={p.id} className={`border-t ${
                                                        stock < lowStockThreshold ? 'bg-red-50' : 
                                                        daysToExpiry && daysToExpiry <= expiryAlertDays ? 'bg-yellow-50' : ''
                                                    }`}>
                                                        <td className="p-4 font-medium">{p.name}</td>
                                                        <td className="p-4">
                                                            <span className="px-2 py-1 bg-purple-100 text-purple-800 rounded text-sm">
                                                                {p.category}
                                                            </span>
                                                        </td>
                                                        <td className="p-4">{p.fragrance || '-'}</td>
                                                        <td className="p-4">{p.cycle || '-'}</td>
                                                        <td className="p-4">
                                                            {p.expiryDate ? (
                                                                <span className={daysToExpiry <= expiryAlertDays ? 'text-red-600 font-bold' : ''}>
                                                                    {formatDate(p.expiryDate)}
                                                                    {daysToExpiry <= expiryAlertDays && ` (${daysToExpiry} dias)`}
                                                                </span>
                                                            ) : '-'}
                                                        </td>
                                                        <td className="p-4">
                                                            <span className={`font-bold ${stock < lowStockThreshold ? 'text-red-600' : 'text-green-600'}`}>
                                                                {stock} un.
                                                            </span>
                                                        </td>
                                                        <td className="p-4 font-medium">{formatCurrency(avgPrice)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                    {products.length === 0 && (
                                        <div className="p-8 text-center text-gray-500">
                                            <i className="fas fa-box-open text-4xl mb-3"></i>
                                            <p>Nenhum produto cadastrado</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* VENDAS */}
                        {activeTab === 'sales' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Registro de Vendas</h2>
                                    <button 
                                        onClick={() => setShowSaleModal(true)}
                                        className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition text-sm"
                                    >
                                        <i className="fas fa-plus mr-2"></i>Nova Venda
                                    </button>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[900px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Data</th>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Cliente</th>
                                                <th className="p-4 text-left">Qtd</th>
                                                <th className="p-4 text-left">Preço Unit.</th>
                                                <th className="p-4 text-left">Total</th>
                                                <th className="p-4 text-left">Lucro</th>
                                                <th className="p-4 text-left">Pagamento</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sales.slice().reverse().map(s => {
                                                const product = products.find(p => p.id === s.productId);
                                                const customer = customers.find(c => c.id === s.customerId);
                                                return (
                                                    <tr key={s.id} className="border-t">
                                                        <td className="p-4">{formatDate(s.date)}</td>
                                                        <td className="p-4 font-medium">{product?.name || 'Produto removido'}</td>
                                                        <td className="p-4">{customer?.name || 'Não informado'}</td>
                                                        <td className="p-4">{s.quantity}</td>
                                                        <td className="p-4">{formatCurrency(s.price)}</td>
                                                        <td className="p-4 font-bold">{formatCurrency(s.price * s.quantity)}</td>
                                                        <td className="p-4">
                                                            <span className={s.profit >= 0 ? 'text-green-600' : 'text-red-600'}>
                                                                {formatCurrency(s.profit)}
                                                            </span>
                                                        </td>
                                                        <td className="p-4">
                                                            <span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-sm">
                                                                {s.paymentMethod}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                    {sales.length === 0 && (
                                        <div className="p-8 text-center text-gray-500">
                                            <i className="fas fa-shopping-cart text-4xl mb-3"></i>
                                            <p>Nenhuma venda registrada</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* COMPRAS */}
                        {activeTab === 'purchases' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Gestão de Compras</h2>
                                </div>

                                <div className="bg-white rounded-lg shadow-md p-4">
                                    <h3 className="text-lg font-bold mb-4">Registrar Entrada de Mercadoria</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                        <select 
                                            value={purchaseForm.productId}
                                            onChange={(e) => setPurchaseForm({...purchaseForm, productId: e.target.value})}
                                            className="border rounded-lg p-3 text-sm"
                                        >
                                            <option value="">Selecione o Produto</option>
                                            {products.map(p => (
                                                <option key={p.id} value={p.id}>{p.name}</option>
                                            ))}
                                        </select>
                                        <input 
                                            type="number" 
                                            placeholder="Quantidade"
                                            value={purchaseForm.quantity}
                                            onChange={(e) => setPurchaseForm({...purchaseForm, quantity: e.target.value})}
                                            className="border rounded-lg p-3 text-sm"
                                        />
                                        <input 
                                            type="number" 
                                            placeholder="Preço Unitário (R$)"
                                            value={purchaseForm.price}
                                            onChange={(e) => setPurchaseForm({...purchaseForm, price: e.target.value})}
                                            className="border rounded-lg p-3 text-sm"
                                        />
                                        <input 
                                            type="date"
                                            value={purchaseForm.date}
                                            onChange={(e) => setPurchaseForm({...purchaseForm, date: e.target.value})}
                                            className="border rounded-lg p-3 text-sm"
                                        />
                                    </div>
                                    <button 
                                        onClick={handleAddPurchase}
                                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition text-sm"
                                    >
                                        <i className="fas fa-save mr-2"></i>Registrar Compra
                                    </button>

                                    {purchaseForm.productId && (
                                        <div className="mt-4 p-4 bg-blue-50 rounded-lg">
                                            <p className="text-sm text-blue-800">
                                                <strong>Preço Médio Atual:</strong> {formatCurrency(calculateAveragePrice(purchaseForm.productId))}
                                            </p>
                                            <p className="text-sm text-blue-800">
                                                <strong>Estoque Atual:</strong> {calculateStock(purchaseForm.productId)} un.
                                            </p>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto mt-4">
                                    <table className="w-full min-w-[600px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Data</th>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Quantidade</th>
                                                <th className="p-4 text-left">Preço Unit.</th>
                                                <th className="p-4 text-left">Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {purchases.slice().reverse().map(p => {
                                                const product = products.find(prod => prod.id === p.productId);
                                                return (
                                                    <tr key={p.id} className="border-t">
                                                        <td className="p-4">{formatDate(p.date)}</td>
                                                        <td className="p-4 font-medium">{product?.name || 'Produto removido'}</td>
                                                        <td className="p-4">{p.quantity}</td>
                                                        <td className="p-4">{formatCurrency(p.price)}</td>
                                                        <td className="p-4 font-bold">{formatCurrency(p.price * p.quantity)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* CLIENTES */}
                        {activeTab === 'customers' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Gestão de Clientes (CRM)</h2>
                                    <button 
                                        onClick={() => setShowCustomerModal(true)}
                                        className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm"
                                    >
                                        <i className="fas fa-user-plus mr-2"></i>Novo Cliente
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {customers.map(c => {
                                        const customerSales = sales.filter(s => s.customerId === c.id);
                                        const totalSpent = customerSales.reduce((sum, s) => sum + (s.price * s.quantity), 0);
                                        
                                        return (
                                            <div key={c.id} className="bg-white rounded-lg shadow-md p-4 card-hover">
                                                <div className="flex items-center gap-3 mb-3">
                                                    <div className="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                                                        <i className="fas fa-user text-purple-600"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold">{c.name}</h3>
                                                        <p className="text-gray-500 text-sm">{c.phone || 'Sem telefone'}</p>
                                                    </div>
                                                </div>
                                                <div className="space-y-1 text-sm">
                                                    <p><i className="fas fa-envelope mr-2"></i>{c.email || 'Sem email'}</p>
                                                    <p><i className="fas fa-shopping-bag mr-2"></i>{customerSales.length} compras</p>
                                                    <p><i className="fas fa-coins mr-2"></i>Total: {formatCurrency(totalSpent)}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                {customers.length === 0 && (
                                    <div className="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">
                                        <i className="fas fa-users text-4xl mb-3"></i>
                                        <p>Nenhum cliente cadastrado</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* FIADO */}
                        {activeTab === 'credits' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Controle de Fiado</h2>
                                    <button 
                                        onClick={() => setShowCreditModal(true)}
                                        className="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded-lg transition text-sm"
                                    >
                                        <i className="fas fa-plus mr-2"></i>Novo Registro
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                    {/* Pendentes */}
                                    <div className="bg-white rounded-lg shadow-md p-4">
                                        <h3 className="text-lg font-bold text-red-600 mb-3">
                                            <i className="fas fa-clock mr-2"></i>Pendentes
                                        </h3>
                                        <div className="space-y-2">
                                            {pendingCreditSales.map(c => {
                                                const sale = sales.find(s => s.id === c.saleId);
                                                const product = products.find(p => p.id === sale?.productId);
                                                const customer = sale ? customers.find(cust => cust.id === sale.customerId) : null;
                                                const isOverdue = new Date(c.dueDate) < new Date();
                                                
                                                return (
                                                    <div key={c.id} className={`p-3 rounded-lg border-l-4 ${isOverdue ? 'alert-red' : 'alert-yellow'}`}>
                                                        <div className="flex justify-between items-start">
                                                            <div>
                                                                <p className="font-bold text-sm">{customer?.name || 'Cliente não informado'}</p>
                                                                <p className="text-xs text-gray-600">{product?.name || 'Produto não encontrado'}</p>
                                                                <p className="text-xs">Vence: {formatDate(c.dueDate)}</p>
                                                            </div>
                                                            <div className="text-right">
                                                                <p className="font-bold">{formatCurrency(c.amount)}</p>
                                                                <button 
                                                                    onClick={() => markCreditAsPaid(c.id)}
                                                                    className="mt-1 text-xs bg-green-600 text-white px-2 py-1 rounded"
                                                                >
                                                                    <i className="fas fa-check mr-1"></i>Pago
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {pendingCreditSales.length === 0 && (
                                                <p className="text-gray-500 text-center py-4 text-sm">Nenhuma venda pendente</p>
                                            )}
                                        </div>
                                    </div>

                                    {/* Pagos */}
                                    <div className="bg-white rounded-lg shadow-md p-4">
                                        <h3 className="text-lg font-bold text-green-600 mb-3">
                                            <i className="fas fa-check-circle mr-2"></i>Pagos
                                        </h3>
                                        <div className="space-y-2">
                                            {creditSales.filter(c => c.status === 'pago').map(c => {
                                                const sale = sales.find(s => s.id === c.saleId);
                                                const customer = sale ? customers.find(cust => cust.id === sale.customerId) : null;
                                                
                                                return (
                                                    <div key={c.id} className="p-3 rounded-lg border-l-4 alert-green">
                                                        <div className="flex justify-between">
                                                            <div>
                                                                <p className="font-bold text-sm">{customer?.name || 'Cliente não informado'}</p>
                                                                <p className="text-xs text-gray-600">Pago em: {formatDate(c.createdAt)}</p>
                                                            </div>
                                                            <p className="font-bold text-green-600">{formatCurrency(c.amount)}</p>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {creditSales.filter(c => c.status === 'pago').length === 0 && (
                                                <p className="text-gray-500 text-center py-4 text-sm">Nenhum pagamento registrado</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RELATÓRIOS */}
                        {activeTab === 'reports' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Relatórios Financeiros</h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4">
                                        <p className="text-green-100 text-sm">Total Vendido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalSold)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg p-4">
                                        <p className="text-red-100 text-sm">Total Investido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalInvested)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg p-4">
                                        <p className="text-purple-100 text-sm">Lucro Líquido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalProfit)}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CONFIGURAÇÕES */}
                        {activeTab === 'config' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Configurações</h2>
                                
                                <div className="bg-white rounded-lg shadow-md p-4 max-w-md">
                                    <div className="space-y-3">
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2 text-sm">
                                                Limite de Estoque Baixo (unidades)
                                            </label>
                                            <input 
                                                type="number" 
                                                value={lowStockThreshold}
                                                onChange={(e) => setLowStockThreshold(parseInt(e.target.value) || 3)}
                                                className="w-full border rounded-lg p-3 text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2 text-sm">
                                                Alerta de Validade (dias)
                                            </label>
                                            <input 
                                                type="number" 
                                                value={expiryAlertDays}
                                                onChange={(e) => setExpiryAlertDays(parseInt(e.target.value) || 30)}
                                                className="w-full border rounded-lg p-3 text-sm"
                                            />
                                        </div>
                                        <div className="pt-3 border-t">
                                            <button 
                                                onClick={() => {
                                                    if (confirm('Tem certeza? Isso apagará todos os dados!')) {
                                                        localStorage.clear();
                                                        window.location.reload();
                                                    }
                                                }}
                                                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition w-full text-sm"
                                            >
                                                <i className="fas fa-trash mr-2"></i>Limpar Todos os Dados
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALS */}
                    <Modal isOpen={showProductModal} onClose={() => setShowProductModal(false)} title="Novo Produto">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Produto *</label>
                                <input 
                                    type="text" 
                                    value={productForm.name}
                                    onChange={(e) => setProductForm({...productForm, name: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                    placeholder="Ex: Lily Eau de Parfum"
                                />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Categoria</label>
                                    <select 
                                        value={productForm.category}
                                        onChange={(e) => setProductForm({...productForm, category: e.target.value})}
                                        className="w-full border rounded-lg p-3"
                                    >
                                        <option value="perfumaria">Perfumaria</option>
                                        <option value="corpo">Corpo e Banho</option>
                                        <option value="maquiagem">Maquiagem</option>
                                        <option value="cabelo">Cabelo</option>
                                        <option value="acessorios">Acessórios</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Ciclo O Boticário</label>
                                    <input 
                                        type="text" 
                                        value={productForm.cycle}
                                        onChange={(e) => setProductForm({...productForm, cycle: e.target.value})}
                                        className="w-full border rounded-lg p-3"
                                        placeholder="Ex: Ciclo 12/2024"
                                    />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Fragrância</label>
                                <input 
                                    type="text" 
                                    value={productForm.fragrance}
                                    onChange={(e) => setProductForm({...productForm, fragrance: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                    placeholder="Ex: Floral, Amadeirado..."
                                />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Validade</label>
                                <input 
                                    type="date" 
                                    value={productForm.expiryDate}
                                    onChange={(e) => setProductForm({...productForm, expiryDate: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                />
                            </div>
                            <button 
                                onClick={handleAddProduct}
                                className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"
                            >
                                <i className="fas fa-save mr-2"></i>Salvar Produto
                            </button>
                        </div>
                    </Modal>

                    <Modal isOpen={showSaleModal} onClose={() => setShowSaleModal(false)} title="Nova Venda">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Produto *</label>
                                <select 
                                    value={saleForm.productId}
                                    onChange={(e) => setSaleForm({...saleForm, productId: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                >
                                    <option value="">Selecione o Produto</option>
                                    {products.map(p => (
                                        <option key={p.id} value={p.id}>
                                            {p.name} (Estoque: {calculateStock(p.id)})
                                        </option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Cliente</label>
                                <select 
                                    value={saleForm.customerId}
                                    onChange={(e) => setSaleForm({...saleForm, customerId: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                >
                                    <option value="">Não informado</option>
                                    {customers.map(c => (
                                        <option key={c.id} value={c.id}>{c.name}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input 
                                        type="number" 
                                        value={saleForm.quantity}
                                        onChange={(e) => setSaleForm({...saleForm, quantity: e.target.value})}
                                        className="w-full border rounded-lg p-3"
                                        min="1"
                                    />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Preço de Venda (R$) *</label>
                                    <input 
                                        type="number" 
                                        value={saleForm.price}
                                        onChange={(e) => setSaleForm({...saleForm, price: e.target.value})}
                                        className="w-full border rounded-lg p-3"
                                        step="0.01"
                                    />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Método de Pagamento</label>
                                <select 
                                    value={saleForm.paymentMethod}
                                    onChange={(e) => setSaleForm({...saleForm, paymentMethod: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                >
                                    <option value="pix">PIX</option>
                                    <option value="dinheiro">Dinheiro</option>
                                    <option value="cartao">Cartão</option>
                                    <option value="credito">Fiado/Crédito</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Venda</label>
                                <input 
                                    type="date" 
                                    value={saleForm.date}
                                    onChange={(e) => setSaleForm({...saleForm, date: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                />
                            </div>
                            {saleForm.productId && saleForm.price && (
                                <div className="p-4 bg-green-50 rounded-lg">
                                    <p className="text-sm">
                                        <strong>Preço Médio:</strong> {formatCurrency(calculateAveragePrice(saleForm.productId))}
                                    </p>
                                    <p className="text-sm">
                                        <strong>Lucro Estimado:</strong> 
                                        <span className={((saleForm.price - calculateAveragePrice(saleForm.productId)) * saleForm.quantity) >= 0 ? 'text-green-600' : 'text-red-600'}>
                                            {' '}{formatCurrency((saleForm.price - calculateAveragePrice(saleForm.productId)) * saleForm.quantity)}
                                        </span>
                                    </p>
                                </div>
                            )}
                            <button 
                                onClick={handleAddSale}
                                className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg transition"
                            >
                                <i className="fas fa-check mr-2"></i>Registrar Venda
                            </button>
                        </div>
                    </Modal>

                    <Modal isOpen={showCustomerModal} onClose={() => setShowCustomerModal(false)} title="Novo Cliente">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome *</label>
                                <input 
                                    type="text" 
                                    value={customerForm.name}
                                    onChange={(e) => setCustomerForm({...customerForm, name: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                <input 
                                    type="tel" 
                                    value={customerForm.phone}
                                    onChange={(e) => setCustomerForm({...customerForm, phone: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                    placeholder="(00) 00000-0000"
                                />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input 
                                    type="email" 
                                    value={customerForm.email}
                                    onChange={(e) => setCustomerForm({...customerForm, email: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                />
                            </div>
                            <button 
                                onClick={handleAddCustomer}
                                className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"
                            >
                                <i className="fas fa-save mr-2"></i>Salvar Cliente
                            </button>
                        </div>
                    </Modal>

                    <Modal isOpen={showCreditModal} onClose={() => setShowCreditModal(false)} title="Registro de Fiado">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Valor (R$) *</label>
                                <input 
                                    type="number" 
                                    value={creditForm.amount}
                                    onChange={(e) => setCreditForm({...creditForm, amount: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                    step="0.01"
                                />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Vencimento *</label>
                                <input 
                                    type="date" 
                                    value={creditForm.dueDate}
                                    onChange={(e) => setCreditForm({...creditForm, dueDate: e.target.value})}
                                    className="w-full border rounded-lg p-3"
                                />
                            </div>
                            <button 
                                onClick={handleAddCredit}
                                className="w-full bg-yellow-600 hover:bg-yellow-700 text-white py-3 rounded-lg transition"
                            >
                                <i className="fas fa-save mr-2"></i>Registrar Fiado
                            </button>
                        </div>
                    </Modal>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p className="text-gray-400">
                                <i className="fas fa-store mr-2"></i>
                                Sistema de Gestão para Revenda O Boticário
                            </p>
                            <p className="text-gray-500 text-sm mt-2">
                                Dados armazenados localmente • Use Exportar/Importar para backup • {new Date().getFullYear()}
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
