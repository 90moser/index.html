                            <button onClick={handleEditProduct} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Produto</button>
                        </div>
                    </Modal>

                    {/* Modal Nova Venda */}
                    <Modal isOpen={showSaleModal} onClose={() => setShowSaleModal(false)} title="Nova Venda">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Produto *</label>
                                <select value={saleForm.productId} onChange={(e) => setSaleForm({...saleForm, productId: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="">Selecione o Produto</option>
                                    {products.map(p => <option key={p.id} value={p.id}>{p.name} (Estoque: {calculateStock(p.id)})</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Cliente</label>
                                <select value={saleForm.customerId} onChange={(e) => setSaleForm({...saleForm, customerId: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="">Não informado</option>
                                    {customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input type="number" value={saleForm.quantity} onChange={(e) => setSaleForm({...saleForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Preço de Venda (€) *</label>
                                    <input type="number" value={saleForm.price} onChange={(e) => setSaleForm({...saleForm, price: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Método de Pagamento</label>
                                <select value={saleForm.paymentMethod} onChange={(e) => setSaleForm({...saleForm, paymentMethod: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="bizum">Bizum</option>
                                    <option value="dinheiro">Dinheiro</option>
                                    <option value="cartao">Cartão</option>
                                    <option value="transferencia">Transferência</option>
                                    <option value="credito">Fiado/Crédito</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Venda</label>
                                <input type="date" value={saleForm.date} onChange={(e) => setSaleForm({...saleForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            {saleForm.productId && saleForm.price && (
                                <div className="p-4 bg-green-50 rounded-lg">
                                    <p className="text-sm"><strong>Preço Médio:</strong> {formatCurrency(calculateAveragePrice(saleForm.productId))}</p>
                                    <p className="text-sm"><strong>Lucro Estimado:</strong> <span className={((saleForm.price - calculateAveragePrice(saleForm.productId)) * saleForm.quantity) >= 0 ? 'text-green-600' : 'text-red-600'}> {formatCurrency((saleForm.price - calculateAveragePrice(saleForm.productId)) * saleForm.quantity)}</span></p>
                                </div>
                            )}
                            <button onClick={handleAddSale} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg transition"><i className="fas fa-check mr-2"></i>Registrar Venda</button>
                        </div>
                    </Modal>

                    {/* NOVO: Modal Editar Venda */}
                    <Modal isOpen={showEditSaleModal} onClose={() => { setShowEditSaleModal(false); setEditingSale(null); }} title="Editar Venda">
                        <div className="space-y-4">
                            <div className="p-3 bg-yellow-50 rounded-lg border-l-4 border-yellow-500">
                                <p className="text-yellow-800 text-sm"><i className="fas fa-info-circle mr-2"></i>Editando venda de {formatDate(editingSale?.date)}</p>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Produto *</label>
                                <select value={saleForm.productId} onChange={(e) => setSaleForm({...saleForm, productId: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="">Selecione o Produto</option>
                                    {products.map(p => <option key={p.id} value={p.id}>{p.name} (Estoque: {calculateStock(p.id)})</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Cliente</label>
                                <select value={saleForm.customerId} onChange={(e) => setSaleForm({...saleForm, customerId: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="">Não informado</option>
                                    {customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input type="number" value={saleForm.quantity} onChange={(e) => setSaleForm({...saleForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Preço de Venda (€) *</label>
                                    <input type="number" value={saleForm.price} onChange={(e) => setSaleForm({...saleForm, price: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Método de Pagamento</label>
                                <select value={saleForm.paymentMethod} onChange={(e) => setSaleForm({...saleForm, paymentMethod: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="bizum">Bizum</option>
                                    <option value="dinheiro">Dinheiro</option>
                                    <option value="cartao">Cartão</option>
                                    <option value="transferencia">Transferência</option>
                                    <option value="credito">Fiado/Crédito</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Venda</label>
                                <input type="date" value={saleForm.date} onChange={(e) => setSaleForm({...saleForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditSale} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Venda</button>
                        </div>
                    </Modal>

                    {/* Modal Novo Cliente */}
                    <Modal isOpen={showCustomerModal} onClose={() => setShowCustomerModal(false)} title="Novo Cliente">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome *</label>
                                <input type="text" value={customerForm.name} onChange={(e) => setCustomerForm({...customerForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                <input type="tel" value={customerForm.phone} onChange={(e) => setCustomerForm({...customerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" placeholder="+351 000 000 000" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={customerForm.email} onChange={(e) => setCustomerForm({...customerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddCustomer} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Salvar Cliente</button>
                        </div>
                    </Modal>

                    {/* Modal Editar Cliente */}
                    <Modal isOpen={showEditCustomerModal} onClose={() => { setShowEditCustomerModal(false); setEditingCustomer(null); }} title="Editar Cliente">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome *</label>
                                <input type="text" value={customerForm.name} onChange={(e) => setCustomerForm({...customerForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                <input type="tel" value={customerForm.phone} onChange={(e) => setCustomerForm({...customerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" placeholder="+351 000 000 000" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={customerForm.email} onChange={(e) => setCustomerForm({...customerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditCustomer} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Cliente</button>
                        </div>
                    </Modal>

                    {/* Modal Fiado */}
                    <Modal isOpen={showCreditModal} onClose={() => setShowCreditModal(false)} title="Registro de Fiado">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Valor (€) *</label>
                                <input type="number" value={creditForm.amount} onChange={(e) => setCreditForm({...creditForm, amount: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Vencimento *</label>
                                <input type="date" value={creditForm.dueDate} onChange={(e) => setCreditForm({...creditForm, dueDate: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddCredit} className="w-full bg-yellow-600 hover:bg-yellow-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Registrar Fiado</button>
                        </div>
                    </Modal>

                    {/* Modal Confirmar Exclusão */}
                    <Modal isOpen={showDeleteModal} onClose={() => { setShowDeleteModal(false); setDeleteItem(null); }} title="Confirmar Exclusão">
                        <div className="space-y-4">
                            <div className="p-4 bg-red-50 rounded-lg border-l-4 border-red-500">
                                <p className="text-red-800 font-bold"><i className="fas fa-exclamation-triangle mr-2"></i>Atenção!</p>
                                <p className="text-red-700 mt-2">
                                    {deleteItem?.type === 'product' ? `Tem certeza que deseja excluir o produto "${deleteItem?.name}"?` : 
                                     deleteItem?.type === 'customer' ? `Tem certeza que deseja excluir o cliente "${deleteItem?.name}"?` :
                                     `Tem certeza que deseja excluir esta venda de ${formatCurrency(deleteItem?.price * deleteItem?.quantity)}?`}
                                </p>
                                <p className="text-red-600 text-sm mt-2">Esta ação não pode ser desfeita!</p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => { setShowDeleteModal(false); setDeleteItem(null); }} className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-lg transition">
                                    <i className="fas fa-times mr-2"></i>Cancelar
                                </button>
                                <button onClick={deleteItem?.type === 'product' ? handleDeleteProduct : deleteItem?.type === 'customer' ? handleDeleteCustomer : handleDeleteSale} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg transition">
                                    <i className="fas fa-trash mr-2"></i>Excluir
                                </button>
                            </div>
                        </div>
                    </Modal>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p className="text-gray-400"><i className="fas fa-store mr-2"></i>Sistema de Gestão para Revenda O Boticário</p>
                            <p className="text-gray-500 text-sm mt-2">Moeda: Euro (€) • Pagamento: Bizum • Dados armazenados localmente • {new Date().getFullYear()}</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
