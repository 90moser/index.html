                                <div className="bg-white rounded-lg shadow-md p-4">
                                    <h3 className="text-lg font-bold mb-4">Registrar Entrada de Mercadoria</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                        <SearchableDropdown label="Produto *" options={productOptions} value={purchaseForm.productId} onChange={(value) => setPurchaseForm({...purchaseForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div><div className="text-xs text-gray-500">Stock: {option.stock} un.</div></div>)} />
                                        <input type="number" placeholder="Quantidade" value={purchaseForm.quantity} onChange={(e) => setPurchaseForm({...purchaseForm, quantity: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                        <input type="number" placeholder="Preço Unitário (€)" value={purchaseForm.price} onChange={(e) => setPurchaseForm({...purchaseForm, price: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                        <input type="date" value={purchaseForm.date} onChange={(e) => setPurchaseForm({...purchaseForm, date: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                    </div>
                                    <button onClick={handleAddPurchase} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-save mr-2"></i>Registrar Compra
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* CLIENTES */}
                        {activeTab === 'customers' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Gestão de Clientes</h2>
                                    <button onClick={() => setShowCustomerModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-user-plus mr-2"></i>Novo Cliente
                                    </button>
                                </div>

                                <div className="bg-white rounded-lg shadow-md p-4">
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <span className="text-gray-700 font-medium"><i className="fas fa-filter mr-2"></i>Ordenar por:</span>
                                        <button onClick={() => setCustomerSort('default')} className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'default' ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700'}`}>Recentes</button>
                                        <button onClick={() => setCustomerSort('spent')} className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'spent' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'}`}>Mais Gastaram</button>
                                        <button onClick={() => setCustomerSort('purchases')} className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'purchases' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}`}>Mais Compras</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {customersWithStats.sort((a, b) => customerSort === 'spent' ? b.totalSpent - a.totalSpent : customerSort === 'purchases' ? b.totalPurchases - a.totalPurchases : 0).map(c => (
                                        <div key={c.id} className="bg-white rounded-lg shadow-md p-4 card-hover">
                                            <div className="flex items-start justify-between mb-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center"><i className="fas fa-user text-purple-600"></i></div>
                                                    <div>
                                                        <h3 className="font-bold">{c.name}</h3>
                                                        <p className="text-gray-500 text-sm">{c.phone || 'Sem telefone'}</p>
                                                    </div>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => openEditCustomer(c)} className="btn-edit text-white px-2 py-1 rounded text-xs"><i className="fas fa-edit"></i></button>
                                                    <button onClick={() => confirmDeleteCustomer(c)} className="btn-delete text-white px-2 py-1 rounded text-xs"><i className="fas fa-trash"></i></button>
                                                </div>
                                            </div>
                                            <div className="space-y-1 text-sm">
                                                <p><i className="fas fa-shopping-bag mr-2"></i>{c.totalPurchases} compras</p>
                                                <p><i className="fas fa-euro-sign mr-2"></i>Total: {formatCurrency(c.totalSpent)}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* RELATÓRIOS */}
                        {activeTab === 'reports' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Relatórios Financeiros</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4">
                                        <p className="text-green-100 text-sm">Total Vendido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalSold)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg p-4">
                                        <p className="text-red-100 text-sm">Total Investido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalInvested)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg p-4">
                                        <p className="text-purple-100 text-sm">Lucro Líquido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalProfit)}</p>
                                    </div>
                                </div>

                                {/* Relatório de Revendedores */}
                                {resellers.length > 0 && (
                                    <div className="bg-white rounded-lg shadow-md p-6">
                                        <h3 className="text-xl font-bold text-gray-800 mb-4"><i className="fas fa-handshake mr-2"></i>Relatório de Revendedores</h3>
                                        <div className="overflow-x-auto">
                                            <table className="w-full">
                                                <thead className="bg-gray-50">
                                                    <tr>
                                                        <th className="p-3 text-left">Revendedor</th>
                                                        <th className="p-3 text-left">Salão</th>
                                                        <th className="p-3 text-center">Vendas</th>
                                                        <th className="p-3 text-left">Total Vendido</th>
                                                        <th className="p-3 text-left">Seu Ganho (75%)</th>
                                                        <th className="p-3 text-left">Comissão (25%)</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {resellerReport.sort((a, b) => b.totalSales - a.totalSales).map(r => (
                                                        <tr key={r.id} className="border-t">
                                                            <td className="p-3 font-medium">{r.name}</td>
                                                            <td className="p-3">{r.salonName}</td>
                                                            <td className="p-3 text-center">{r.salesCount}</td>
                                                            <td className="p-3 font-bold">{formatCurrency(r.totalSales)}</td>
                                                            <td className="p-3 text-green-600 font-bold">{formatCurrency(r.yourEarnings)}</td>
                                                            <td className="p-3 text-orange-600 font-bold">{formatCurrency(r.commission)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* CONFIGURAÇÕES */}
                        {activeTab === 'config' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Configurações</h2>
                                <div className="bg-white rounded-lg shadow-md p-4 max-w-md">
                                    <div className="space-y-3">
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2 text-sm">Limite de Estoque Baixo (unidades)</label>
                                            <input type="number" value={lowStockThreshold} onChange={(e) => setLowStockThreshold(parseInt(e.target.value) || 3)} className="w-full border rounded-lg p-3 text-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2 text-sm">Alerta de Validade (dias)</label>
                                            <input type="number" value={expiryAlertDays} onChange={(e) => setExpiryAlertDays(parseInt(e.target.value) || 30)} className="w-full border rounded-lg p-3 text-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2 text-sm">Alerta Produto Parado (dias)</label>
                                            <input type="number" value={staleProductDays} onChange={(e) => setStaleProductDays(parseInt(e.target.value) || 30)} className="w-full border rounded-lg p-3 text-sm" />
                                            <p className="text-xs text-gray-500 mt-1">Produtos em revendedores há mais dias que isso serão alertados</p>
                                        </div>
                                        <div className="pt-3 border-t">
                                            <button onClick={() => { if (confirm('Tem certeza? Isso apagará todos os dados!')) { localStorage.clear(); window.location.reload(); } }} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition w-full text-sm">
                                                <i className="fas fa-trash mr-2"></i>Limpar Todos os Dados
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALS - REVENDEDORES */}
                    {/* Novo Revendedor */}
                    <Modal isOpen={showResellerModal} onClose={() => setShowResellerModal(false)} title="Novo Revendedor">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Contato *</label>
                                <input type="text" value={resellerForm.name} onChange={(e) => setResellerForm({...resellerForm, name: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Maria Silva" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Salão *</label>
                                <input type="text" value={resellerForm.salonName} onChange={(e) => setResellerForm({...resellerForm, salonName: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Beauty Salon" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Endereço</label>
                                <input type="text" value={resellerForm.address} onChange={(e) => setResellerForm({...resellerForm, address: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Rua das Flores, 123" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                    <input type="tel" value={resellerForm.phone} onChange={(e) => setResellerForm({...resellerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" placeholder="+351 000 000 000" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Comissão (%)</label>
                                    <input type="number" value={resellerForm.commissionRate} onChange={(e) => setResellerForm({...resellerForm, commissionRate: e.target.value})} className="w-full border rounded-lg p-3" />
                                    <p className="text-xs text-gray-500 mt-1">Padrão: 25%</p>
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={resellerForm.email} onChange={(e) => setResellerForm({...resellerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddReseller} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Salvar Revendedor</button>
                        </div>
                    </Modal>

                    {/* Editar Revendedor */}
                    <Modal isOpen={showEditResellerModal} onClose={() => { setShowEditResellerModal(false); setEditingReseller(null); }} title="Editar Revendedor">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Contato *</label>
                                <input type="text" value={resellerForm.name} onChange={(e) => setResellerForm({...resellerForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Salão *</label>
                                <input type="text" value={resellerForm.salonName} onChange={(e) => setResellerForm({...resellerForm, salonName: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Endereço</label>
                                <input type="text" value={resellerForm.address} onChange={(e) => setResellerForm({...resellerForm, address: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                    <input type="tel" value={resellerForm.phone} onChange={(e) => setResellerForm({...resellerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Comissão (%)</label>
                                    <input type="number" value={resellerForm.commissionRate} onChange={(e) => setResellerForm({...resellerForm, commissionRate: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={resellerForm.email} onChange={(e) => setResellerForm({...resellerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditReseller} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Revendedor</button>
                        </div>
                    </Modal>

                    {/* Transferir para Revendedor */}
                    <Modal isOpen={showTransferModal} onClose={() => { setShowTransferModal(false); setSelectedReseller(null); }} title="Transferir Produtos para Revendedor">
                        <div className="space-y-4">
                            {selectedReseller && (
                                <div className="p-3 bg-purple-50 rounded-lg">
                                    <p className="font-bold">{selectedReseller.salonName}</p>
                                    <p className="text-sm text-gray-600">{selectedReseller.name}</p>
                                </div>
                            )}
                            <SearchableDropdown label="Produto *" options={productOptions} value={transferForm.productId} onChange={(value) => setTransferForm({...transferForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div><div className="text-xs text-gray-500">Stock: {option.stock} un.</div></div>)} />
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                <input type="number" value={transferForm.quantity} onChange={(e) => setTransferForm({...transferForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Transferência</label>
                                <input type="date" value={transferForm.date} onChange={(e) => setTransferForm({...transferForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleTransfer} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-exchange-alt mr-2"></i>Transferir</button>
                        </div>
                    </Modal>

                    {/* Venda do Revendedor */}
                    <Modal isOpen={showResellerSaleModal} onClose={() => { setShowResellerSaleModal(false); setSelectedReseller(null); }} title="Registrar Venda do Revendedor">
                        <div className="space-y-4">
                            {selectedReseller && (
                                <div className="p-3 bg-green-50 rounded-lg">
                                    <p className="font-bold">{selectedReseller.salonName}</p>
                                    <p className="text-sm text-gray-600">Comissão: {selectedReseller.commissionRate}%</p>
                                </div>
                            )}
                            <SearchableDropdown label="Produto *" options={productOptions} value={resellerSaleForm.productId} onChange={(value) => setResellerSaleForm({...resellerSaleForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div></div>)} />
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input type="number" value={resellerSaleForm.quantity} onChange={(e) => setResellerSaleForm({...resellerSaleForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Preço de Venda (€) *</label>
                                    <input type="number" value={resellerSaleForm.salePrice} onChange={(e) => setResellerSaleForm({...resellerSaleForm, salePrice: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Venda</label>
                                <input type="date" value={resellerSaleForm.date} onChange={(e) => setResellerSaleForm({...resellerSaleForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            {resellerSaleForm.salePrice && resellerSaleForm.quantity && selectedReseller && (
                                <div className="p-4 bg-green-50 rounded-lg space-y-2">
                                    <p className="text-sm"><strong>Total Venda:</strong> {formatCurrency(resellerSaleForm.salePrice * resellerSaleForm.quantity)}</p>
                                    <p className="text-sm text-orange-600"><strong>Comissão ({selectedReseller.commissionRate}%):</strong> {formatCurrency((resellerSaleForm.salePrice * resellerSaleForm.quantity) * (selectedReseller.commissionRate / 100))}</p>
                                    <p className="text-sm text-green-600 font-bold"><strong>Seu Ganho (75%):</strong> {formatCurrency((resellerSaleForm.salePrice * resellerSaleForm.quantity) * ((100 - selectedReseller.commissionRate) / 100))}</p>
                                </div>
                            )}
                            <button onClick={handleResellerSale} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg transition"><i className="fas fa-check mr-2"></i>Registrar Venda</button>
                        </div>
                    </Modal>

                    {/* Devolução de Produtos */}
                    <Modal isOpen={showReturnModal} onClose={() => { setShowReturnModal(false); setSelectedReseller(null); }} title="Devolver Produtos do Revendedor">
                        <div className="space-y-4">
                            {selectedReseller && (
                                <div className="p-3 bg-orange-50 rounded-lg">
                                    <p className="font-bold">{selectedReseller.salonName}</p>
                                    <p className="text-sm text-gray-600">{selectedReseller.name}</p>
                                </div>
                            )}
                            <SearchableDropdown label="Produto *" options={productOptions} value={returnForm.productId} onChange={(value) => setReturnForm({...returnForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div></div>)} />
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                <input type="number" value={returnForm.quantity} onChange={(e) => setReturnForm({...returnForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Devolução</label>
                                <input type="date" value={returnForm.date} onChange={(e) => setReturnForm({...returnForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleReturn} className="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-lg transition"><i className="fas fa-undo mr-2"></i>Devolver Produtos</button>
                        </div>
                    </Modal>

                    {/* Outros Modals (Produto, Venda, Cliente, etc.) */}
                    {/* Modal Novo Produto */}
                    <Modal isOpen={showProductModal} onClose={() => setShowProductModal(false)} title="Novo Produto">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Produto *</label>
                                <input type="text" value={productForm.name} onChange={(e) => setProductForm({...productForm, name: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Lily Eau de Parfum" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Categoria</label>
                                    <select value={productForm.category} onChange={(e) => setProductForm({...productForm, category: e.target.value})} className="w-full border rounded-lg p-3">
                                        <option value="perfumaria">Perfumaria</option>
                                        <option value="corpo">Corpo e Banho</option>
                                        <option value="maquiagem">Maquiagem</option>
                                        <option value="cabelo">Cabelo</option>
                                        <option value="acessorios">Acessórios</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">💰 Preço Catálogo (€)</label>
                                    <input type="number" value={productForm.catalogPrice} onChange={(e) => setProductForm({...productForm, catalogPrice: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: 45,90" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Validade</label>
                                <input type="date" value={productForm.expiryDate} onChange={(e) => setProductForm({...productForm, expiryDate: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddProduct} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Salvar Produto</button>
                        </div>
                    </Modal>

                    {/* Modal Editar Produto */}
                    <Modal isOpen={showEditProductModal} onClose={() => { setShowEditProductModal(false); setEditingProduct(null); }} title="Editar Produto">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Produto *</label>
                                <input type="text" value={productForm.name} onChange={(e) => setProductForm({...productForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Categoria</label>
                                    <select value={productForm.category} onChange={(e) => setProductForm({...productForm, category: e.target.value})} className="w-full border rounded-lg p-3">
                                        <option value="perfumaria">Perfumaria</option>
                                        <option value="corpo">Corpo e Banho</option>
                                        <option value="maquiagem">Maquiagem</option>
                                        <option value="cabelo">Cabelo</option>
                                        <option value="acessorios">Acessórios</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">💰 Preço Catálogo (€)</label>
                                    <input type="number" value={productForm.catalogPrice} onChange={(e) => setProductForm({...productForm, catalogPrice: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Validade</label>
                                <input type="date" value={productForm.expiryDate} onChange={(e) => setProductForm({...productForm, expiryDate: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditProduct} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Produto</button>
                        </div>
                    </Modal>

                    {/* Modal Nova Venda */}
                    <Modal isOpen={showSaleModal} onClose={() => setShowSaleModal(false)} title="Nova Venda">
                        <div className="space-y-4">
                            <SearchableDropdown label="Produto *" options={productOptions} value={saleForm.productId} onChange={(value) => setSaleForm({...saleForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div><div className="text-xs text-gray-500">Stock: {option.stock} un.</div></div>)} />
                            <SearchableDropdown label="Cliente" options={customerOptions} value={saleForm.customerId} onChange={(value) => setSaleForm({...saleForm, customerId: value})} placeholder="Não informado" renderOption={(option) => (<div><div className="font-medium">{option.label}</div></div>)} />
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input type="number" value={saleForm.quantity} onChange={(e) => setSaleForm({...saleForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Preço de Venda (€) *</label>
                                    <input type="number" value={saleForm.price} onChange={(e) => setSaleForm({...saleForm, price: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Método de Pagamento</label>
                                <select value={saleForm.paymentMethod} onChange={(e) => setSaleForm({...saleForm, paymentMethod: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="bizum">Bizum</option>
                                    <option value="dinheiro">Dinheiro</option>
                                    <option value="cartao">Cartão</option>
                                    <option value="transferencia">Transferência</option>
                                    <option value="credito">Fiado/Crédito</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Venda</label>
                                <input type="date" value={saleForm.date} onChange={(e) => setSaleForm({...saleForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddSale} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg transition"><i className="fas fa-check mr-2"></i>Registrar Venda</button>
                        </div>
                    </Modal>

                    {/* Modal Editar Venda */}
                    <Modal isOpen={showEditSaleModal} onClose={() => { setShowEditSaleModal(false); setEditingSale(null); }} title="Editar Venda">
                        <div className="space-y-4">
                            <div className="p-3 bg-yellow-50 rounded-lg border-l-4 border-yellow-500">
                                <p className="text-yellow-800 text-sm"><i className="fas fa-info-circle mr-2"></i>Editando venda de {formatDate(editingSale?.date)}</p>
                            </div>
                            <SearchableDropdown label="Produto *" options={productOptions} value={saleForm.productId} onChange={(value) => setSaleForm({...saleForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div><div className="text-xs text-gray-500">Stock: {option.stock} un.</div></div>)} />
                            <SearchableDropdown label="Cliente" options={customerOptions} value={saleForm.customerId} onChange={(value) => setSaleForm({...saleForm, customerId: value})} placeholder="Não informado" renderOption={(option) => (<div><div className="font-medium">{option.label}</div></div>)} />
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input type="number" value={saleForm.quantity} onChange={(e) => setSaleForm({...saleForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Preço de Venda (€) *</label>
                                    <input type="number" value={saleForm.price} onChange={(e) => setSaleForm({...saleForm, price: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Método de Pagamento</label>
                                <select value={saleForm.paymentMethod} onChange={(e) => setSaleForm({...saleForm, paymentMethod: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="bizum">Bizum</option>
                                    <option value="dinheiro">Dinheiro</option>
                                    <option value="cartao">Cartão</option>
                                    <option value="transferencia">Transferência</option>
                                    <option value="credito">Fiado/Crédito</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Venda</label>
                                <input type="date" value={saleForm.date} onChange={(e) => setSaleForm({...saleForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditSale} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Venda</button>
                        </div>
                    </Modal>

                    {/* Modal Novo Cliente */}
                    <Modal isOpen={showCustomerModal} onClose={() => setShowCustomerModal(false)} title="Novo Cliente">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome *</label>
                                <input type="text" value={customerForm.name} onChange={(e) => setCustomerForm({...customerForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                <input type="tel" value={customerForm.phone} onChange={(e) => setCustomerForm({...customerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" placeholder="+351 000 000 000" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={customerForm.email} onChange={(e) => setCustomerForm({...customerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddCustomer} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Salvar Cliente</button>
                        </div>
                    </Modal>

                    {/* Modal Editar Cliente */}
                    <Modal isOpen={showEditCustomerModal} onClose={() => { setShowEditCustomerModal(false); setEditingCustomer(null); }} title="Editar Cliente">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome *</label>
                                <input type="text" value={customerForm.name} onChange={(e) => setCustomerForm({...customerForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                <input type="tel" value={customerForm.phone} onChange={(e) => setCustomerForm({...customerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" placeholder="+351 000 000 000" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={customerForm.email} onChange={(e) => setCustomerForm({...customerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditCustomer} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Cliente</button>
                        </div>
                    </Modal>

                    {/* Modal Confirmar Exclusão */}
                    <Modal isOpen={showDeleteModal} onClose={() => { setShowDeleteModal(false); setDeleteItem(null); }} title="Confirmar Exclusão">
                        <div className="space-y-4">
                            <div className="p-4 bg-red-50 rounded-lg border-l-4 border-red-500">
                                <p className="text-red-800 font-bold"><i className="fas fa-exclamation-triangle mr-2"></i>Atenção!</p>
                                <p className="text-red-700 mt-2">{deleteItem?.type === 'product' ? `Excluir produto "${deleteItem?.name}"?` : deleteItem?.type === 'customer' ? `Excluir cliente "${deleteItem?.name}"?` : deleteItem?.type === 'reseller' ? `Excluir revendedor "${deleteItem?.name}"?` : 'Excluir este item?'}</p>
                                <p className="text-red-600 text-sm mt-2">Esta ação não pode ser desfeita!</p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => { setShowDeleteModal(false); setDeleteItem(null); }} className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-lg transition"><i className="fas fa-times mr-2"></i>Cancelar</button>
                                <button onClick={deleteItem?.type === 'product' ? handleDeleteProduct : deleteItem?.type === 'customer' ? handleDeleteCustomer : deleteItem?.type === 'reseller' ? handleDeleteReseller : handleDeleteSale} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg transition"><i className="fas fa-trash mr-2"></i>Excluir</button>
                            </div>
                        </div>
                    </Modal>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p className="text-gray-400"><i className="fas fa-store mr-2"></i>Sistema de Gestão para Revenda O Boticário</p>
                            <p className="text-gray-500 text-sm mt-2">Moeda: Euro (€) • Revendedores: Comodato 25% comissão • {new Date().getFullYear()}</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
