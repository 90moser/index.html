<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
// INICIALIZA O FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyDAZJP5PVjj-iRGKoiR22-M2EBzp61OaDA",
      authDomain: "gestaorevenda-f4334.firebaseapp.com",
      projectId: "gestaorevenda-f4334",
      storageBucket: "gestaorevenda-f4334.firebasestorage.app",
      messagingSenderId: "893230315835",
      appId: "1:893230315835:web:15fe289a91fb1da42b1f1e"
    };

    // SISTEMA ROBUSTO DE CONEXÃO COM FIREBASE
    let db, auth, reconnectAttempts = 0, maxReconnectAttempts = 5;
    let isOnline = navigator.onLine;
    
    // Função de reconexão automática com backoff exponencial
    const attemptReconnect = async (delay = 1000) => {
        if (reconnectAttempts >= maxReconnectAttempts) {
            console.error("❌ Máximo de tentativas de reconexão atingido");
            return;
        }
        
        reconnectAttempts++;
        console.log(`🔄 Tentativa ${reconnectAttempts}/${maxReconnectAttempts} de reconexão em ${delay}ms...`);
        
        setTimeout(async () => {
            try {
                // Testa conectividade básica
                await db.collection('connectivity_test').limit(1).get();
                console.log("✅ Conexão restaurada com sucesso!");
                reconnectAttempts = 0;
            } catch (error) {
                console.error(`❌ Falha na tentativa ${reconnectAttempts}:`, error.message);
                // Backoff exponencial: 1s, 2s, 4s, 8s, 16s
                attemptReconnect(Math.min(delay * 2, 16000));
            }
        }, delay);
    };
    
    // Inicialização do Firebase com tratamento robusto de erros
    const initializeFirebase = async () => {
        try {
            if (!window.firebase || !window.firebase.apps || !window.firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                console.log("✅ Firebase inicializado com sucesso!");
            }
            
            db = firebase.firestore();
            auth = firebase.auth();
            
            // 🔥 PERSISTÊNCIA OFFLINE - ESSENCIAL PARA REDES INSTÁVEIS
            try {
                await db.enablePersistence({ 
                    synchronizeTabs: true 
                });
                console.log("✅ Persistência offline ativada!");
            } catch (err) {
                if (err.code === 'failed-precondition') {
                    console.warn("⚠️ Múltiplas abas abertas. Persistência desativada.");
                } else if (err.code === 'unimplemented') {
                    console.warn("⚠️ Browser não suporta persistência offline.");
                } else {
                    console.error("❌ Erro na persistência:", err);
                }
            }
            
            // Configura timeouts e retry para operações de rede (apenas se não foi configurado antes)
            try {
                if (!db._settingsInitialized) {
                    db.settings({
                        cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED,
                        merge: true
                    });
                    db._settingsInitialized = true;
                    console.log("✅ Configurações do Firestore aplicadas");
                }
            } catch (error) {
                console.warn("⚠️ Configurações do Firestore já foram aplicadas:", error.message);
            }
            
            // Listener de conectividade
            window.addEventListener('online', () => {
                isOnline = true;
                console.log("🌐 Conexão restaurada!");
                reconnectAttempts = 0;
            });
            
            window.addEventListener('offline', () => {
                isOnline = false;
                console.log("📵 Modo offline ativado - Dados serão sincronizados quando voltar online");
            });
            
            // Testa conexão inicial
            if (navigator.onLine) {
                await db.collection('connectivity_test').limit(1).get();
                console.log("✅ Conexão com Firestore estabelecida!");
            } else {
                console.log("📵 Iniciando em modo offline");
            }
            
        } catch (error) {
            console.error("❌ Erro crítico na inicialização do Firebase:", error);
            
            // Tratamento específico para erros de rede
            if (error.message.includes('network') || error.message.includes('ERR_NAME_NOT_RESOLVED')) {
                console.log("🔄 Detectado problema de rede. Tentando reconexão automática...");
                await attemptReconnect();
            } else {
                alert("Erro ao conectar com o banco de dados. Verifique o console para detalhes.");
            }
        }
    };
    
    // Inicializa o Firebase
    initializeFirebase();


        // ==================== UTILITÁRIOS ====================
// Calcula quantos dias se passaram desde a última visita
        const getDaysSince = (dateString) => {
            if (!dateString) return 999; // Se nunca foi visitado, retorna um número alto (atrasado)
            const lastVisit = new Date(dateString + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Zera as horas para calcular apenas dias
            const diffTime = today - lastVisit;
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        };

        // Retorna a cor do "Semáforo"
        const getVisitStatusColor = (days) => {
            if (days <= 10) return "text-green-500"; // Tudo OK (Verde)
            if (days <= 14) return "text-yellow-500"; // Agendar logo (Amarelo)
            return "text-red-500"; // Atrasado (Vermelho)
        };
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        const formatCurrency = (value) => new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(value);
        const formatDate = (date) => new Date(date).toLocaleDateString('pt-PT');
        const calculateDaysUntilExpiry = (expiryDate) => {
            const today = new Date();
            const expiry = new Date(expiryDate);
            const diffTime = expiry - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };
        const getMonthRange = () => {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), 1);
            const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            return { start, end };
        };
        const calculateDaysSince = (date) => {
            const today = new Date();
            const target = new Date(date);
            const diffTime = today - target;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        // ==================== DROPDOWN PESQUISÁVEL ====================
        const SearchableDropdown = ({ options, value, onChange, placeholder, label, renderOption, emptyMessage = "Nenhum item encontrado" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const dropdownRef = useRef(null);
            const selectedOption = options.find(o => o.value === value);
            const sortedOptions = useMemo(() => [...options].sort((a, b) => a.label.localeCompare(b.label)), [options]);
            const filteredOptions = useMemo(() => {
                if (!searchTerm) return sortedOptions;
                return sortedOptions.filter(o => o.label.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [sortedOptions, searchTerm]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const handleSelect = (optionValue) => { onChange(optionValue); setIsOpen(false); setSearchTerm(''); };

            return (
                <div className="searchable-dropdown" ref={dropdownRef}>
                    {label && <label className="block text-gray-700 font-medium mb-2">{label}</label>}
                    <div className="border rounded-lg p-3 bg-white cursor-pointer flex justify-between items-center" onClick={() => setIsOpen(!isOpen)}>
                        <span className={selectedOption ? 'text-gray-800' : 'text-gray-400'}>{selectedOption ? selectedOption.label : placeholder}</span>
                        <i className={`fas fa-chevron-down text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}`}></i>
                    </div>
                    {isOpen && (
                        <div className="dropdown-options mt-1">
                            <div className="p-2 border-b sticky top-0 bg-white">
                                <div className="relative">
                                    <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" className="w-full pl-10 pr-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="🔍 Buscar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} onClick={(e) => e.stopPropagation()} />
                                </div>
                            </div>
                            <div className="overflow-y-auto">
                                {filteredOptions.length > 0 ? filteredOptions.map(option => (
                                    <div key={option.value} className={`dropdown-option ${option.value === value ? 'selected' : ''}`} onClick={() => handleSelect(option.value)}>
                                        {renderOption ? renderOption(option) : option.label}
                                    </div>
                                )) : <div className="p-4 text-center text-gray-500 text-sm"><i className="fas fa-inbox text-2xl mb-2"></i><p>{emptyMessage}</p></div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== BARRA DE FILTROS ====================
        const FilterBar = ({ searchTerm, onSearchChange, categoryFilter, onCategoryChange, statusFilter, onStatusChange, sortBy, onSortChange, expiryFilter, onExpiryChange, totalItems, filteredItems, onExport }) => {
            const categories = ['todos', 'perfumaria', 'corpo', 'maquiagem', 'cabelo', 'acessorios'];
            const statusOptions = [{ value: 'todos', label: 'Todos Status' }, { value: 'ok', label: 'Stock OK' }, { value: 'low', label: 'Stock Baixo' }, { value: 'out', label: 'Sem Stock' }];
            const sortOptions = [{ value: 'name', label: 'Nome (A-Z)' }, { value: 'name-desc', label: 'Nome (Z-A)' }, { value: 'stock', label: 'Stock (Menor)' }, { value: 'stock-desc', label: 'Stock (Maior)' }, { value: 'value', label: 'Valor (Maior)' }, { value: 'expiry', label: 'Validade (Próxima)' }];
            const expiryOptions = [{ value: 'all', label: 'Todas Validades' }, { value: '30', label: 'Vence em 30 dias' }, { value: '60', label: 'Vence em 60 dias' }, { value: '90', label: 'Vence em 90 dias' }, { value: 'no-expiry', label: 'Sem Validade' }];

            return (
                <div className="filter-bar rounded-lg p-4 mb-4 shadow-sm">
                    <div className="flex flex-wrap gap-3 items-center">
                        <div className="flex-1 min-w-[200px]">
                            <div className="relative">
                                <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input type="text" className="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="🔍 Buscar produto por nome..." value={searchTerm} onChange={(e) => onSearchChange(e.target.value)} />
                            </div>
                        </div>
                        <select value={categoryFilter} onChange={(e) => onCategoryChange(e.target.value)} className="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                            {categories.map(cat => (<option key={cat} value={cat}>{cat === 'todos' ? '📋 Todas Categorias' : cat.charAt(0).toUpperCase() + cat.slice(1)}</option>))}
                        </select>
                        <select value={statusFilter} onChange={(e) => onStatusChange(e.target.value)} className="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                            {statusOptions.map(opt => (<option key={opt.value} value={opt.value}>{opt.label}</option>))}

                            <span className="font-bold">{filteredItems}</span> de {totalItems} produtos
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== COMPONENTES ====================
        const StatCard = ({ title, value, icon, color, subtitle, smallText, subValues }) => (
            <div className={`bg-white rounded-lg p-4 md:p-6 card-hover shadow-md border-l-4 ${color}`}>

                    <div>

                                        <span className={`font-medium ${subValue.color || 'text-gray-800'}`}>{subValue.value}</span>
                                    </div>

                        <i className={`fas ${icon} text-xl`}></i>
                    </div>
                </div>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
                        <div className="p-6 border-b flex justify-between items-center">
                            <h3 className="text-xl font-bold text-gray-800">{title}</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        // ==================== APLICAÇÃO PRINCIPAL ====================
        function App() {
            // Estados Principais
            const [activeTab, setActiveTab] = useState('dashboard');
// ==================== LÓGICA DO LOGIN ====================
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

                const unsubscribe = auth.onAuthStateChanged((userLogado) => setUser(userLogado));
              
 return () => unsubscribe();
            }, []);

                e.preventDefault();

                try {

                    }
                } catch (error) {
                    setAuthError("Erro: Verifique os dados ou use uma senha de 6+ caracteres.");
                }
            };
            const handleLogout = () => auth.signOut();
            // =========================================================
// Função para registrar a visita de hoje
            const handleRegisterVisit = (resellerId) => {
                const today = new Date().toISOString().split('T')[0]; // Pega a data de hoje (YYYY-MM-DD)
                
                const updatedResellers = resellers.map(r => 
                    r.id === resellerId ? { ...r, lastVisitDate: today } : r
                );
                
                setResellers(updatedResellers);
                // Como o Firebase já está escutando o 'resellers', ele vai salvar na nuvem automaticamente!
            };
            
            // Alias para compatibilidade com o código existente
            const handleVisitReseller = handleRegisterVisit;
            const [products, setProducts] = useState([]);
            const [purchases, setPurchases] = useState([]);
            const [sales, setSales] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [creditSales, setCreditSales] = useState([]);
            const [resellers, setResellers] = useState([]);
            const [resellerStock, setResellerStock] = useState([]);
            const [resellerSales, setResellerSales] = useState([]);
            const [resellerReturns, setResellerReturns] = useState([]);
            const [stockAdjustments, setStockAdjustments] = useState([]);
            
            // Backup Automático

            const backupIntervalRef = useRef(null);

            const triggerAutoBackup = () => {
                if (!autoBackupEnabled) return;
                const data = {
                    exportDate: new Date().toISOString(),

                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);

                a.href = url;
                a.download = `backup_automatico_${new Date().toISOString().split('T')[0]}.json`;

                URL.revokeObjectURL(url);

            useEffect(() => {

            const [resellerSaleForm, setResellerSaleForm] = useState({ resellerId: '', productId: '', quantity: 1, salePrice: 0, date: new Date().toISOString().split('T')[0] });

            const [quickBuyForm, setQuickBuyForm] = useState({ quantity: 5, price: 0, date: new Date().toISOString().split('T')[0] });
            const [adjustStockForm, setAdjustStockForm] = useState({ type: 'saida', reason: 'quebra', quantity: 1, notes: '', date: new Date().toISOString().split('T')[0] });

            // Configurações
            const [lowStockThreshold, setLowStockThreshold] = useState(3);
            const [expiryAlertDays, setExpiryAlertDays] = useState(30);
            const [staleProductDays, setStaleProductDays] = useState(30);
            
            const fileInputRef = useRef(null);

         // ==================== A MÁGICA DA NUVEM (BANCO INDIVIDUAL) ====================
            const isReceivingData = useRef(true);

            // 1. ESCUTA O BANCO DE DADOS (AGORA EXCLUSIVO DO UTILIZADOR)
            useEffect(() => {
                // Se não houver nenhum utilizador logado, pára por aqui e não tenta ler a nuvem

                // Repare na magia: trocámos 'banco_principal' por user.uid (O ID único da conta!)

                    if (doc.exists) {

                        isReceivingData.current = true;
                        
                        // CARREGA TODAS AS SUAS 10 TABELAS DO BANCO DO UTILIZADOR
                        if (data.products) setProducts(data.products);
                        if (data.purchases) setPurchases(data.purchases);
                        if (data.sales) setSales(data.sales);
                        if (data.customers) setCustomers(data.customers);
                        if (data.creditSales) setCreditSales(data.creditSales);
                        if (data.resellers) setResellers(data.resellers);
                        if (data.resellerStock) setResellerStock(data.resellerStock);
                        if (data.resellerSales) setResellerSales(data.resellerSales);
                        if (data.resellerReturns) setResellerReturns(data.resellerReturns);
                        if (data.stockAdjustments) setStockAdjustments(data.stockAdjustments);
                        
                        setTimeout(() => { isReceivingData.current = false; }, 1000);

                });

                return () => unsubscribe();
            }, [user]); // <- O código agora reage sempre que o utilizador muda

            // 2. SALVA AUTOMATICAMENTE NA NUVEM (NA PASTA PRIVADA DO UTILIZADOR)
            useEffect(() => {

                db.collection('app_boticario').doc(user.uid).set(saveData)
                    .then(() => console.log("Nuvem privada atualizada com sucesso!"))

            }, [products, purchases, sales, customers, creditSales, resellers, resellerStock, resellerSales, resellerReturns, stockAdjustments, user]);
            // ==================== FIM DA CONFIGURAÇÃO DA NUVEM ====================

            // ===============================================================


            // ==================== CÁLCULOS ====================
            const calculateAveragePrice = (productId) => {
                const productPurchases = purchases.filter(p => p.productId === productId);
                if (productPurchases.length === 0) return 0;
                const totalValue = productPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                const totalQuantity = productPurchases.reduce((sum, p) => sum + parseInt(p.quantity), 0);
                return totalQuantity > 0 ? totalValue / totalQuantity : 0;
            };

            const calculateStock = (productId) => {
                const totalIn = purchases.filter(p => p.productId === productId).reduce((sum, p) => sum + parseInt(p.quantity), 0);
                const totalOut = sales.filter(s => s.productId === productId).reduce((sum, s) => sum + parseInt(s.quantity), 0);
                const totalToResellers = resellerStock.filter(t => t.productId === productId).reduce((sum, t) => sum + parseInt(t.quantity), 0);
                const totalReturned = resellerReturns.filter(r => r.productId === productId).reduce((sum, r) => sum + parseInt(r.quantity), 0);
                const totalResellerSales = resellerSales.filter(s => s.productId === productId).reduce((sum, s) => sum + parseInt(s.quantity), 0);
                const adjustmentsIn = stockAdjustments.filter(a => a.productId === productId && a.type === 'entrada').reduce((sum, a) => sum + parseInt(a.quantity), 0);
                const adjustmentsOut = stockAdjustments.filter(a => a.productId === productId && a.type === 'saida').reduce((sum, a) => sum + parseInt(a.quantity), 0);
                
                // ❌ ERRO CORRIGIDO: totalResellerSales estava sendo ADICIONADO em vez de SUBTRAÍDO
                // ✅ LÓGICA CORRETA: Entradas - Saídas - Transferências para Revendedores + Devoluções - Vendas dos Revendedores + Ajustes
                return totalIn - totalOut - totalToResellers + totalReturned - totalResellerSales + adjustmentsIn - adjustmentsOut;
            };

            const calculateResellerStock = (resellerId, productId) => {
                const totalIn = resellerStock.filter(t => t.resellerId === resellerId && t.productId === productId).reduce((sum, t) => sum + parseInt(t.quantity), 0);
                const totalSold = resellerSales.filter(s => s.resellerId === resellerId && s.productId === productId).reduce((sum, s) => sum + parseInt(s.quantity), 0);
                const totalReturned = resellerReturns.filter(r => r.resellerId === resellerId && r.productId === productId).reduce((sum, r) => sum + parseInt(r.quantity), 0);
                return totalIn - totalSold - totalReturned;
            };

            // ==================== FILTROS ====================
            const filterAndSortProducts = (productsList, searchTerm, categoryFilter, statusFilter, expiryFilter, sortBy) => {
                let filtered = productsList.filter(p => {
                    const stock = calculateStock(p.id);
                    const daysToExpiry = p.expiryDate ? calculateDaysUntilExpiry(p.expiryDate) : null;
                    if (searchTerm && !p.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                    if (categoryFilter !== 'todos' && p.category !== categoryFilter) return false;
                    if (statusFilter === 'ok' && stock >= lowStockThreshold) return true;
                    if (statusFilter === 'low' && stock > 0 && stock < lowStockThreshold) return true;
                    if (statusFilter === 'out' && stock === 0) return true;
                    if (statusFilter !== 'todos' && statusFilter !== 'ok' && statusFilter !== 'low' && statusFilter !== 'out') return false;
                    if (expiryFilter === 'no-expiry' && !p.expiryDate) return true;
                    if (expiryFilter === 'no-expiry' && p.expiryDate) return false;
                    if (expiryFilter !== 'all' && expiryFilter !== 'no-expiry' && daysToExpiry !== null && daysToExpiry <= parseInt(expiryFilter)) return true;
                    if (expiryFilter !== 'all' && expiryFilter !== 'no-expiry' && (daysToExpiry === null || daysToExpiry > parseInt(expiryFilter))) return false;
                    return true;
                });
                filtered.sort((a, b) => {
                    const stockA = calculateStock(a.id);
                    const stockB = calculateStock(b.id);
                    const valueA = stockA * (parseFloat(a.catalogPrice) || 0);
                    const valueB = stockB * (parseFloat(b.catalogPrice) || 0);
                    const expiryA = a.expiryDate ? calculateDaysUntilExpiry(a.expiryDate) : 9999;
                    const expiryB = b.expiryDate ? calculateDaysUntilExpiry(b.expiryDate) : 9999;
                    switch(sortBy) {
                        case 'name': return a.name.localeCompare(b.name);
                        case 'name-desc': return b.name.localeCompare(a.name);
                        case 'stock': return stockA - stockB;
                        case 'stock-desc': return stockB - stockA;
                        case 'value': return valueB - valueA;
                        case 'expiry': return expiryA - expiryB;
                        default: return 0;
                    }
                });
                return filtered;
            };

            const filteredProducts = useMemo(() => filterAndSortProducts(products, productSearchTerm, productCategoryFilter, productStatusFilter, productExpiryFilter, productSortBy), [products, productSearchTerm, productCategoryFilter, productStatusFilter, productExpiryFilter, productSortBy]);
            const filteredStock = useMemo(() => filterAndSortProducts(products, stockSearchTerm, stockCategoryFilter, stockStatusFilter, stockExpiryFilter, stockSortBy), [products, stockSearchTerm, stockCategoryFilter, stockStatusFilter, stockExpiryFilter, stockSortBy]);

            // ==================== ALERTAS ====================
            const lowStockProducts = useMemo(() => products.filter(p => calculateStock(p.id) < lowStockThreshold), [products, purchases, sales, resellerStock, resellerSales, resellerReturns, stockAdjustments, lowStockThreshold]);

                return resellerStock.filter(t => calculateDaysSince(t.date) >= staleProductDays).map(t => {
                    const reseller = resellers.find(r => r.id === t.resellerId);
                    const product = products.find(p => p.id === t.productId);
                    return { ...t, resellerName: reseller?.name, productName: product?.name, days: calculateDaysSince(t.date) };
                });
            }, [resellerStock, resellers, products, staleProductDays]);

            // ==================== RELATÓRIOS E DASHBOARD ====================
            const financialReport = useMemo(() => {
                const { start, end } = getMonthRange();
                
                // 1. Vendas diretas do mês
                const monthlySales = sales.filter(s => new Date(s.date) >= start && new Date(s.date) <= end);
                const monthlyPurchases = purchases.filter(p => new Date(p.date) >= start && new Date(p.date) <= end);
                
                // 2. Vendas dos revendedores do mês
                const monthlyResellerSales = resellerSales.filter(s => new Date(s.date) >= start && new Date(s.date) <= end);

                const totalInvested = monthlyPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                
                // 3. O SEU LUCRO (Vendas Diretas)
                const directProfit = monthlySales.reduce((sum, s) => sum + ((s.price - calculateAveragePrice(s.productId)) * s.quantity), 0);
                const directRevenue = monthlySales.reduce((sum, s) => sum + (s.price * s.quantity), 0);

                // 4. O SEU LUCRO (Vindos dos Revendedores - Descontando a comissão deles)
                const resellerRevenue = monthlyResellerSales.reduce((sum, sale) => {
                    const revendedor = resellers.find(r => r.id === sale.resellerId);
                    const taxaComissao = revendedor ? revendedor.commissionRate : 0;
                    const vendaBruta = sale.salePrice * sale.quantity;
                    const valorDaComissao = vendaBruta * (taxaComissao / 100);
                    return sum + (vendaBruta - valorDaComissao); // Você ganha o que sobra
                }, 0);

                // 5. O TOTAL GERAL QUE VAI PARA A TELA
                const totalSold = directRevenue + resellerRevenue; 
                const totalProfit = directProfit + resellerRevenue; // Seu lucro real juntando os dois!

                const topProducts = products.map(p => ({ ...p, sold: sales.filter(s => s.productId === p.id).reduce((sum, s) => sum + parseInt(s.quantity), 0) })).sort((a, b) => b.sold - a.sold).slice(0, 5);
                
                return { totalSold, totalInvested, totalProfit, topProducts, monthlySales, monthlyPurchases, monthlyResellerSales };
            }, [sales, purchases, products, resellerSales, resellers]);

            const topSellingProducts = useMemo(() => {
                return products.map(p => ({
                    ...p,

                    totalRevenue: sales.filter(s => s.productId === p.id).reduce((sum, s) => sum + (s.price * s.quantity), 0)
                })).sort((a, b) => b.totalSold - a.totalSold).slice(0, 5);
            }, [products, sales]);

            const resellerReport = useMemo(() => {
                return resellers.map(r => {
                    const resellerSalesList = resellerSales.filter(s => s.resellerId === r.id);

                    const totalSales = resellerSalesList.reduce((sum, s) => sum + (s.salePrice * s.quantity), 0);
                    const commission = totalSales * (r.commissionRate / 100);
                    const yourEarnings = totalSales - commission;
                    
                    const resellerProducts = resellerStock.filter(t => t.resellerId === r.id && t.quantity > 0);
                    
                    return { ...r, totalSales, commission, yourEarnings, productsCount: resellerProducts.length, salesCount: resellerSalesList.length };
                });
            }, [resellers, resellerSales, resellerStock]);

            const stockValueReport = useMemo(() => {
                let totalPaidValue = 0;
                let totalSaleValue = 0;
                
                // 1. ESTOQUE FÍSICO (no depósito)
                products.forEach(p => {
                    const stock = calculateStock(p.id);
                    if (stock > 0) {
                        totalPaidValue += stock * calculateAveragePrice(p.id);
                        totalSaleValue += stock * (parseFloat(p.catalogPrice) || 0);
                    }
                });
                
                // 2. ESTOQUE EM COMODATO (com revendedores)
                let resellerPaidValue = 0;
                let resellerSaleValue = 0;
                resellerStock.forEach(item => {
                    if (item.quantity > 0) {
                        const product = products.find(p => p.id === item.productId);
                        if (product) {
                            resellerPaidValue += item.quantity * (parseFloat(product.costPrice || 0));
                            resellerSaleValue += item.quantity * (parseFloat(product.catalogPrice || 0));
                        }
                    }
                });
                
                // 3. TOTAIS COMPLETOS
                const totalPaidComplete = totalPaidValue + resellerPaidValue;
                const totalSaleComplete = totalSaleValue + resellerSaleValue;
                const potentialProfitComplete = totalSaleComplete - totalPaidComplete;
                const profitMarginComplete = totalPaidComplete > 0 ? ((totalSaleComplete - totalPaidComplete) / totalPaidComplete) * 100 : 0;
                
                return { 
                    totalPaidValue: totalPaidComplete, 
                    totalSaleValue: totalSaleComplete, 
                    potentialProfit: potentialProfitComplete, 
                    profitMargin: profitMarginComplete,
                    // Valores separados para UI detalhada
                    physicalPaidValue: totalPaidValue,
                    physicalSaleValue: totalSaleValue,
                    resellerPaidValue: resellerPaidValue,

        timestamp: new Date().toISOString()
    };
    setResellerSales([...resellerSales, newSale]);

    // 🔧 CORREÇÃO: Subtrai do estoque existente em vez de criar novo documento
    const updatedResellerStock = resellerStock.map(item => {
        // Encontra o item correto do estoque do revendedor
        if (item.resellerId === selectedReseller.id && 
            item.productId === resellerSaleForm.productId && 
            item.quantity > 0) {
            
            // Subtrai a quantidade vendida
            const newQuantity = parseInt(item.quantity) - qty;
            console.log(`🔄 Atualizando estoque: ${item.quantity} → ${newQuantity}`);
            
            // Se o estoque chegar a 0, mantém o item com quantity 0 para histórico
            return { ...item, quantity: newQuantity };
        }
        return item;
    });
    
    // Aplica as atualizações no estoque
    setResellerStock(updatedResellerStock);
    
    console.log(`✅ Venda registrada! Estoque atualizado no Firestore: -${qty} unidades`);
    console.log(`📊 Estoque restante: ${updatedResellerStock.filter(item => 
        item.resellerId === selectedReseller.id && 
        item.productId === resellerSaleForm.productId
    ).reduce((sum, item) => sum + parseInt(item.quantity || 0), 0)} unidades`);
    setShowResellerSaleModal(false);
    setResellerSaleForm({ productId: '', quantity: 1, salePrice: '', date: new Date().toISOString().split('T')[0] });
};

            const handleReturn = () => {
                // 1. Pegar e validar a quantidade (transforma em número)
                const qty = parseInt(returnForm.quantity);
                
                // 2. Verificação de segurança: impede o erro "Dados inválidos"
                if (!selectedReseller || !returnForm.productId || isNaN(qty) || qty <= 0) {
                    alert("Por favor, selecione um produto e insira uma quantidade válida.");
                    return;
                }

                // 3. Verificar se o revendedor realmente tem essa quantidade para devolver
                const stockEntry = resellerStock.find(item => 
                    item.resellerId === selectedReseller.id && 
                    item.productId === returnForm.productId
                );

                if (!stockEntry || stockEntry.quantity < qty) {
                    alert("Erro: O revendedor não tem essa quantidade em stock para devolver.");
                    return;
                }

                // 4. Se tudo estiver OK, cria o registo da devolução
                const newReturn = {
                    id: generateId(),
                    resellerId: selectedReseller.id,
                    productId: returnForm.productId,
                    quantity: qty,
                    date: returnForm.date || new Date().toISOString().split('T')[0],
                    timestamp: new Date().toISOString()
                };

                // 5. Atualiza a lista de devoluções (Isto faz o produto voltar ao seu stock principal)
                setResellerReturns([...resellerReturns, newReturn]);

                // 6. Atualiza o stock do revendedor (Subtrai o que ele devolveu)
                const updatedResellerStock = resellerStock.map(item => {
                    if (item.resellerId === selectedReseller.id && item.productId === returnForm.productId) {
                        return { ...item, quantity: item.quantity - qty };
                    }
                    return item;
                });
                setResellerStock(updatedResellerStock);

                // 7. Sucesso! Fecha o modal e limpa o formulário
                setShowReturnModal(false);
                setReturnForm({ productId: '', quantity: 1, date: new Date().toISOString().split('T')[0] });
                
                // Alerta de confirmação "bonito"
                console.log("Devolução concluída com sucesso!");
            };

            const handleAddSale = () => {
                if (!saleForm.productId || saleForm.quantity <= 0) { alert('Produto e quantidade obrigatórios!'); return; }
                if (calculateStock(saleForm.productId) < saleForm.quantity) { alert('Estoque insuficiente!'); return; }
                const newSale = { id: generateId(), ...saleForm, quantity: parseInt(saleForm.quantity), price: parseFloat(saleForm.price), profit: (parseFloat(saleForm.price) - calculateAveragePrice(saleForm.productId)) * parseInt(saleForm.quantity) };
                setSales([...sales, newSale]);
                if (saleForm.paymentMethod === 'credito') {
                    setCreditForm({ saleId: newSale.id, amount: newSale.price * newSale.quantity, dueDate: new Date(new Date().setDate(new Date().getDate() + 30)).toISOString().split('T')[0], status: 'pendente' });
                    setShowCreditModal(true);
                }
                setSaleForm({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0] });
                setShowSaleModal(false);
            };

            const handleEditSale = () => {
                if (!editingSale || !saleForm.productId || saleForm.quantity <= 0) { alert('Dados inválidos!'); return; }
                setSales(sales.map(s => s.id === editingSale.id ? { ...s, ...saleForm, quantity: parseInt(saleForm.quantity), price: parseFloat(saleForm.price), profit: (parseFloat(saleForm.price) - calculateAveragePrice(saleForm.productId)) * parseInt(saleForm.quantity) } : s));
                setEditingSale(null);
                setSaleForm({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0] });
                setShowEditSaleModal(false);
            };

            const openEditSale = (sale) => {
                setEditingSale(sale);
                setSaleForm({ productId: sale.productId, customerId: sale.customerId || '', quantity: sale.quantity, price: sale.price, paymentMethod: sale.paymentMethod, date: sale.date });
                setShowEditSaleModal(true);
            };

            const handleDeleteSale = () => { if (!deleteItem) return; setSales(sales.filter(s => s.id !== deleteItem.id)); setDeleteItem(null); setShowDeleteModal(false); };
            const confirmDeleteSale = (sale) => { setDeleteItem({ type: 'sale', ...sale }); setShowDeleteModal(true); };

            const handleAddPurchase = () => {
                if (!purchaseForm.productId || purchaseForm.quantity <= 0) { alert('Produto e quantidade obrigatórios!'); return; }
                setPurchases([...purchases, { id: generateId(), ...purchaseForm, quantity: parseInt(purchaseForm.quantity), price: parseFloat(purchaseForm.price) }]);
                setPurchaseForm({ productId: '', quantity: 1, price: 0, date: new Date().toISOString().split('T')[0] });
            };

            const handleAddCredit = () => {
                if (!creditForm.saleId || creditForm.amount <= 0) { alert('Dados inválidos!'); return; }
                setCreditSales([...creditSales, { id: generateId(), ...creditForm, amount: parseFloat(creditForm.amount), createdAt: new Date().toISOString() }]);
                setCreditForm({ saleId: '', amount: 0, dueDate: '', status: 'pendente' });
                setShowCreditModal(false);
            };

            const markCreditAsPaid = (creditId) => { setCreditSales(creditSales.map(c => c.id === creditId ? { ...c, status: 'pago' } : c)); };

            const handleAdjustStock = () => {
                if (!adjustStockProduct || !adjustStockForm.quantity || adjustStockForm.quantity <= 0) { alert('Dados inválidos!'); return; }
                setStockAdjustments([...stockAdjustments, { id: generateId(), productId: adjustStockProduct.id, productName: adjustStockProduct.name, ...adjustStockForm, quantity: parseInt(adjustStockForm.quantity), date: adjustStockForm.date || new Date().toISOString().split('T')[0], createdAt: new Date().toISOString() }]);
                setAdjustStockProduct(null);
                setAdjustStockForm({ type: 'saida', reason: 'quebra', quantity: 1, notes: '', date: new Date().toISOString().split('T')[0] });
                setShowAdjustStockModal(false);
                alert('✅ Ajuste registrado!');
            };

            const openAdjustStock = (product) => {
                setAdjustStockProduct(product);
                setAdjustStockForm({ type: 'saida', reason: 'quebra', quantity: 1, notes: '', date: new Date().toISOString().split('T')[0] });
                setShowAdjustStockModal(true);
            };

            const openQuickBuy = (product) => {
                setQuickBuyProduct(product);
                setQuickBuyForm({ quantity: 5, price: calculateAveragePrice(product.id), date: new Date().toISOString().split('T')[0] });
                setShowQuickBuyModal(true);
            };

            const handleQuickBuy = () => {
                if (!quickBuyProduct || quickBuyForm.quantity <= 0 || quickBuyForm.price <= 0) { alert('Dados inválidos!'); return; }
                setPurchases([...purchases, { id: generateId(), productId: quickBuyProduct.id, quantity: parseInt(quickBuyForm.quantity), price: parseFloat(quickBuyForm.price), date: quickBuyForm.date || new Date().toISOString().split('T')[0] }]);
                setQuickBuyProduct(null);
                setQuickBuyForm({ quantity: 5, price: 0, date: new Date().toISOString().split('T')[0] });
                setShowQuickBuyModal(false);
                alert('✅ Compra registrada!');
            };

            const exportData = () => {
                const data = { exportDate: new Date().toISOString(), version: '3.0', products, purchases, sales, customers, creditSales, resellers, resellerStock, resellerSales, resellerReturns, stockAdjustments, config: { lowStockThreshold, expiryAlertDays, staleProductDays } };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_boticario_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const exportProductsCSV = (productsList, filename) => {
                const BOM = '\uFEFF';
                const separator = ';';
                const headers = ['Nome', 'Categoria', 'Preço Catálogo', 'Stock', 'Preço Custo', 'Valor Stock', 'Validade', 'Status'];
                const rows = productsList.map(p => {
                    const stock = calculateStock(p.id);
                    const avgPrice = calculateAveragePrice(p.id);
                    const value = stock * (parseFloat(p.catalogPrice) || 0);
                    let status = 'OK';
                    if (stock === 0) status = 'Sem Stock';
                    else if (stock < lowStockThreshold) status = 'Baixo';
                    const formatNumber = (num) => num.toString().replace('.', ',');
                    return [p.name, p.category, formatNumber(parseFloat(p.catalogPrice) || 0), stock, formatNumber(avgPrice), formatNumber(value), p.expiryDate ? formatDate(p.expiryDate) : 'N/A', status].map(cell => `"${cell}"`).join(separator);
                });
                const csv = BOM + [headers.join(separator), ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            const exportPurchaseHistory = () => {
                const BOM = '\uFEFF';
                const separator = ';';
                const headers = ['Data', 'Produto', 'Quantidade', 'Preço Unitário', 'Total'];
                const rows = filteredPurchaseHistory.map(p => {
                    const product = products.find(prod => prod.id === p.productId);
                    const formatNumber = (num) => num.toString().replace('.', ',');
                    return [formatDate(p.date), product ? product.name : 'Produto removido', p.quantity, formatNumber(p.price), formatNumber(p.price * p.quantity)].map(cell => `"${cell}"`).join(separator);
                });
                const totalInvested = filteredPurchaseHistory.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                rows.push([], ['TOTAL INVESTIDO', '', '', '', formatNumber(totalInvested)]);
                const csv = BOM + [headers.join(separator), ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `historico_compras_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleImportFile = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.products) { alert('Arquivo inválido!'); return; }
                        if (confirm(`Importar?\n• Produtos: ${data.products?.length || 0}\n• Revendedores: ${data.resellers?.length || 0}\n\n⚠️ SUBSTITUIRÁ dados atuais!`)) {
                            if (data.products) setProducts(data.products);
                            if (data.purchases) setPurchases(data.purchases);
                            if (data.sales) setSales(data.sales);
                            if (data.customers) setCustomers(data.customers);
                            if (data.creditSales) setCreditSales(data.creditSales);
                            if (data.resellers) setResellers(data.resellers);
                            if (data.resellerStock) setResellerStock(data.resellerStock);
                            if (data.resellerSales) setResellerSales(data.resellerSales);
                            if (data.resellerReturns) setResellerReturns(data.resellerReturns);
                            if (data.stockAdjustments) setStockAdjustments(data.stockAdjustments);
                            if (data.config) { setLowStockThreshold(data.config.lowStockThreshold || 3); setExpiryAlertDays(data.config.expiryAlertDays || 30); setStaleProductDays(data.config.staleProductDays || 30); }
                            alert('✅ Importado!');
                            setActiveTab('dashboard');
                        }
                    } catch (error) { alert('Erro ao ler arquivo!'); }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const triggerImport = () => { fileInputRef.current.click(); };

            const productOptions = useMemo(() => products.map(p => ({ value: p.id, label: p.name, stock: calculateStock(p.id), avgPrice: calculateAveragePrice(p.id) })), [products, purchases, sales, resellerStock, resellerSales, resellerReturns, stockAdjustments]);
            const customerOptions = useMemo(() => customers.map(c => ({ value: c.id, label: c.name, phone: c.phone || '' })), [customers]);
            const resellerOptions = useMemo(() => resellers.map(r => ({ value: r.id, label: r.name, salon: r.salonName })), [resellers]);

            // ==================== RENDER ====================
            // ==================== TELA DE BLOQUEIO VISUAL ====================
            // Este bloco DEVE ficar no final, logo antes do "return" principal do App
            if (!user) {
                return (
                    <div className="min-h-screen boticario-gradient flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
                            <div className="text-center mb-8">
                                <i className="fas fa-store text-5xl text-purple-600 mb-4"></i>
                                <h1 className="text-2xl font-bold text-gray-800">
                                    {isRegistering ? 'Criar Nova Conta' : 'Acesso ao Sistema'}
                                </h1>
                                <p className="text-gray-500 mt-2">Gestão de Revenda</p>
                            </div>

                            <form onSubmit={handleAuth} className="space-y-6">
                                <div>
                                    <label className="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                                    <input type="email" className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" value={email} onChange={(e) => setEmail(e.target.value)} required />
                                </div>
                                <div>
                                    <label className="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                                    <input type="password" className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" value={password} onChange={(e) => setPassword(e.target.value)} required />
                                </div>
                                {authError && <div className="alert-red text-red-700 p-3 rounded text-sm">{authError}</div>}
                                <button type="submit" className="w-full boticario-gradient text-white font-bold py-3 px-4 rounded-lg hover:opacity-90">
                                    {isRegistering ? 'Cadastrar' : 'Entrar no Sistema'}
                                </button>
                            </form>
                            <div className="text-center mt-6">
                                <button onClick={() => setIsRegistering(!isRegistering)} className="text-purple-600 text-sm font-medium">
                                    {isRegistering ? 'Já tem conta? Entrar' : 'Não tem conta? Cadastrar'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
            // ================================================================= 
return (
                <div className="min-h-screen">
                    <input type="file" ref={fileInputRef} onChange={handleImportFile} accept=".json" style={{ display: 'none' }} />

                    {/* Header */}
                    <header className="boticario-gradient text-white p-4 md:p-6 shadow-lg">
                        <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 className="text-xl md:text-3xl font-bold"><i className="fas fa-store mr-3"></i>Gestão O Boticário</h1>
                                <p className="text-white/80 mt-1 text-xs md:text-sm">Controle de vendas, estoque e revendedores</p>
                            </div>
                            <div className="flex gap-2 flex-wrap">
                                <button onClick={triggerImport} className="bg-green-600 hover:bg-green-700 px-3 py-2 rounded-lg transition text-sm">
                                    <i className="fas fa-upload mr-2"></i><span className="hidden sm:inline">Importar</span>
                                </button>
                                <button onClick={exportData} className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition text-sm">
                                    <i className="fas fa-download mr-2"></i><span className="hidden sm:inline">Exportar</span>
                                </button>
                                <button onClick={() => setActiveTab('config')} className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition">
                                    <i className="fas fa-cog"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex overflow-x-auto">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-line' },
                                    { id: 'stock', label: 'Stock', icon: 'fa-warehouse' },
                                    { id: 'resellers', label: 'Revendedores', icon: 'fa-handshake' },
                                    { id: 'products', label: 'Produtos', icon: 'fa-box' },
                                    { id: 'sales', label: 'Vendas', icon: 'fa-shopping-cart' },
                                    { id: 'purchases', label: 'Compras', icon: 'fa-truck' },
                                    { id: 'customers', label: 'Clientes', icon: 'fa-users' },
                                    { id: 'credits', label: 'Fiado', icon: 'fa-hand-holding-usd' },
                                    { id: 'reports', label: 'Relatórios', icon: 'fa-file-invoice-dollar' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-3 md:px-6 py-4 flex items-center gap-2 border-b-2 transition whitespace-nowrap ${activeTab === tab.id ? 'border-purple-600 text-purple-600' : 'border-transparent text-gray-600 hover:text-purple-600'}`}>
                                        <i className={`fas ${tab.icon}`}></i>
                                        <span className="hidden md:inline">{tab.label}</span>
                                        {tab.id === 'resellers' && resellers.length > 0 && <span className="bg-purple-600 text-white text-xs px-2 py-0.5 rounded-full">{resellers.length}</span>}
                                        {tab.id === 'credits' && pendingCreditSales.length > 0 && <span className="bg-red-600 text-white text-xs px-2 py-0.5 rounded-full">{pendingCreditSales.length}</span>}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto p-4 md:p-6">
                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <StatCard title="Vendas do Mês" value={formatCurrency(financialReport.totalSold)} icon="fa-shopping-cart" color="border-green-400" />
                                    <StatCard title="Investido no Mês" value={formatCurrency(financialReport.totalInvested)} icon="fa-wallet" color="border-red-400" />
                                    <StatCard title="Lucro Líquido" value={formatCurrency(financialReport.totalProfit)} icon="fa-coins" color="border-blue-400" />
                                    <StatCard title="Fiado Pendente" value={formatCurrency(pendingCreditSales.reduce((sum, c) => sum + c.amount, 0))} icon="fa-hand-holding-usd" color="border-yellow-400" />
                                </div>
                               {resellers.length > 0 && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <StatCard 
                                            title="💰 Vendas Revendedores (Mês)" 
                                            value={formatCurrency(
                                                resellerSales
                                                    .filter(s => new Date(s.date) >= getMonthRange().start && new Date(s.date) <= getMonthRange().end)
                                                    .reduce((sum, s) => sum + ((parseFloat(s.salePrice) || 0) * parseInt(s.quantity)), 0)
                                            )} 
                                            icon="fa-store" 
                                            color="border-green-400" 
                                        />
                                        <StatCard 
                                            title="📦 Produtos em Comodato" 
                                            value={resellerStock.reduce((sum, t) => sum + (t.quantity > 0 ? t.quantity : 0), 0)} 
                                            icon="fa-boxes" 
                                            color="border-purple-400" 
                                            smallText={`${resellerStock.reduce((sum, t) => sum + (t.quantity > 0 ? t.quantity : 0), 0)} itens`}
                                            subValues={[
                                                { label: "Valor Custo", value: formatCurrency(stockValueReport.resellerPaidValue), color: "text-blue-700" },
                                                { label: "Valor Venda", value: formatCurrency(stockValueReport.resellerSaleValue), color: "text-green-700" }
                                            ]}
                                        />
                                        <StatCard 
                                            title="💵 A Receber" 
                                            value={formatCurrency(
                                                resellerSales
                                                    .filter(s => new Date(s.date) >= getMonthRange().start && new Date(s.date) <= getMonthRange().end)
                                                    .reduce((sum, sale) => {
                                                        const rev = resellers.find(r => r.id === sale.resellerId);
                                                        const comissao = rev ? parseFloat(rev.commissionRate) / 100 : 0;
                                                        const valorBruto = (parseFloat(sale.salePrice) || 0) * parseInt(sale.quantity);
                                                        return sum + (valorBruto - (valorBruto * comissao));
                                                    }, 0)
                                            )} 
                                            icon="fa-euro-sign" 
                                            color="border-yellow-400" 
                                        />
                                    </div>
                                )}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <StatCard title="📦 Estoque (Preço Pago)" value={formatCurrency(stockValueReport.totalPaidValue)} icon="fa-boxes" color="border-purple-400" smallText="Quanto investiu" />
                                    <StatCard title="💰 Estoque (Preço Venda)" value={formatCurrency(stockValueReport.totalSaleValue)} icon="fa-tag" color="border-green-400" smallText="Preço catálogo" />
                                    <StatCard title="🎯 Lucro Potencial" value={formatCurrency(stockValueReport.potentialProfit)} icon="fa-chart-line" color={stockValueReport.potentialProfit >= 0 ? "border-green-400" : "border-red-400"} smallText={`Margem: ${stockValueReport.profitMargin.toFixed(1)}%`} />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                    {lowStockProducts.length > 0 && (
                                        <div className="alert-red rounded-lg p-4">
                                            <h3 className="font-bold text-red-800 mb-2"><i className="fas fa-exclamation-triangle mr-2"></i>Estoque Baixo ({lowStockProducts.length})</h3>
                                            <ul className="space-y-1">{lowStockProducts.slice(0, 5).map(p => <li key={p.id} className="text-red-700 text-sm">• {p.name} - {calculateStock(p.id)} un.</li>)}</ul>
                                        </div>
                                    )}
                                    {expiryAlertProducts.length > 0 && (
                                        <div className="alert-yellow rounded-lg p-4">
                                            <h3 className="font-bold text-yellow-800 mb-2"><i className="fas fa-clock mr-2"></i>Validade Próxima ({expiryAlertProducts.length})</h3>
                                            <ul className="space-y-1">{expiryAlertProducts.slice(0, 5).map(p => <li key={p.id} className="text-yellow-700 text-sm">• {p.name} - {calculateDaysUntilExpiry(p.expiryDate)} dias</li>)}</ul>
                                        </div>
                                    )}
                                    {staleResellerProducts.length > 0 && (
                                        <div className="alert-blue rounded-lg p-4">
                                            <h3 className="font-bold text-blue-800 mb-2"><i className="fas fa-exclamation-circle mr-2"></i>Produtos Parados ({staleResellerProducts.length})</h3>
                                            <ul className="space-y-1">{staleResellerProducts.slice(0, 5).map(p => <li key={p.id} className="text-blue-700 text-sm">• {p.productName} em {p.resellerName} - {p.days} dias</li>)}</ul>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* STOCK */}
                        {activeTab === 'stock' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
