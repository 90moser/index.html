<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Revenda O Boticário</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .boticario-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .alert-red { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .alert-yellow { background-color: #fef3c7; border-left: 4px solid #f59e0b; }
        .alert-green { background-color: #d1fae5; border-left: 4px solid #10b981; }
        .modal-overlay { background-color: rgba(0,0,0,0.5); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-edit { background-color: #3b82f6; }
        .btn-edit:hover { background-color: #2563eb; }
        .btn-delete { background-color: #ef4444; }
        .btn-delete:hover { background-color: #dc2626; }
        .btn-view { background-color: #8b5cf6; }
        .btn-view:hover { background-color: #7c3aed; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==================== UTILITÁRIOS ====================
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        
        // MUDANÇA: Agora em Euro (€)
        const formatCurrency = (value) => new Intl.NumberFormat('pt-PT', { 
            style: 'currency', currency: 'EUR' 
        }).format(value);

        const formatDate = (date) => new Date(date).toLocaleDateString('pt-PT');

        const calculateDaysUntilExpiry = (expiryDate) => {
            const today = new Date();
            const expiry = new Date(expiryDate);
            const diffTime = expiry - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const getMonthRange = () => {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), 1);
            const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            return { start, end };
        };

        // ==================== COMPONENTES ====================

        const StatCard = ({ title, value, icon, color, subtitle, smallText }) => (
            <div className={`bg-white rounded-lg p-4 md:p-6 card-hover shadow-md border-l-4 ${color}`}>
                <div className="flex items-center justify-between">
                    <div>
                        <p className="text-gray-500 text-sm">{title}</p>
                        <p className="text-xl md:text-2xl font-bold text-gray-800">{value}</p>
                        {subtitle && <p className="text-xs text-gray-400 mt-1">{subtitle}</p>}
                        {smallText && <p className="text-xs text-gray-500 mt-1">{smallText}</p>}
                    </div>
                    <div className={`p-3 rounded-full ${color.replace('border-', 'bg-').replace('-400', '-100')}`}>
                        <i className={`fas ${icon} text-xl`}></i>
                    </div>
                </div>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
                        <div className="p-6 border-b flex justify-between items-center">
                            <h3 className="text-xl font-bold text-gray-800">{title}</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        // ==================== APLICAÇÃO PRINCIPAL ====================
        function App() {
            // Estados Principais
            const [activeTab, setActiveTab] = useState('dashboard');
            const [products, setProducts] = useState([]);
            const [purchases, setPurchases] = useState([]);
            const [sales, setSales] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [creditSales, setCreditSales] = useState([]);
            
            // Estados de Modal
            const [showProductModal, setShowProductModal] = useState(false);
            const [showEditProductModal, setShowEditProductModal] = useState(false);
            const [showSaleModal, setShowSaleModal] = useState(false);
            const [showEditSaleModal, setShowEditSaleModal] = useState(false);
            const [showCustomerModal, setShowCustomerModal] = useState(false);
            const [showEditCustomerModal, setShowEditCustomerModal] = useState(false);
            const [showCreditModal, setShowCreditModal] = useState(false);
            const [showDeleteModal, setShowDeleteModal] = useState(false);
            
            // Estados para Edição/Exclusão
            const [editingProduct, setEditingProduct] = useState(null);
            const [editingSale, setEditingSale] = useState(null);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [deleteItem, setDeleteItem] = useState(null);
            
            // Filtro de Clientes
            const [customerSort, setCustomerSort] = useState('default'); // default, spent, purchases
            
            // Formulários
            const [productForm, setProductForm] = useState({
                name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: '', catalogPrice: ''
            });
            const [purchaseForm, setPurchaseForm] = useState({
                productId: '', quantity: 1, price: 0, date: new Date().toISOString().split('T')[0]
            });
            const [saleForm, setSaleForm] = useState({
                productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0]
            });
            const [customerForm, setCustomerForm] = useState({ name: '', phone: '', email: '' });
            const [creditForm, setCreditForm] = useState({
                saleId: '', amount: 0, dueDate: '', status: 'pendente'
            });

            // Configurações
            const [lowStockThreshold, setLowStockThreshold] = useState(3);
            const [expiryAlertDays, setExpiryAlertDays] = useState(30);
            
            // Ref para input de arquivo
            const fileInputRef = useRef(null);

            // ==================== PERSISTÊNCIA ====================
            useEffect(() => {
                const loadData = (key) => {
                    const data = localStorage.getItem(`boticario_${key}`);
                    return data ? JSON.parse(data) : [];
                };
                setProducts(loadData('products'));
                setPurchases(loadData('purchases'));
                setSales(loadData('sales'));
                setCustomers(loadData('customers'));
                setCreditSales(loadData('creditSales'));
                
                const config = localStorage.getItem('boticario_config');
                if (config) {
                    const cfg = JSON.parse(config);
                    setLowStockThreshold(cfg.lowStockThreshold || 3);
                    setExpiryAlertDays(cfg.expiryAlertDays || 30);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('boticario_products', JSON.stringify(products));
                localStorage.setItem('boticario_purchases', JSON.stringify(purchases));
                localStorage.setItem('boticario_sales', JSON.stringify(sales));
                localStorage.setItem('boticario_customers', JSON.stringify(customers));
                localStorage.setItem('boticario_creditSales', JSON.stringify(creditSales));
                localStorage.setItem('boticario_config', JSON.stringify({ lowStockThreshold, expiryAlertDays }));
            }, [products, purchases, sales, customers, creditSales, lowStockThreshold, expiryAlertDays]);

            // ==================== CÁLCULOS ====================
            const calculateAveragePrice = (productId) => {
                const productPurchases = purchases.filter(p => p.productId === productId);
                if (productPurchases.length === 0) return 0;
                const totalValue = productPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                const totalQuantity = productPurchases.reduce((sum, p) => sum + parseInt(p.quantity), 0);
                return totalQuantity > 0 ? totalValue / totalQuantity : 0;
            };

            const calculateStock = (productId) => {
                const totalIn = purchases.filter(p => p.productId === productId).reduce((sum, p) => sum + parseInt(p.quantity), 0);
                const totalOut = sales.filter(s => s.productId === productId).reduce((sum, s) => sum + parseInt(s.quantity), 0);
                return totalIn - totalOut;
            };

            // ==================== ALERTAS ====================
            const lowStockProducts = useMemo(() => products.filter(p => calculateStock(p.id) < lowStockThreshold), [products, purchases, sales, lowStockThreshold]);
            const expiryAlertProducts = useMemo(() => products.filter(p => p.expiryDate && calculateDaysUntilExpiry(p.expiryDate) <= expiryAlertDays), [products, expiryAlertDays]);
            const pendingCreditSales = useMemo(() => creditSales.filter(c => c.status === 'pendente'), [creditSales]);

            // ==================== RELATÓRIOS ====================
            const financialReport = useMemo(() => {
                const { start, end } = getMonthRange();
                const monthlySales = sales.filter(s => new Date(s.date) >= start && new Date(s.date) <= end);
                const monthlyPurchases = purchases.filter(p => new Date(p.date) >= start && new Date(p.date) <= end);
                const totalSold = monthlySales.reduce((sum, s) => sum + (s.price * s.quantity), 0);
                const totalInvested = monthlyPurchases.reduce((sum, p) => sum + (p.price * p.quantity), 0);
                const totalProfit = monthlySales.reduce((sum, s) => sum + ((s.price - calculateAveragePrice(s.productId)) * s.quantity), 0);
                const topProducts = products.map(p => ({ ...p, sold: sales.filter(s => s.productId === p.id).reduce((sum, s) => sum + parseInt(s.quantity), 0) })).sort((a, b) => b.sold - a.sold).slice(0, 5);
                return { totalSold, totalInvested, totalProfit, topProducts, monthlySales, monthlyPurchases };
            }, [sales, purchases, products]);

            // ==================== VALOR DO ESTOQUE ====================
            const stockValueReport = useMemo(() => {
                let totalPaidValue = 0;
                let totalSaleValue = 0;
                
                products.forEach(p => {
                    const stock = calculateStock(p.id);
                    if (stock > 0) {
                        const avgPrice = calculateAveragePrice(p.id);
                        totalPaidValue += stock * avgPrice;
                        totalSaleValue += stock * (parseFloat(p.catalogPrice) || 0);
                    }
                });
                
                return {
                    totalPaidValue,
                    totalSaleValue,
                    potentialProfit: totalSaleValue - totalPaidValue,
                    profitMargin: totalPaidValue > 0 ? ((totalSaleValue - totalPaidValue) / totalPaidValue) * 100 : 0
                };
            }, [products, purchases, sales]);

            // ==================== CLIENTES - DADOS PARA FILTRO ====================
            const customersWithStats = useMemo(() => {
                return customers.map(c => {
                    const customerSales = sales.filter(s => s.customerId === c.id);
                    const totalSpent = customerSales.reduce((sum, s) => sum + (s.price * s.quantity), 0);
                    const totalPurchases = customerSales.length;
                    return {
                        ...c,
                        totalSpent,
                        totalPurchases,
                        lastPurchase: customerSales.length > 0 ? customerSales[customerSales.length - 1].date : null
                    };
                });
            }, [customers, sales]);

            // ==================== PRODUTOS ====================
            const handleAddProduct = () => {
                if (!productForm.name) { alert('Nome do produto é obrigatório!'); return; }
                const newProduct = { id: generateId(), ...productForm, catalogPrice: parseFloat(productForm.catalogPrice) || 0, createdAt: new Date().toISOString() };
                setProducts([...products, newProduct]);
                setProductForm({ name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: '', catalogPrice: '' });
                setShowProductModal(false);
            };

            const handleEditProduct = () => {
                if (!editingProduct || !productForm.name) { alert('Nome do produto é obrigatório!'); return; }
                const updatedProducts = products.map(p => 
                    p.id === editingProduct.id ? { ...p, ...productForm, catalogPrice: parseFloat(productForm.catalogPrice) || 0 } : p
                );
                setProducts(updatedProducts);
                setEditingProduct(null);
                setProductForm({ name: '', category: 'perfumaria', fragrance: '', expiryDate: '', cycle: '', catalogPrice: '' });
                setShowEditProductModal(false);
            };

            const openEditProduct = (product) => {
                setEditingProduct(product);
                setProductForm({
                    name: product.name,
                    category: product.category,
                    fragrance: product.fragrance || '',
                    expiryDate: product.expiryDate || '',
                    cycle: product.cycle || '',
                    catalogPrice: product.catalogPrice || ''
                });
                setShowEditProductModal(true);
            };

            const handleDeleteProduct = () => {
                if (!deleteItem) return;
                setProducts(products.filter(p => p.id !== deleteItem.id));
                setDeleteItem(null);
                setShowDeleteModal(false);
            };

            const confirmDeleteProduct = (product) => {
                const salesCount = sales.filter(s => s.productId === product.id).length;
                if (salesCount > 0) {
                    if (!confirm(`Este produto tem ${salesCount} venda(s) registrada(s). Excluir pode afetar os relatórios. Deseja continuar?`)) {
                        return;
                    }
                }
                setDeleteItem({ type: 'product', ...product });
                setShowDeleteModal(true);
            };

            // ==================== CLIENTES ====================
            const handleAddCustomer = () => {
                if (!customerForm.name) { alert('Nome do cliente é obrigatório!'); return; }
                const newCustomer = { id: generateId(), ...customerForm, createdAt: new Date().toISOString() };
                setCustomers([...customers, newCustomer]);
                setCustomerForm({ name: '', phone: '', email: '' });
                setShowCustomerModal(false);
            };

            const handleEditCustomer = () => {
                if (!editingCustomer || !customerForm.name) { alert('Nome do cliente é obrigatório!'); return; }
                const updatedCustomers = customers.map(c => 
                    c.id === editingCustomer.id ? { ...c, ...customerForm } : c
                );
                setCustomers(updatedCustomers);
                setEditingCustomer(null);
                setCustomerForm({ name: '', phone: '', email: '' });
                setShowEditCustomerModal(false);
            };

            const openEditCustomer = (customer) => {
                setEditingCustomer(customer);
                setCustomerForm({
                    name: customer.name,
                    phone: customer.phone || '',
                    email: customer.email || ''
                });
                setShowEditCustomerModal(true);
            };

            const handleDeleteCustomer = () => {
                if (!deleteItem) return;
                setCustomers(customers.filter(c => c.id !== deleteItem.id));
                setDeleteItem(null);
                setShowDeleteModal(false);
            };

            const confirmDeleteCustomer = (customer) => {
                const salesCount = sales.filter(s => s.customerId === customer.id).length;
                if (salesCount > 0) {
                    if (!confirm(`Este cliente tem ${salesCount} compra(s) registrada(s). Excluir pode afetar o histórico. Deseja continuar?`)) {
                        return;
                    }
                }
                setDeleteItem({ type: 'customer', ...customer });
                setShowDeleteModal(true);
            };

            // ==================== VENDAS ====================
            const handleAddSale = () => {
                if (!saleForm.productId || saleForm.quantity <= 0) { alert('Produto e quantidade válidos são obrigatórios!'); return; }
                const stock = calculateStock(saleForm.productId);
                if (stock < saleForm.quantity) { alert(`Estoque insuficiente! Disponível: ${stock}`); return; }
                const newSale = { id: generateId(), ...saleForm, quantity: parseInt(saleForm.quantity), price: parseFloat(saleForm.price), profit: (parseFloat(saleForm.price) - calculateAveragePrice(saleForm.productId)) * parseInt(saleForm.quantity) };
                setSales([...sales, newSale]);
                if (saleForm.paymentMethod === 'credito') {
                    setCreditForm({ saleId: newSale.id, amount: newSale.price * newSale.quantity, dueDate: new Date(new Date().setDate(new Date().getDate() + 30)).toISOString().split('T')[0], status: 'pendente' });
                    setShowCreditModal(true);
                }
                setSaleForm({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0] });
                setShowSaleModal(false);
            };

            // NOVO: Editar Venda
            const handleEditSale = () => {
                if (!editingSale || !saleForm.productId || saleForm.quantity <= 0) { alert('Dados inválidos!'); return; }
                const updatedSales = sales.map(s => {
                    if (s.id === editingSale.id) {
                        const newQuantity = parseInt(saleForm.quantity);
                        const newPrice = parseFloat(saleForm.price);
                        return {
                            ...s,
                            ...saleForm,
                            quantity: newQuantity,
                            price: newPrice,
                            profit: (newPrice - calculateAveragePrice(saleForm.productId)) * newQuantity
                        };
                    }
                    return s;
                });
                setSales(updatedSales);
                setEditingSale(null);
                setSaleForm({ productId: '', customerId: '', quantity: 1, price: 0, paymentMethod: 'bizum', date: new Date().toISOString().split('T')[0] });
                setShowEditSaleModal(false);
            };

            const openEditSale = (sale) => {
                setEditingSale(sale);
                setSaleForm({
                    productId: sale.productId,
                    customerId: sale.customerId || '',
                    quantity: sale.quantity,
                    price: sale.price,
                    paymentMethod: sale.paymentMethod,
                    date: sale.date
                });
                setShowEditSaleModal(true);
            };

            const handleDeleteSale = () => {
                if (!deleteItem) return;
                setSales(sales.filter(s => s.id !== deleteItem.id));
                setDeleteItem(null);
                setShowDeleteModal(false);
            };

            const confirmDeleteSale = (sale) => {
                setDeleteItem({ type: 'sale', ...sale });
                setShowDeleteModal(true);
            };

            // ==================== OUTROS HANDLERS ====================
            const handleAddPurchase = () => {
                if (!purchaseForm.productId || purchaseForm.quantity <= 0) { alert('Produto e quantidade válidos são obrigatórios!'); return; }
                const newPurchase = { id: generateId(), ...purchaseForm, quantity: parseInt(purchaseForm.quantity), price: parseFloat(purchaseForm.price) };
                setPurchases([...purchases, newPurchase]);
                setPurchaseForm({ productId: '', quantity: 1, price: 0, date: new Date().toISOString().split('T')[0] });
            };

            const handleAddCredit = () => {
                if (!creditForm.saleId || creditForm.amount <= 0) { alert('Dados inválidos!'); return; }
                const newCredit = { id: generateId(), ...creditForm, amount: parseFloat(creditForm.amount), createdAt: new Date().toISOString() };
                setCreditSales([...creditSales, newCredit]);
                setCreditForm({ saleId: '', amount: 0, dueDate: '', status: 'pendente' });
                setShowCreditModal(false);
            };

            const markCreditAsPaid = (creditId) => {
                setCreditSales(creditSales.map(c => c.id === creditId ? { ...c, status: 'pago' } : c));
            };

            // ==================== EXPORTAR/IMPORTAR ====================
            const exportData = () => {
                const data = { exportDate: new Date().toISOString(), version: '1.4', products, purchases, sales, customers, creditSales, config: { lowStockThreshold, expiryAlertDays } };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_boticario_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleImportFile = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.products || !data.sales) { alert('Arquivo inválido! Não é um backup do Boticário.'); return; }
                        const confirmMsg = `DADOS ENCONTRADOS:\n• Produtos: ${data.products.length}\n• Vendas: ${data.sales?.length || 0}\n• Compras: ${data.purchases?.length || 0}\n• Clientes: ${data.customers?.length || 0}\n\n⚠️ Isso vai SUBSTITUIR todos os dados atuais! Continuar?`;
                        if (confirm(confirmMsg)) {
                            if (data.products) setProducts(data.products);
                            if (data.purchases) setPurchases(data.purchases);
                            if (data.sales) setSales(data.sales);
                            if (data.customers) setCustomers(data.customers);
                            if (data.creditSales) setCreditSales(data.creditSales);
                            if (data.config) { setLowStockThreshold(data.config.lowStockThreshold || 3); setExpiryAlertDays(data.config.expiryAlertDays || 30); }
                            alert('✅ Dados importados com sucesso!');
                            setActiveTab('dashboard');
                        }
                    } catch (error) { alert('Erro ao ler arquivo! Verifique se é um JSON válido.'); }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const triggerImport = () => { fileInputRef.current.click(); };

            // ==================== STOCK DATA ====================
            const stockData = useMemo(() => {
                return products.map(p => ({
                    ...p,
                    stock: calculateStock(p.id),
                    avgPrice: calculateAveragePrice(p.id),
                    daysToExpiry: p.expiryDate ? calculateDaysUntilExpiry(p.expiryDate) : null,
                    paidValue: calculateStock(p.id) * calculateAveragePrice(p.id),
                    saleValue: calculateStock(p.id) * (parseFloat(p.catalogPrice) || 0)
                })).sort((a, b) => a.stock - b.stock);
            }, [products, purchases, sales]);

            // ==================== CLIENTES ORDENADOS ====================
            const sortedCustomers = useMemo(() => {
                let sorted = [...customersWithStats];
                if (customerSort === 'spent') {
                    sorted.sort((a, b) => b.totalSpent - a.totalSpent);
                } else if (customerSort === 'purchases') {
                    sorted.sort((a, b) => b.totalPurchases - a.totalPurchases);
                }
                return sorted;
            }, [customersWithStats, customerSort]);

            // ==================== RENDER ====================
            return (
                <div className="min-h-screen">
                    <input type="file" ref={fileInputRef} onChange={handleImportFile} accept=".json" style={{ display: 'none' }} />

                    {/* Header */}
                    <header className="boticario-gradient text-white p-4 md:p-6 shadow-lg">
                        <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 className="text-xl md:text-3xl font-bold"><i className="fas fa-store mr-3"></i>Gestão O Boticário</h1>
                                <p className="text-white/80 mt-1 text-xs md:text-sm">Controle de vendas e estoque</p>
                            </div>
                            <div className="flex gap-2 flex-wrap">
                                <button onClick={triggerImport} className="bg-green-600 hover:bg-green-700 px-3 py-2 rounded-lg transition text-sm">
                                    <i className="fas fa-upload mr-2"></i><span className="hidden sm:inline">Importar</span>
                                </button>
                                <button onClick={exportData} className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition text-sm">
                                    <i className="fas fa-download mr-2"></i><span className="hidden sm:inline">Exportar</span>
                                </button>
                                <button onClick={() => setActiveTab('config')} className="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition">
                                    <i className="fas fa-cog"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex overflow-x-auto">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-line' },
                                    { id: 'stock', label: 'Stock', icon: 'fa-warehouse' },
                                    { id: 'products', label: 'Produtos', icon: 'fa-box' },
                                    { id: 'sales', label: 'Vendas', icon: 'fa-shopping-cart' },
                                    { id: 'purchases', label: 'Compras', icon: 'fa-truck' },
                                    { id: 'customers', label: 'Clientes', icon: 'fa-users' },
                                    { id: 'credits', label: 'Fiado', icon: 'fa-hand-holding-usd' },
                                    { id: 'reports', label: 'Relatórios', icon: 'fa-file-invoice-dollar' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-3 md:px-6 py-4 flex items-center gap-2 border-b-2 transition whitespace-nowrap ${activeTab === tab.id ? 'border-purple-600 text-purple-600' : 'border-transparent text-gray-600 hover:text-purple-600'}`}>
                                        <i className={`fas ${tab.icon}`}></i>
                                        <span className="hidden md:inline">{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto p-4 md:p-6">
                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <StatCard title="Vendas do Mês" value={formatCurrency(financialReport.totalSold)} icon="fa-shopping-cart" color="border-green-400" />
                                    <StatCard title="Investido no Mês" value={formatCurrency(financialReport.totalInvested)} icon="fa-wallet" color="border-red-400" />
                                    <StatCard title="Lucro Líquido" value={formatCurrency(financialReport.totalProfit)} icon="fa-coins" color="border-blue-400" />
                                    <StatCard title="Fiado Pendente" value={formatCurrency(pendingCreditSales.reduce((sum, c) => sum + c.amount, 0))} icon="fa-hand-holding-usd" color="border-yellow-400" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <StatCard title="📦 Estoque (Preço Pago)" value={formatCurrency(stockValueReport.totalPaidValue)} icon="fa-boxes" color="border-purple-400" smallText="Quanto você investiu" />
                                    <StatCard title="💰 Estoque (Preço Venda)" value={formatCurrency(stockValueReport.totalSaleValue)} icon="fa-tag" color="border-green-400" smallText="Preço catálogo O Boticário" />
                                    <StatCard title="🎯 Lucro Potencial" value={formatCurrency(stockValueReport.potentialProfit)} icon="fa-chart-line" color={stockValueReport.potentialProfit >= 0 ? "border-green-400" : "border-red-400"} smallText={`Margem: ${stockValueReport.profitMargin.toFixed(1)}%`} />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                    {lowStockProducts.length > 0 && (
                                        <div className="alert-red rounded-lg p-4">
                                            <h3 className="font-bold text-red-800 mb-2"><i className="fas fa-exclamation-triangle mr-2"></i>Estoque Baixo ({lowStockProducts.length})</h3>
                                            <ul className="space-y-1">{lowStockProducts.slice(0, 5).map(p => <li key={p.id} className="text-red-700">• {p.name} - {calculateStock(p.id)} un.</li>)}</ul>
                                        </div>
                                    )}
                                    {expiryAlertProducts.length > 0 && (
                                        <div className="alert-yellow rounded-lg p-4">
                                            <h3 className="font-bold text-yellow-800 mb-2"><i className="fas fa-clock mr-2"></i>Validade Próxima ({expiryAlertProducts.length})</h3>
                                            <ul className="space-y-1">{expiryAlertProducts.slice(0, 5).map(p => <li key={p.id} className="text-yellow-700">• {p.name} - {calculateDaysUntilExpiry(p.expiryDate)} dias</li>)}</ul>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4"><i className="fas fa-trophy text-yellow-500 mr-2"></i>Top 5 Produtos</h3>
                                    <div className="space-y-3">
                                        {financialReport.topProducts.map((p, idx) => (
                                            <div key={p.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                                <div className="flex items-center gap-3">
                                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-white font-bold ${idx === 0 ? 'bg-yellow-500' : idx === 1 ? 'bg-gray-400' : idx === 2 ? 'bg-orange-500' : 'bg-gray-300'}`}>{idx + 1}</span>
                                                    <span className="font-medium">{p.name}</span>
                                                </div>
                                                <span className="text-purple-600 font-bold">{p.sold} un.</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* STOCK */}
                        {activeTab === 'stock' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800"><i className="fas fa-warehouse mr-2"></i>Controle de Stock</h2>
                                    <div className="flex gap-2">
                                        <span className="text-sm text-gray-600 bg-white px-3 py-2 rounded-lg shadow">
                                            <i className="fas fa-box mr-2"></i>{products.length} produtos
                                        </span>
                                        <span className="text-sm text-gray-600 bg-white px-3 py-2 rounded-lg shadow">
                                            <i className="fas fa-exclamation-triangle mr-2 text-red-500"></i>{lowStockProducts.length} críticos
                                        </span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg p-4">
                                        <p className="text-purple-100 text-sm">Valor Pago em Stock</p>
                                        <p className="text-2xl font-bold">{formatCurrency(stockValueReport.totalPaidValue)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4">
                                        <p className="text-green-100 text-sm">Valor Venda em Stock</p>
                                        <p className="text-2xl font-bold">{formatCurrency(stockValueReport.totalSaleValue)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg p-4">
                                        <p className="text-blue-100 text-sm">Lucro Potencial</p>
                                        <p className="text-2xl font-bold">{formatCurrency(stockValueReport.potentialProfit)}</p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[900px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Categoria</th>
                                                <th className="p-4 text-center">Stock</th>
                                                <th className="p-4 text-center">Status</th>
                                                <th className="p-4 text-left">Preço Pago</th>
                                                <th className="p-4 text-left">Preço Catálogo</th>
                                                <th className="p-4 text-left">Valor Stock</th>
                                                <th className="p-4 text-left">Validade</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {stockData.map(p => (
                                                <tr key={p.id} className={`border-t ${p.stock < lowStockThreshold ? 'bg-red-50' : p.stock < lowStockThreshold * 2 ? 'bg-yellow-50' : ''}`}>
                                                    <td className="p-4 font-medium">{p.name}</td>
                                                    <td className="p-4"><span className="px-2 py-1 bg-purple-100 text-purple-800 rounded text-sm">{p.category}</span></td>
                                                    <td className="p-4 text-center"><span className={`font-bold text-lg ${p.stock === 0 ? 'text-red-600' : p.stock < lowStockThreshold ? 'text-orange-600' : 'text-green-600'}`}>{p.stock}</span></td>
                                                    <td className="p-4 text-center">
                                                        {p.stock === 0 ? <span className="px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-bold">SEM STOCK</span> : p.stock < lowStockThreshold ? <span className="px-2 py-1 bg-orange-100 text-orange-800 rounded text-xs font-bold">BAIXO</span> : <span className="px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-bold">OK</span>}
                                                    </td>
                                                    <td className="p-4">{formatCurrency(p.avgPrice)}</td>
                                                    <td className="p-4">{formatCurrency(parseFloat(p.catalogPrice) || 0)}</td>
                                                    <td className="p-4 font-medium">{formatCurrency(p.paidValue)}</td>
                                                    <td className="p-4">{p.expiryDate ? <span className={p.daysToExpiry <= expiryAlertDays ? 'text-red-600 font-bold' : 'text-gray-600'}>{formatDate(p.expiryDate)}{p.daysToExpiry <= expiryAlertDays && <span className="block text-xs">({p.daysToExpiry} dias)</span>}</span> : '-'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {stockData.length === 0 && <div className="p-8 text-center text-gray-500"><i className="fas fa-warehouse text-4xl mb-3"></i><p>Nenhum produto em stock</p></div>}
                                </div>
                            </div>
                        )}

                        {/* PRODUTOS */}
                        {activeTab === 'products' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Cadastro de Produtos</h2>
                                    <button onClick={() => setShowProductModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-plus mr-2"></i>Novo Produto
                                    </button>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[1000px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Categoria</th>
                                                <th className="p-4 text-left">Fragrância</th>
                                                <th className="p-4 text-left">Ciclo</th>
                                                <th className="p-4 text-left">Preço Catálogo</th>
                                                <th className="p-4 text-left">Validade</th>
                                                <th className="p-4 text-center">Stock</th>
                                                <th className="p-4 text-center">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {products.map(p => {
                                                const stock = calculateStock(p.id);
                                                const daysToExpiry = p.expiryDate ? calculateDaysUntilExpiry(p.expiryDate) : null;
                                                return (
                                                    <tr key={p.id} className={`border-t ${stock < lowStockThreshold ? 'bg-red-50' : daysToExpiry && daysToExpiry <= expiryAlertDays ? 'bg-yellow-50' : ''}`}>
                                                        <td className="p-4 font-medium">{p.name}</td>
                                                        <td className="p-4"><span className="px-2 py-1 bg-purple-100 text-purple-800 rounded text-sm">{p.category}</span></td>
                                                        <td className="p-4">{p.fragrance || '-'}</td>
                                                        <td className="p-4">{p.cycle || '-'}</td>
                                                        <td className="p-4 font-medium">{formatCurrency(parseFloat(p.catalogPrice) || 0)}</td>
                                                        <td className="p-4">{p.expiryDate ? <span className={daysToExpiry <= expiryAlertDays ? 'text-red-600 font-bold' : ''}>{formatDate(p.expiryDate)}{daysToExpiry <= expiryAlertDays && ` (${daysToExpiry}d)`}</span> : '-'}</td>
                                                        <td className="p-4 text-center"><span className={`font-bold ${stock < lowStockThreshold ? 'text-red-600' : 'text-green-600'}`}>{stock} un.</span></td>
                                                        <td className="p-4 text-center">
                                                            <div className="flex justify-center gap-2">
                                                                <button onClick={() => openEditProduct(p)} className="btn-edit text-white px-3 py-1 rounded text-sm" title="Editar"><i className="fas fa-edit"></i></button>
                                                                <button onClick={() => confirmDeleteProduct(p)} className="btn-delete text-white px-3 py-1 rounded text-sm" title="Excluir"><i className="fas fa-trash"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                    {products.length === 0 && <div className="p-8 text-center text-gray-500"><i className="fas fa-box-open text-4xl mb-3"></i><p>Nenhum produto cadastrado</p></div>}
                                </div>
                            </div>
                        )}

                        {/* VENDAS */}
                        {activeTab === 'sales' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Registro de Vendas</h2>
                                    <button onClick={() => setShowSaleModal(true)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-plus mr-2"></i>Nova Venda
                                    </button>
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto">
                                    <table className="w-full min-w-[1000px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Data</th>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-left">Cliente</th>
                                                <th className="p-4 text-center">Qtd</th>
                                                <th className="p-4 text-left">Preço Unit.</th>
                                                <th className="p-4 text-left">Total</th>
                                                <th className="p-4 text-left">Lucro</th>
                                                <th className="p-4 text-left">Pagamento</th>
                                                <th className="p-4 text-center">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sales.slice().reverse().map(s => {
                                                const product = products.find(p => p.id === s.productId);
                                                const customer = customers.find(c => c.id === s.customerId);
                                                return (
                                                    <tr key={s.id} className="border-t">
                                                        <td className="p-4">{formatDate(s.date)}</td>
                                                        <td className="p-4 font-medium">{product?.name || 'Produto removido'}</td>
                                                        <td className="p-4">{customer?.name || 'Não informado'}</td>
                                                        <td className="p-4 text-center">{s.quantity}</td>
                                                        <td className="p-4">{formatCurrency(s.price)}</td>
                                                        <td className="p-4 font-bold">{formatCurrency(s.price * s.quantity)}</td>
                                                        <td className="p-4"><span className={s.profit >= 0 ? 'text-green-600' : 'text-red-600'}>{formatCurrency(s.profit)}</span></td>
                                                        <td className="p-4"><span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-sm">{s.paymentMethod}</span></td>
                                                        <td className="p-4 text-center">
                                                            <div className="flex justify-center gap-2">
                                                                <button onClick={() => openEditSale(s)} className="btn-edit text-white px-3 py-1 rounded text-sm" title="Editar"><i className="fas fa-edit"></i></button>
                                                                <button onClick={() => confirmDeleteSale(s)} className="btn-delete text-white px-3 py-1 rounded text-sm" title="Excluir"><i className="fas fa-trash"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                    {sales.length === 0 && <div className="p-8 text-center text-gray-500"><i className="fas fa-shopping-cart text-4xl mb-3"></i><p>Nenhuma venda registrada</p></div>}
                                </div>
                            </div>
                        )}

                        {/* COMPRAS */}
                        {activeTab === 'purchases' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Gestão de Compras</h2>
                                </div>

                                <div className="bg-white rounded-lg shadow-md p-4">
                                    <h3 className="text-lg font-bold mb-4">Registrar Entrada de Mercadoria</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                        <select value={purchaseForm.productId} onChange={(e) => setPurchaseForm({...purchaseForm, productId: e.target.value})} className="border rounded-lg p-3 text-sm">
                                            <option value="">Selecione o Produto</option>
                                            {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                        </select>
                                        <input type="number" placeholder="Quantidade" value={purchaseForm.quantity} onChange={(e) => setPurchaseForm({...purchaseForm, quantity: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                        <input type="number" placeholder="Preço Unitário (€)" value={purchaseForm.price} onChange={(e) => setPurchaseForm({...purchaseForm, price: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                        <input type="date" value={purchaseForm.date} onChange={(e) => setPurchaseForm({...purchaseForm, date: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                    </div>
                                    <button onClick={handleAddPurchase} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-save mr-2"></i>Registrar Compra
                                    </button>
                                    {purchaseForm.productId && (
                                        <div className="mt-4 p-4 bg-blue-50 rounded-lg">
                                            <p className="text-sm text-blue-800"><strong>Preço Médio Atual:</strong> {formatCurrency(calculateAveragePrice(purchaseForm.productId))}</p>
                                            <p className="text-sm text-blue-800"><strong>Estoque Atual:</strong> {calculateStock(purchaseForm.productId)} un.</p>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-lg shadow-md overflow-x-auto mt-4">
                                    <table className="w-full min-w-[600px]">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="p-4 text-left">Data</th>
                                                <th className="p-4 text-left">Produto</th>
                                                <th className="p-4 text-center">Quantidade</th>
                                                <th className="p-4 text-left">Preço Unit.</th>
                                                <th className="p-4 text-left">Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {purchases.slice().reverse().map(p => {
                                                const product = products.find(prod => prod.id === p.productId);
                                                return (
                                                    <tr key={p.id} className="border-t">
                                                        <td className="p-4">{formatDate(p.date)}</td>
                                                        <td className="p-4 font-medium">{product?.name || 'Produto removido'}</td>
                                                        <td className="p-4 text-center">{p.quantity}</td>
                                                        <td className="p-4">{formatCurrency(p.price)}</td>
                                                        <td className="p-4 font-bold">{formatCurrency(p.price * p.quantity)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* CLIENTES - COM FILTRO */}
                        {activeTab === 'customers' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Gestão de Clientes (CRM)</h2>
                                    <button onClick={() => setShowCustomerModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-user-plus mr-2"></i>Novo Cliente
                                    </button>
                                </div>

                                {/* Filtro de Clientes */}
                                <div className="bg-white rounded-lg shadow-md p-4">
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <span className="text-gray-700 font-medium"><i className="fas fa-filter mr-2"></i>Ordenar por:</span>
                                        <button 
                                            onClick={() => setCustomerSort('default')}
                                            className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'default' ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                        >
                                            <i className="fas fa-list mr-2"></i>Recentes
                                        </button>
                                        <button 
                                            onClick={() => setCustomerSort('spent')}
                                            className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'spent' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                        >
                                            <i className="fas fa-euro-sign mr-2"></i>Mais Gastaram
                                        </button>
                                        <button 
                                            onClick={() => setCustomerSort('purchases')}
                                            className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'purchases' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                        >
                                            <i className="fas fa-shopping-bag mr-2"></i>Mais Compras
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {sortedCustomers.map(c => {
                                        return (
                                            <div key={c.id} className="bg-white rounded-lg shadow-md p-4 card-hover">
                                                <div className="flex items-start justify-between mb-3">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                                                            <i className="fas fa-user text-purple-600"></i>
                                                        </div>
                                                        <div>
                                                            <h3 className="font-bold">{c.name}</h3>
                                                            <p className="text-gray-500 text-sm">{c.phone || 'Sem telefone'}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => openEditCustomer(c)} className="btn-edit text-white px-2 py-1 rounded text-xs" title="Editar"><i className="fas fa-edit"></i></button>
                                                        <button onClick={() => confirmDeleteCustomer(c)} className="btn-delete text-white px-2 py-1 rounded text-xs" title="Excluir"><i className="fas fa-trash"></i></button>
                                                    </div>
                                                </div>
                                                <div className="space-y-1 text-sm">
                                                    <p><i className="fas fa-envelope mr-2"></i>{c.email || 'Sem email'}</p>
                                                    <p><i className="fas fa-shopping-bag mr-2"></i>{c.totalPurchases} compras</p>
                                                    <p><i className="fas fa-euro-sign mr-2"></i>Total: {formatCurrency(c.totalSpent)}</p>
                                                </div>
                                                {customerSort === 'spent' && c.totalSpent > 0 && (
                                                    <div className="mt-3 pt-3 border-t">
                                                        <div className="flex items-center gap-2 text-xs">
                                                            <i className="fas fa-trophy text-yellow-500"></i>
                                                            <span className="text-gray-600">Cliente valorizado</span>
                                                        </div>
                                                    </div>
                                                )}
                                                {customerSort === 'purchases' && c.totalPurchases > 0 && (
                                                    <div className="mt-3 pt-3 border-t">
                                                        <div className="flex items-center gap-2 text-xs">
                                                            <i className="fas fa-star text-blue-500"></i>
                                                            <span className="text-gray-600">Cliente frequente</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                {customers.length === 0 && <div className="bg-white rounded-lg shadow-md p-8 text-center text-gray-500"><i className="fas fa-users text-4xl mb-3"></i><p>Nenhum cliente cadastrado</p></div>}
                            </div>
                        )}

                        {/* FIADO */}
                        {activeTab === 'credits' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Controle de Fiado</h2>
                                    <button onClick={() => setShowCreditModal(true)} className="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded-lg transition text-sm">
                                        <i className="fas fa-plus mr-2"></i>Novo Registro
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                    <div className="bg-white rounded-lg shadow-md p-4">
                                        <h3 className="text-lg font-bold text-red-600 mb-3"><i className="fas fa-clock mr-2"></i>Pendentes</h3>
                                        <div className="space-y-2">
                                            {pendingCreditSales.map(c => {
                                                const sale = sales.find(s => s.id === c.saleId);
                                                const product = products.find(p => p.id === sale?.productId);
                                                const customer = sale ? customers.find(cust => cust.id === sale.customerId) : null;
                                                const isOverdue = new Date(c.dueDate) < new Date();
                                                return (
                                                    <div key={c.id} className={`p-3 rounded-lg border-l-4 ${isOverdue ? 'alert-red' : 'alert-yellow'}`}>
                                                        <div className="flex justify-between items-start">
                                                            <div>
                                                                <p className="font-bold text-sm">{customer?.name || 'Cliente não informado'}</p>
                                                                <p className="text-xs text-gray-600">{product?.name || 'Produto não encontrado'}</p>
                                                                <p className="text-xs">Vence: {formatDate(c.dueDate)}</p>
                                                            </div>
                                                            <div className="text-right">
                                                                <p className="font-bold">{formatCurrency(c.amount)}</p>
                                                                <button onClick={() => markCreditAsPaid(c.id)} className="mt-1 text-xs bg-green-600 text-white px-2 py-1 rounded"><i className="fas fa-check mr-1"></i>Pago</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {pendingCreditSales.length === 0 && <p className="text-gray-500 text-center py-4 text-sm">Nenhuma venda pendente</p>}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-lg shadow-md p-4">
                                        <h3 className="text-lg font-bold text-green-600 mb-3"><i className="fas fa-check-circle mr-2"></i>Pagos</h3>
                                        <div className="space-y-2">
                                            {creditSales.filter(c => c.status === 'pago').map(c => {
                                                const sale = sales.find(s => s.id === c.saleId);
                                                const customer = sale ? customers.find(cust => cust.id === sale.customerId) : null;
                                                return (
                                                    <div key={c.id} className="p-3 rounded-lg border-l-4 alert-green">
                                                        <div className="flex justify-between">
                                                            <div>
                                                                <p className="font-bold text-sm">{customer?.name || 'Cliente não informado'}</p>
                                                                <p className="text-xs text-gray-600">Pago em: {formatDate(c.createdAt)}</p>
                                                            </div>
                                                            <p className="font-bold text-green-600">{formatCurrency(c.amount)}</p>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {creditSales.filter(c => c.status === 'pago').length === 0 && <p className="text-gray-500 text-center py-4 text-sm">Nenhum pagamento registrado</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RELATÓRIOS */}
                        {activeTab === 'reports' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Relatórios Financeiros</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4">
                                        <p className="text-green-100 text-sm">Total Vendido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalSold)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg p-4">
                                        <p className="text-red-100 text-sm">Total Investido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalInvested)}</p>
                                    </div>
                                    <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg p-4">
                                        <p className="text-purple-100 text-sm">Lucro Líquido (Mês)</p>
                                        <p className="text-2xl font-bold">{formatCurrency(financialReport.totalProfit)}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CONFIGURAÇÕES */}
                        {activeTab === 'config' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Configurações</h2>
                                <div className="bg-white rounded-lg shadow-md p-4 max-w-md">
                                    <div className="space-y-3">
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2 text-sm">Limite de Estoque Baixo (unidades)</label>
                                            <input type="number" value={lowStockThreshold} onChange={(e) => setLowStockThreshold(parseInt(e.target.value) || 3)} className="w-full border rounded-lg p-3 text-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2 text-sm">Alerta de Validade (dias)</label>
                                            <input type="number" value={expiryAlertDays} onChange={(e) => setExpiryAlertDays(parseInt(e.target.value) || 30)} className="w-full border rounded-lg p-3 text-sm" />
                                        </div>
                                        <div className="pt-3 border-t">
                                            <button onClick={() => { if (confirm('Tem certeza? Isso apagará todos os dados!')) { localStorage.clear(); window.location.reload(); } }} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition w-full text-sm">
                                                <i className="fas fa-trash mr-2"></i>Limpar Todos os Dados
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALS */}
                    {/* Modal Novo Produto */}
                    <Modal isOpen={showProductModal} onClose={() => setShowProductModal(false)} title="Novo Produto">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Produto *</label>
                                <input type="text" value={productForm.name} onChange={(e) => setProductForm({...productForm, name: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Lily Eau de Parfum" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Categoria</label>
                                    <select value={productForm.category} onChange={(e) => setProductForm({...productForm, category: e.target.value})} className="w-full border rounded-lg p-3">
                                        <option value="perfumaria">Perfumaria</option>
                                        <option value="corpo">Corpo e Banho</option>
                                        <option value="maquiagem">Maquiagem</option>
                                        <option value="cabelo">Cabelo</option>
                                        <option value="acessorios">Acessórios</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">💰 Preço Catálogo (€)</label>
                                    <input type="number" value={productForm.catalogPrice} onChange={(e) => setProductForm({...productForm, catalogPrice: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: 45,90" step="0.01" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Ciclo O Boticário</label>
                                    <input type="text" value={productForm.cycle} onChange={(e) => setProductForm({...productForm, cycle: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Ciclo 12/2024" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Fragrância</label>
                                    <input type="text" value={productForm.fragrance} onChange={(e) => setProductForm({...productForm, fragrance: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Floral" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Validade</label>
                                <input type="date" value={productForm.expiryDate} onChange={(e) => setProductForm({...productForm, expiryDate: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddProduct} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Salvar Produto</button>
                        </div>
                    </Modal>

                    {/* Modal Editar Produto */}
                    <Modal isOpen={showEditProductModal} onClose={() => { setShowEditProductModal(false); setEditingProduct(null); }} title="Editar Produto">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Produto *</label>
                                <input type="text" value={productForm.name} onChange={(e) => setProductForm({...productForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Categoria</label>
                                    <select value={productForm.category} onChange={(e) => setProductForm({...productForm, category: e.target.value})} className="w-full border rounded-lg p-3">
                                        <option value="perfumaria">Perfumaria</option>
                                        <option value="corpo">Corpo e Banho</option>
                                        <option value="maquiagem">Maquiagem</option>
                                        <option value="cabelo">Cabelo</option>
                                        <option value="acessorios">Acessórios</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">💰 Preço Catálogo (€)</label>
                                    <input type="number" value={productForm.catalogPrice} onChange={(e) => setProductForm({...productForm, catalogPrice: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Ciclo O Boticário</label>
                                    <input type="text" value={productForm.cycle} onChange={(e) => setProductForm({...productForm, cycle: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Fragrância</label>
                                    <input type="text" value={productForm.fragrance} onChange={(e) => setProductForm({...productForm, fragrance: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Validade</label>
                                <input type="date" value={productForm.expiryDate} onChange={(e) => setProductForm({...productForm, expiryDate: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
