                                    <h3 className="text-lg font-bold mb-4">Registrar Entrada de Mercadoria</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                        <SearchableDropdown label="Produto *" options={productOptions} value={purchaseForm.productId} onChange={(value) => setPurchaseForm({...purchaseForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div><div className="text-xs text-gray-500">Stock: {option.stock} un.</div></div>)} />
                                        <input type="number" placeholder="Quantidade" value={purchaseForm.quantity} onChange={(e) => setPurchaseForm({...purchaseForm, quantity: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                        <input type="number" placeholder="Preço Unitário (€)" value={purchaseForm.price} onChange={(e) => setPurchaseForm({...purchaseForm, price: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                        <input type="date" value={purchaseForm.date} onChange={(e) => setPurchaseForm({...purchaseForm, date: e.target.value})} className="border rounded-lg p-3 text-sm" />
                                    </div>
                                    <button onClick={handleAddPurchase} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition text-sm"><i className="fas fa-save mr-2"></i>Registrar Compra</button>
                                </div>
                            </div>
                        )}

                        {/* CLIENTES */}
                        {activeTab === 'customers' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800">Gestão de Clientes</h2>
                                    <button onClick={() => setShowCustomerModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm"><i className="fas fa-user-plus mr-2"></i>Novo Cliente</button>
                                </div>
                                <div className="bg-white rounded-lg shadow-md p-4">
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <span className="text-gray-700 font-medium"><i className="fas fa-filter mr-2"></i>Ordenar por:</span>
                                        <button onClick={() => setCustomerSort('default')} className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'default' ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700'}`}>Recentes</button>
                                        <button onClick={() => setCustomerSort('spent')} className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'spent' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'}`}>Mais Gastaram</button>
                                        <button onClick={() => setCustomerSort('purchases')} className={`px-4 py-2 rounded-lg transition text-sm ${customerSort === 'purchases' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}`}>Mais Compras</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {customersWithStats.sort((a, b) => customerSort === 'spent' ? b.totalSpent - a.totalSpent : customerSort === 'purchases' ? b.totalPurchases - a.totalPurchases : 0).map(c => (
                                        <div key={c.id} className="bg-white rounded-lg shadow-md p-4 card-hover">
                                            <div className="flex items-start justify-between mb-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center"><i className="fas fa-user text-purple-600"></i></div>
                                                    <div><h3 className="font-bold">{c.name}</h3><p className="text-gray-500 text-sm">{c.phone || 'Sem telefone'}</p></div>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => openEditCustomer(c)} className="btn-edit text-white px-2 py-1 rounded text-xs"><i className="fas fa-edit"></i></button>
                                                    <button onClick={() => confirmDeleteCustomer(c)} className="btn-delete text-white px-2 py-1 rounded text-xs"><i className="fas fa-trash"></i></button>
                                                </div>
                                            </div>
                                            <div className="space-y-1 text-sm">
                                                <p><i className="fas fa-shopping-bag mr-2"></i>{c.totalPurchases} compras</p>
                                                <p><i className="fas fa-euro-sign mr-2"></i>Total: {formatCurrency(c.totalSpent)}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {customers.length === 0 && <div className="bg-white rounded-lg shadow-md p-8 text-center text-gray-500"><i className="fas fa-users text-4xl mb-3"></i><p>Nenhum cliente cadastrado</p></div>}
                            </div>
                        )}

                        {/* FIADO */}
                        {activeTab === 'credits' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-2xl font-bold text-gray-800"><i className="fas fa-hand-holding-usd mr-2"></i>Controle de Fiado</h2>
                                    <button onClick={() => { setCreditForm({ saleId: '', amount: 0, dueDate: new Date(new Date().setDate(new Date().getDate() + 30)).toISOString().split('T')[0], status: 'pendente' }); setShowCreditModal(true); }} className="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded-lg transition text-sm"><i className="fas fa-plus mr-2"></i>Novo Registro</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-r from-yellow-500 to-yellow-600 text-white rounded-lg p-4"><p className="text-yellow-100 text-sm">Total Pendente</p><p className="text-2xl font-bold">{formatCurrency(pendingCreditSales.reduce((sum, c) => sum + c.amount, 0))}</p></div>
                                    <div className="bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg p-4"><p className="text-red-100 text-sm">Vencidos</p><p className="text-2xl font-bold">{pendingCreditSales.filter(c => new Date(c.dueDate) < new Date()).length}</p></div>
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4"><p className="text-green-100 text-sm">Total Recebido</p><p className="text-2xl font-bold">{formatCurrency(creditSales.filter(c => c.status === 'pago').reduce((sum, c) => sum + c.amount, 0))}</p></div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                    <div className="bg-white rounded-lg shadow-md p-4">
                                        <h3 className="text-lg font-bold text-red-600 mb-3"><i className="fas fa-clock mr-2"></i>Pendentes ({pendingCreditSales.length})</h3>
                                        <div className="space-y-2">
                                            {pendingCreditSales.map(c => {
                                                const sale = sales.find(s => s.id === c.saleId);
                                                const customer = sale ? customers.find(cust => cust.id === sale.customerId) : null;
                                                const isOverdue = new Date(c.dueDate) < new Date();
                                                const daysLeft = calculateDaysUntilExpiry(c.dueDate);
                                                return (
                                                    <div key={c.id} className={`p-3 rounded-lg border-l-4 ${isOverdue ? 'alert-red' : 'alert-yellow'}`}>
                                                        <div className="flex justify-between items-start">
                                                            <div><p className="font-bold text-sm">{customer?.name || 'Cliente não informado'}</p><p className="text-xs">Vence: {formatDate(c.dueDate)}{isOverdue ? <span className="text-red-600 font-bold"> ({Math.abs(daysLeft)} dias atrasado)</span> : <span className="text-yellow-600"> (em {daysLeft} dias)</span>}</p></div>
                                                            <div className="text-right"><p className="font-bold">{formatCurrency(c.amount)}</p><button onClick={() => markCreditAsPaid(c.id)} className="mt-1 text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded"><i className="fas fa-check mr-1"></i>Marcar Pago</button></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {pendingCreditSales.length === 0 && <div className="text-center py-8 text-gray-500"><i className="fas fa-check-circle text-4xl mb-3 text-green-500"></i><p>Nenhuma venda pendente!</p></div>}
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-lg shadow-md p-4">
                                        <h3 className="text-lg font-bold text-green-600 mb-3"><i className="fas fa-check-circle mr-2"></i>Pagos ({creditSales.filter(c => c.status === 'pago').length})</h3>
                                        <div className="space-y-2">
                                            {creditSales.filter(c => c.status === 'pago').map(c => {
                                                const sale = sales.find(s => s.id === c.saleId);
                                                const customer = sale ? customers.find(cust => cust.id === sale.customerId) : null;
                                                return (
                                                    <div key={c.id} className="p-3 rounded-lg border-l-4 alert-green">
                                                        <div className="flex justify-between"><div><p className="font-bold text-sm">{customer?.name || 'Cliente não informado'}</p><p className="text-xs text-gray-600">Pago em: {formatDate(c.createdAt)}</p></div><p className="font-bold text-green-600">{formatCurrency(c.amount)}</p></div>
                                                    </div>
                                                );
                                            })}
                                            {creditSales.filter(c => c.status === 'pago').length === 0 && <div className="text-center py-8 text-gray-500"><i className="fas fa-inbox text-4xl mb-3"></i><p>Nenhum pagamento registrado</p></div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RELATÓRIOS */}
                        {activeTab === 'reports' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Relatórios Financeiros</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg p-4"><p className="text-green-100 text-sm">Total Vendido (Mês)</p><p className="text-2xl font-bold">{formatCurrency(financialReport.totalSold)}</p></div>
                                    <div className="bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg p-4"><p className="text-red-100 text-sm">Total Investido (Mês)</p><p className="text-2xl font-bold">{formatCurrency(financialReport.totalInvested)}</p></div>
                                    <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg p-4"><p className="text-purple-100 text-sm">Lucro Líquido (Mês)</p><p className="text-2xl font-bold">{formatCurrency(financialReport.totalProfit)}</p></div>
                                </div>
                            </div>
                        )}

                        {/* CONFIGURAÇÕES */}
                        {activeTab === 'config' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-gray-800">Configurações</h2>
                                <div className="bg-white rounded-lg shadow-md p-4 max-w-md mb-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-3"><i className="fas fa-cloud-upload-alt mr-2 text-purple-600"></i>Backup Automático</h3>
                                    <div className="flex items-center justify-between mb-3">
                                        <div><p className="font-medium text-gray-700">Ativar Backup Automático</p><p className="text-xs text-gray-500">Backup a cada 5 minutos + ao fechar</p></div>
                                        <button onClick={() => setAutoBackupEnabled(!autoBackupEnabled)} className={`relative w-14 h-7 rounded-full transition ${autoBackupEnabled ? 'bg-green-500' : 'bg-gray-300'}`}><span className={`absolute top-1 left-1 w-5 h-5 bg-white rounded-full transition ${autoBackupEnabled ? 'transform translate-x-7' : ''}`}></span></button>
                                    </div>
                                    {autoBackupEnabled && (
                                        <div className="bg-green-50 border-l-4 border-green-500 p-3">
                                            <p className="text-sm text-green-800"><i className="fas fa-check-circle mr-2"></i><strong>Ativo!</strong> Backup automático ativado.</p>
                                        </div>
                                    )}
                                    <button onClick={triggerAutoBackup} className="w-full mt-3 bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg transition text-sm"><i className="fas fa-download mr-2"></i>Backup Agora</button>
                                </div>
                                <div className="bg-white rounded-lg shadow-md p-4 max-w-md">
                                    <div className="space-y-3">
                                        <div><label className="block text-gray-700 font-medium mb-2 text-sm">Limite de Estoque Baixo (unidades)</label><input type="number" value={lowStockThreshold} onChange={(e) => setLowStockThreshold(parseInt(e.target.value) || 3)} className="w-full border rounded-lg p-3 text-sm" /></div>
                                        <div><label className="block text-gray-700 font-medium mb-2 text-sm">Alerta de Validade (dias)</label><input type="number" value={expiryAlertDays} onChange={(e) => setExpiryAlertDays(parseInt(e.target.value) || 30)} className="w-full border rounded-lg p-3 text-sm" /></div>
                                        <div><label className="block text-gray-700 font-medium mb-2 text-sm">Alerta Produto Parado (dias)</label><input type="number" value={staleProductDays} onChange={(e) => setStaleProductDays(parseInt(e.target.value) || 30)} className="w-full border rounded-lg p-3 text-sm" /></div>
                                        <div className="pt-3 border-t"><button onClick={() => { if (confirm('Tem certeza? Isso apagará todos os dados!')) { localStorage.clear(); window.location.reload(); } }} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition w-full text-sm"><i className="fas fa-trash mr-2"></i>Limpar Todos os Dados</button></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ==================== TODOS OS MODALS ==================== */}
                    
                    {/* Modal Ajustar Stock */}
                    <Modal isOpen={showAdjustStockModal} onClose={() => { setShowAdjustStockModal(false); setAdjustStockProduct(null); }} title="🔧 Ajustar Stock">
                        <div className="space-y-4">
                            {adjustStockProduct && (
                                <div className="p-3 bg-yellow-50 rounded-lg border-l-4 border-yellow-500">
                                    <p className="font-bold">{adjustStockProduct.name}</p>
                                    <p className="text-sm text-gray-600">Stock atual: {calculateStock(adjustStockProduct.id)} un.</p>
                                </div>
                            )}
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Tipo de Ajuste *</label>
                                <div className="grid grid-cols-2 gap-3">
                                    <button type="button" onClick={() => setAdjustStockForm({...adjustStockForm, type: 'entrada'})} className={`p-3 rounded-lg border-2 transition ${adjustStockForm.type === 'entrada' ? 'border-green-500 bg-green-50' : 'border-gray-200'}`}>
                                        <i className="fas fa-plus-circle text-green-600 mr-2"></i><span className="font-medium">Entrada (+)</span>
                                        <p className="text-xs text-gray-500 mt-1">Adicionar ao stock</p>
                                    </button>
                                    <button type="button" onClick={() => setAdjustStockForm({...adjustStockForm, type: 'saida'})} className={`p-3 rounded-lg border-2 transition ${adjustStockForm.type === 'saida' ? 'border-red-500 bg-red-50' : 'border-gray-200'}`}>
                                        <i className="fas fa-minus-circle text-red-600 mr-2"></i><span className="font-medium">Saída (-)</span>
                                        <p className="text-xs text-gray-500 mt-1">Remover do stock</p>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Motivo *</label>
                                <select value={adjustStockForm.reason} onChange={(e) => setAdjustStockForm({...adjustStockForm, reason: e.target.value})} className="w-full border rounded-lg p-3">
                                    <option value="quebra">Quebra / Dano</option>
                                    <option value="erro_compra">Erro na Compra</option>
                                    <option value="perda">Perda / Extravio</option>
                                    <option value="validade">Produto Vencido</option>
                                    <option value="inventario">Ajuste de Inventário</option>
                                    <option value="outro">Outro</option>
                                </select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input type="number" value={adjustStockForm.quantity} onChange={(e) => setAdjustStockForm({...adjustStockForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Data</label>
                                    <input type="date" value={adjustStockForm.date} onChange={(e) => setAdjustStockForm({...adjustStockForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Observações</label>
                                <textarea value={adjustStockForm.notes} onChange={(e) => setAdjustStockForm({...adjustStockForm, notes: e.target.value})} className="w-full border rounded-lg p-3" rows="3" placeholder="Descreva o motivo do ajuste..."></textarea>
                            </div>
                            <div className={`p-4 rounded-lg ${adjustStockForm.type === 'entrada' ? 'bg-green-50 border-l-4 border-green-500' : 'bg-red-50 border-l-4 border-red-500'}`}>
                                <p className="font-bold">{adjustStockForm.type === 'entrada' ? '➕' : '➖'} Stock atual: {calculateStock(adjustStockProduct?.id || '')} un.</p>
                                <p className="text-sm">{adjustStockForm.type === 'entrada' ? 'Novo stock: ' : 'Novo stock: '}<span className="font-bold">{adjustStockProduct ? (adjustStockForm.type === 'entrada' ? calculateStock(adjustStockProduct.id) + parseInt(adjustStockForm.quantity || 0) : calculateStock(adjustStockProduct.id) - parseInt(adjustStockForm.quantity || 0)) : 0} un.</span></p>
                            </div>
                            <button onClick={handleAdjustStock} className={`w-full py-3 rounded-lg transition text-white ${adjustStockForm.type === 'entrada' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'}`}>
                                <i className="fas fa-check mr-2"></i>Confirmar Ajuste
                            </button>
                        </div>
                    </Modal>

                    {/* Modal Compra Rápida */}
                    <Modal isOpen={showQuickBuyModal} onClose={() => { setShowQuickBuyModal(false); setQuickBuyProduct(null); }} title="🛒 Compra Rápida">
                        <div className="space-y-4">
                            {quickBuyProduct && (
                                <div className="p-3 bg-green-50 rounded-lg border-l-4 border-green-500">
                                    <p className="font-bold">{quickBuyProduct.name}</p>
                                    <p className="text-sm text-gray-600">Stock atual: {calculateStock(quickBuyProduct.id)} un. (Baixo!)</p>
                                </div>
                            )}
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                    <input type="number" value={quickBuyForm.quantity} onChange={(e) => setQuickBuyForm({...quickBuyForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Preço Unitário (€) *</label>
                                    <input type="number" value={quickBuyForm.price} onChange={(e) => setQuickBuyForm({...quickBuyForm, price: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Compra</label>
                                <input type="date" value={quickBuyForm.date} onChange={(e) => setQuickBuyForm({...quickBuyForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            {quickBuyForm.quantity && quickBuyForm.price && (
                                <div className="p-4 bg-green-50 rounded-lg">
                                    <p className="text-sm"><strong>Total:</strong> {formatCurrency(quickBuyForm.quantity * quickBuyForm.price)}</p>
                                </div>
                            )}
                            <button onClick={handleQuickBuy} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg transition"><i className="fas fa-cart-plus mr-2"></i>Registrar Compra</button>
                        </div>
                    </Modal>

                    {/* Modal Transferir */}
                    <Modal isOpen={showTransferModal} onClose={() => { setShowTransferModal(false); setSelectedReseller(null); }} title="🔄 Transferir para Revendedor">
                        <div className="space-y-4">
                            {selectedReseller && (
                                <div className="p-3 bg-purple-50 rounded-lg border-l-4 border-purple-500">
                                    <p className="font-bold">{selectedReseller.salonName}</p>
                                    <p className="text-sm text-gray-600">{selectedReseller.name}</p>
                                </div>
                            )}
                            {transferForm.productId && (
                                <div className="p-3 bg-green-50 rounded-lg border-l-4 border-green-500">
                                    <p className="font-bold">{products.find(p => p.id === transferForm.productId)?.name}</p>
                                    <p className="text-sm text-gray-600">Stock disponível: {calculateStock(transferForm.productId)} un.</p>
                                </div>
                            )}
                            {!transferForm.productId && (
                                <SearchableDropdown label="Produto *" options={productOptions} value={transferForm.productId} onChange={(value) => setTransferForm({...transferForm, productId: value})} placeholder="Selecione o produto" renderOption={(option) => (<div><div className="font-medium">{option.label}</div><div className="text-xs text-gray-500">Stock: {option.stock} un.</div></div>)} />
                            )}
                            <SearchableDropdown label="Revendedor *" options={resellerOptions} value={transferForm.resellerId} onChange={(value) => setTransferForm({...transferForm, resellerId: value})} placeholder="Selecione o revendedor" renderOption={(option) => (<div><div className="font-medium">{option.label}</div><div className="text-xs text-gray-500">{option.salon}</div></div>)} />
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Quantidade *</label>
                                <input type="number" value={transferForm.quantity} onChange={(e) => setTransferForm({...transferForm, quantity: e.target.value})} className="w-full border rounded-lg p-3" min="1" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data da Transferência</label>
                                <input type="date" value={transferForm.date} onChange={(e) => setTransferForm({...transferForm, date: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => { setShowTransferModal(false); setSelectedReseller(null); setTransferForm({ resellerId: '', productId: '', quantity: 1, date: new Date().toISOString().split('T')[0] }); }} className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-lg transition">
                                    <i className="fas fa-times mr-2"></i>Cancelar
                                </button>
                                <button onClick={handleTransfer} className="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition">
                                    <i className="fas fa-exchange-alt mr-2"></i>Transferir
                                </button>
                            </div>
                        </div>
                    </Modal>

                  {/* Modal Devolução */}
<Modal isOpen={showReturnModal} onClose={() => { setShowReturnModal(false); setSelectedReseller(null); }} title="📦 Devolver Produtos">
    <div className="space-y-4">
        {selectedReseller && (
            <div className="p-3 bg-orange-50 rounded-lg border-l-4 border-orange-500">
                <p className="font-bold">{selectedReseller.salonName}</p>
                <p className="text-sm text-gray-600">{selectedReseller.name}</p>
            </div>
        )}

        <div>
            <label className="block text-gray-700 font-medium mb-2">Produto para Devolver *</label>
            <select 
                className="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-orange-500"
                value={returnForm.productId}
                onChange={(e) => setReturnForm({...returnForm, productId: e.target.value})}
                required
            >
                <option value="">Selecione o produto que ela tem no salão...</option>
                {/* Aqui usamos a variável que estava sublinhada de vermelho */}
                {selectedReseller && resellerStock && resellerStock
                    .filter(item => item.resellerId === selectedReseller.id && item.quantity > 0)
                    .map(item => {
                        const prod = products.find(p => p.id === item.productId);
                        return (
                            <option key={item.id} value={item.productId}>
                                {prod ? prod.name : 'Produto não encontrado'} — ({item.quantity} un. em posse)
                            </option>
                        );
                    })
                }
            </select>
        </div>

        <div>

                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={customerForm.email} onChange={(e) => setCustomerForm({...customerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddCustomer} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Salvar Cliente</button>
                        </div>
                    </Modal>

                    {/* Modal Editar Cliente */}
                    <Modal isOpen={showEditCustomerModal} onClose={() => { setShowEditCustomerModal(false); setEditingCustomer(null); }} title="Editar Cliente">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome *</label>
                                <input type="text" value={customerForm.name} onChange={(e) => setCustomerForm({...customerForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                <input type="tel" value={customerForm.phone} onChange={(e) => setCustomerForm({...customerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" placeholder="+351 000 000 000" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={customerForm.email} onChange={(e) => setCustomerForm({...customerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditCustomer} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Cliente</button>
                        </div>
                    </Modal>

                    {/* Modal Novo Revendedor */}
                    <Modal isOpen={showResellerModal} onClose={() => setShowResellerModal(false)} title="Novo Revendedor">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Contato *</label>
                                <input type="text" value={resellerForm.name} onChange={(e) => setResellerForm({...resellerForm, name: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Maria Silva" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Salão *</label>
                                <input type="text" value={resellerForm.salonName} onChange={(e) => setResellerForm({...resellerForm, salonName: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Beauty Salon" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Endereço</label>
                                <input type="text" value={resellerForm.address} onChange={(e) => setResellerForm({...resellerForm, address: e.target.value})} className="w-full border rounded-lg p-3" placeholder="Ex: Rua das Flores, 123" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                    <input type="tel" value={resellerForm.phone} onChange={(e) => setResellerForm({...resellerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" placeholder="+351 000 000 000" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Comissão (%)</label>
                                    <input type="number" value={resellerForm.commissionRate} onChange={(e) => setResellerForm({...resellerForm, commissionRate: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={resellerForm.email} onChange={(e) => setResellerForm({...resellerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddReseller} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Salvar Revendedor</button>
                        </div>
                    </Modal>

                    {/* Modal Editar Revendedor */}
                    <Modal isOpen={showEditResellerModal} onClose={() => { setShowEditResellerModal(false); setEditingReseller(null); }} title="Editar Revendedor">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Contato *</label>
                                <input type="text" value={resellerForm.name} onChange={(e) => setResellerForm({...resellerForm, name: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Nome do Salão *</label>
                                <input type="text" value={resellerForm.salonName} onChange={(e) => setResellerForm({...resellerForm, salonName: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Endereço</label>
                                <input type="text" value={resellerForm.address} onChange={(e) => setResellerForm({...resellerForm, address: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                    <input type="tel" value={resellerForm.phone} onChange={(e) => setResellerForm({...resellerForm, phone: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">Comissão (%)</label>
                                    <input type="number" value={resellerForm.commissionRate} onChange={(e) => setResellerForm({...resellerForm, commissionRate: e.target.value})} className="w-full border rounded-lg p-3" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Email</label>
                                <input type="email" value={resellerForm.email} onChange={(e) => setResellerForm({...resellerForm, email: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleEditReseller} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Atualizar Revendedor</button>
                        </div>
                    </Modal>

                    {/* Modal Fiado */}
                    <Modal isOpen={showCreditModal} onClose={() => setShowCreditModal(false)} title="Registro de Fiado">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Valor (€) *</label>
                                <input type="number" value={creditForm.amount} onChange={(e) => setCreditForm({...creditForm, amount: e.target.value})} className="w-full border rounded-lg p-3" step="0.01" />
                            </div>
                            <div>
                                <label className="block text-gray-700 font-medium mb-2">Data de Vencimento *</label>
                                <input type="date" value={creditForm.dueDate} onChange={(e) => setCreditForm({...creditForm, dueDate: e.target.value})} className="w-full border rounded-lg p-3" />
                            </div>
                            <button onClick={handleAddCredit} className="w-full bg-yellow-600 hover:bg-yellow-700 text-white py-3 rounded-lg transition"><i className="fas fa-save mr-2"></i>Registrar Fiado</button>
                        </div>
                    </Modal>

                    {/* Modal Confirmar Exclusão */}
                    <Modal isOpen={showDeleteModal} onClose={() => { setShowDeleteModal(false); setDeleteItem(null); }} title="Confirmar Exclusão">
                        <div className="space-y-4">
                            <div className="p-4 bg-red-50 rounded-lg border-l-4 border-red-500">
                                <p className="text-red-800 font-bold"><i className="fas fa-exclamation-triangle mr-2"></i>Atenção!</p>
                                <p className="text-red-700 mt-2">{deleteItem?.type === 'product' ? `Excluir produto "${deleteItem?.name}"?` : deleteItem?.type === 'customer' ? `Excluir cliente "${deleteItem?.name}"?` : deleteItem?.type === 'reseller' ? `Excluir revendedor "${deleteItem?.name}"?` : 'Excluir este item?'}</p>
                                <p className="text-red-600 text-sm mt-2">Esta ação não pode ser desfeita!</p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => { setShowDeleteModal(false); setDeleteItem(null); }} className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-lg transition">
                                    <i className="fas fa-times mr-2"></i>Cancelar
                                </button>
                                <button onClick={deleteItem?.type === 'product' ? handleDeleteProduct : deleteItem?.type === 'customer' ? handleDeleteCustomer : deleteItem?.type === 'reseller' ? handleDeleteReseller : handleDeleteSale} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg transition">
                                    <i className="fas fa-trash mr-2"></i>Excluir
                                </button>
                            </div>
                        </div>
                    </Modal>

                    {/* Modal Histórico de Compras */}
                    <Modal isOpen={showPurchaseHistoryModal} onClose={() => setShowPurchaseHistoryModal(false)} title="📜 Histórico de Compras">
                        <div className="space-y-4">
                            <div className="bg-gray-50 p-4 rounded-lg">
                                <h4 className="font-bold mb-3"><i className="fas fa-filter mr-2"></i>Filtros</h4>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2 text-sm">Buscar Produto</label>
                                        <input type="text" value={purchaseHistorySearch} onChange={(e) => setPurchaseHistorySearch(e.target.value)} className="w-full border rounded-lg p-2 text-sm" placeholder="Nome do produto..." />
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2 text-sm">Data Inicial</label>
                                        <input type="date" value={purchaseHistoryDateFrom} onChange={(e) => setPurchaseHistoryDateFrom(e.target.value)} className="w-full border rounded-lg p-2 text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2 text-sm">Data Final</label>
                                        <input type="date" value={purchaseHistoryDateTo} onChange={(e) => setPurchaseHistoryDateTo(e.target.value)} className="w-full border rounded-lg p-2 text-sm" />
                                    </div>
                                </div>
                                <div className="mt-3 flex gap-2">
                                    <button onClick={() => { setPurchaseHistorySearch(''); setPurchaseHistoryDateFrom(''); setPurchaseHistoryDateTo(''); }} className="text-sm text-purple-600 hover:underline"><i className="fas fa-eraser mr-1"></i>Limpar Filtros</button>
                                    <button onClick={exportPurchaseHistory} className="text-sm text-green-600 hover:underline"><i className="fas fa-file-csv mr-1"></i>Exportar CSV</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-blue-50 p-4 rounded-lg">
                                    <p className="text-sm text-gray-600">Total de Compras</p>
                                    <p className="text-2xl font-bold text-blue-600">{filteredPurchaseHistory.length}</p>
                                </div>
                                <div className="bg-green-50 p-4 rounded-lg">
                                    <p className="text-sm text-gray-600">Total Investido</p>
                                    <p className="text-2xl font-bold text-green-600">{formatCurrency(filteredPurchaseHistory.reduce((sum, p) => sum + (p.price * p.quantity), 0))}</p>
                                </div>
                                <div className="bg-purple-50 p-4 rounded-lg">
                                    <p className="text-sm text-gray-600">Período</p>
                                    <p className="text-sm font-bold text-purple-600">{purchaseHistoryDateFrom ? formatDate(purchaseHistoryDateFrom) : 'Início'} - {purchaseHistoryDateTo ? formatDate(purchaseHistoryDateTo) : 'Hoje'}</p>
                                </div>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="bg-gray-50">
                                        <tr>
                                            <th className="p-3 text-left">Data</th>
                                            <th className="p-3 text-left">Produto</th>
                                            <th className="p-3 text-center">Qtd</th>
                                            <th className="p-3 text-left">Preço Unit.</th>
                                            <th className="p-3 text-left">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredPurchaseHistory.map(p => {
                                            const product = products.find(prod => prod.id === p.productId);

                                            return (
                                                <tr key={p.id} className="border-t">
                                                    <td className="p-3">{formatDate(p.date)}</td>
                                                    <td className="p-3 font-medium">{product?.name || 'Produto removido'}</td>
                                                    <td className="p-3 text-center">{p.quantity}</td>
                                                    <td className="p-3">{formatCurrency(p.price)}</td>
                                                    <td className="p-3 font-bold">{formatCurrency(p.price * p.quantity)}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                                {filteredPurchaseHistory.length === 0 && (
                                    <div className="text-center py-8 text-gray-500">
                                        <i className="fas fa-inbox text-4xl mb-3"></i>
                                        <p>Nenhuma compra encontrada com estes filtros</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </Modal>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p className="text-gray-400"><i className="fas fa-store mr-2"></i>Sistema de Gestão para Revenda O Boticário</p>
                            <p className="text-gray-500 text-sm mt-2">Versão Estável • Todos Botões Funcionando • {new Date().getFullYear()}</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
